<!--
  STARTUP TYCOON — single-file MVP (Three.js from CDN)

  PLAY
    WASD / arrows — move
    Tap / click   — move to that spot on the floor
    Left buttons  — upgrades (scale cost per level)
    Elevator btn  — floor select (Office active; Café / Gym / Rooftop locked)

  CORE LOOP (Office floor)
    idea orbs grow on farm plots → carry on head → drop at Dev Station
    → processed into feature boxes → carry to Shelf → customers buy at Checkout

  ARCHITECTURE (extending to new floors)
    Each floor is a subclass of Floor with a scene root, build(), update(dt),
    and dispose(). Only OfficeFloor is implemented. To add a new one:

      1. Write a class: class CafeFloor extends Floor {
           build() { build meshes into this.root; wire interactions; }
           update(dt) { tick your logic here; }
           dispose() { clean up NPCs/timers; super.dispose(); }
         }
      2. Register: FLOOR_CLASSES.cafe = CafeFloor;
      3. Travel from elevator (card click): replace currentFloorInst with
         `new FLOOR_CLASSES[id](scene)`, call dispose() on the old one.
      4. Content ideas: Café boosts idea growth, Gym boosts move speed,
         Rooftop spawns investor NPCs who drop bigger cash.

  Save state: localStorage key `startup-tycoon-v1`, written every 5s and on
  beforeunload. Save payload is intentionally small (cash, upgrade levels,
  unlocked floors) — transient world state (orbs, customers) is not persisted.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Startup Tycoon</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1a1a2e; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    canvas { display: block; touch-action: none; }
    #cash-hud {
      position: fixed; top: 16px; right: 18px;
      background: rgba(255,255,255,0.92);
      color: #1f6f3a; font-weight: 800; font-size: 22px;
      padding: 10px 16px; border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      display: flex; align-items: center; gap: 8px;
      pointer-events: none; user-select: none;
    }
    #cash-hud .bill {
      display: inline-block; width: 24px; height: 14px; border-radius: 3px;
      background: linear-gradient(135deg, #6fdc8c 0%, #2f9d55 100%);
      position: relative;
    }
    #cash-hud .bill::after {
      content: "$"; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 10px; font-weight: 900;
    }
    #upgrades {
      position: fixed; top: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 8px;
      max-width: 230px; user-select: none;
    }
    .upg-btn {
      background: rgba(255,255,255,0.94);
      border: 2px solid #3f51b5;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      color: #222;
      font-size: 14px;
      font-family: inherit;
      transition: transform 0.08s;
    }
    .upg-btn:active:not(:disabled) { transform: scale(0.97); }
    .upg-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .upg-btn .lvl {
      float: right; background: #3f51b5; color: #fff;
      padding: 1px 8px; border-radius: 10px; font-size: 11px;
      font-weight: 800;
    }
    .upg-btn .cost {
      display: block; color: #2f9d55; font-size: 12px; margin-top: 2px;
      font-weight: 800;
    }
    #elevator-btn {
      position: fixed; bottom: 18px; left: 18px;
      width: 62px; height: 62px;
      background: #3f51b5; color: #fff; border: none;
      border-radius: 16px; font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.28);
    }
    #elevator-btn:active { transform: scale(0.95); }
    #elevator-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    #elevator-modal.open { display: flex; }
    .elev-panel {
      background: #fff; border-radius: 18px; padding: 22px;
      max-width: 440px; width: 90vw;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    .elev-title { font-size: 20px; font-weight: 800; margin: 0 0 16px; text-align: center; color: #222; }
    .floor-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; margin-bottom: 10px;
      border: 2px solid #3f51b5; border-radius: 12px;
      cursor: pointer; font-size: 16px; font-weight: 700; color: #222;
      background: #fff3e5;
      transition: transform 0.08s;
    }
    .floor-card:hover { transform: translateY(-1px); }
    .floor-card.locked { background: #eee; border-color: #999; color: #555; }
    .floor-card .icon { font-size: 26px; }
    .floor-card .sub { display: block; font-size: 12px; color: #666; font-weight: 600; margin-top: 2px; }
    .floor-card .check { color: #2f9d55; font-size: 22px; font-weight: 900; }
    .elev-msg {
      text-align: center; color: #2f9d55; font-weight: 700;
      font-size: 13px; min-height: 18px; margin: 8px 0 0;
    }
    .elev-close {
      display: block; margin: 12px auto 0;
      padding: 8px 22px; font-weight: 700; font-family: inherit;
      background: none; color: #222; border: 2px solid #aaa;
      border-radius: 10px; cursor: pointer;
    }
    #offline-timer {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.88); color: #3f51b5;
      padding: 6px 14px; border-radius: 10px;
      font-weight: 700; font-size: 13px;
      pointer-events: none; user-select: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
<div id="offline-timer">Session 00m 00s</div>
<div id="cash-hud"><span class="bill"></span><span id="cash-val">0</span></div>
<div id="upgrades"></div>
<button id="elevator-btn" title="Floors">🏢</button>
<div id="elevator-modal" role="dialog">
  <div class="elev-panel">
    <h3 class="elev-title">Elevator</h3>
    <div id="floor-list"></div>
    <div class="elev-msg" id="elev-msg"></div>
    <button class="elev-close" id="elev-close">Close</button>
  </div>
</div>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// --- Scene + isometric camera ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfde8d4);

const camera = new THREE.OrthographicCamera();
const ZOOM = 14;
function fitCamera() {
  const a = innerWidth / innerHeight;
  camera.left = -ZOOM * a; camera.right = ZOOM * a;
  camera.top = ZOOM; camera.bottom = -ZOOM;
  camera.near = -100; camera.far = 200;
  camera.updateProjectionMatrix();
}
camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);
fitCamera();

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// --- Lights ---
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
const sc = sun.shadow.camera;
sc.left = -25; sc.right = 25; sc.top = 25; sc.bottom = -25;
sc.near = 0.1; sc.far = 80;
scene.add(sun);

// --- Ground: grass (left) + peach office (right) ---
const grass = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 60),
  new THREE.MeshLambertMaterial({ color: 0x7ec85a })
);
grass.rotation.x = -Math.PI / 2;
grass.position.x = -15;
grass.receiveShadow = true;
scene.add(grass);

const office = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 60),
  new THREE.MeshLambertMaterial({ color: 0xffc99a })
);
office.rotation.x = -Math.PI / 2;
office.position.x = 15;
office.receiveShadow = true;
scene.add(office);

// --- Player (capsule body + sphere head) ---
const player = new THREE.Group();
const body = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.42, 0.9, 4, 10),
  new THREE.MeshLambertMaterial({ color: 0x4a90ff })
);
body.position.y = 0.87;
body.castShadow = true;
player.add(body);
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.34, 14, 12),
  new THREE.MeshLambertMaterial({ color: 0xffd9a0 })
);
head.position.y = 1.85;
head.castShadow = true;
player.add(head);
player.position.set(5, 0, 0);
scene.add(player);

// --- Tunables (mutated by upgrades) ---
let playerSpeed = 6;
let plotGrowTime = 5;
let maxStack = 10;

// --- Player head-stack (generic: holds ideas OR features) ---
const stackGroup = new THREE.Group();
stackGroup.position.y = 2.25;
player.add(stackGroup);
const orbGeo = new THREE.SphereGeometry(0.3, 16, 12);
const orbMat = new THREE.MeshLambertMaterial({
  color: 0xfff066, emissive: 0xfff066, emissiveIntensity: 0.55,
});
const featureGeo = new THREE.BoxGeometry(0.45, 0.45, 0.45);
const featureMat = new THREE.MeshLambertMaterial({ color: 0xff6b9d });

const carry = { kind: null, count: 0 };
const stackOrbs = [], stackBoxes = [];
function makeStackMesh(kind, i) {
  const m = new THREE.Mesh(
    kind === 'feature' ? featureGeo : orbGeo,
    kind === 'feature' ? featureMat : orbMat
  );
  m.castShadow = true;
  m.position.y = i * 0.45;
  stackGroup.add(m);
  return m;
}
function refreshStack() {
  for (const m of stackOrbs) m.visible = false;
  for (const m of stackBoxes) m.visible = false;
  const pool = carry.kind === 'feature' ? stackBoxes : stackOrbs;
  while (pool.length < carry.count) pool.push(makeStackMesh(carry.kind, pool.length));
  for (let i = 0; i < carry.count; i++) pool[i].visible = true;
}

// --- Idea Farm: 3x3 plots growing orbs over time ---
const plots = [];
const plotGeo = new THREE.BoxGeometry(2.4, 0.1, 2.4);
const plotMat = new THREE.MeshLambertMaterial({ color: 0x6b4a2a });
for (let r = 0; r < 3; r++) {
  for (let c = 0; c < 3; c++) {
    const g = new THREE.Group();
    g.position.set(-22 + c * 5, 0, -6 + r * 6);
    const dirt = new THREE.Mesh(plotGeo, plotMat);
    dirt.position.y = 0.05; dirt.receiveShadow = true;
    g.add(dirt);
    const orb = new THREE.Mesh(orbGeo, orbMat);
    orb.position.y = 1.2; orb.castShadow = true; orb.visible = false;
    g.add(orb);
    scene.add(g);
    plots.push({ group: g, orb, t: Math.random() * plotGrowTime, ready: false });
  }
}

const PICKUP_R2 = 1.5 * 1.5;
function updateFarm(dt) {
  for (const p of plots) {
    if (!p.ready) {
      p.t += dt;
      if (p.t >= plotGrowTime) { p.ready = true; p.orb.visible = true; }
    }
  }
  const bob = Math.sin(performance.now() * 0.003) * 0.12;
  for (const p of plots) if (p.ready) p.orb.position.y = 1.25 + bob;

  if (carry.count >= maxStack) return;
  if (carry.kind && carry.kind !== 'idea') return; // can't mix types
  for (const p of plots) {
    if (!p.ready) continue;
    const dx = p.group.position.x - player.position.x;
    const dz = p.group.position.z - player.position.z;
    if (dx*dx + dz*dz < PICKUP_R2) {
      p.ready = false; p.orb.visible = false; p.t = 0;
      carry.kind = 'idea'; carry.count++; refreshStack();
      if (carry.count >= maxStack) return;
    }
  }
}

// --- Dev Station: ideas → features on a timer ---
function refreshPile(group, meshes, count, geo, mat, spacingY) {
  while (meshes.length < count) {
    const m = new THREE.Mesh(geo, mat);
    const i = meshes.length;
    m.position.set((i % 3 - 1) * 0.4, Math.floor(i / 3) * spacingY, (Math.floor(i / 3) % 2) * 0.1);
    m.castShadow = true;
    group.add(m);
    meshes.push(m);
  }
  for (let i = 0; i < meshes.length; i++) meshes[i].visible = i < count;
}

function createDev(x, z) {
  const g = new THREE.Group();
  g.position.set(x, 0, z);
  const desk = new THREE.Mesh(
    new THREE.BoxGeometry(2.6, 1, 1.6),
    new THREE.MeshLambertMaterial({ color: 0x9c7a4d })
  );
  desk.position.y = 0.5; desk.castShadow = true; desk.receiveShadow = true;
  g.add(desk);
  const monitor = new THREE.Mesh(
    new THREE.BoxGeometry(1.3, 0.85, 0.1),
    new THREE.MeshLambertMaterial({ color: 0x222233 })
  );
  monitor.position.set(0, 1.55, -0.35); monitor.castShadow = true;
  g.add(monitor);
  const screen = new THREE.Mesh(
    new THREE.PlaneGeometry(1.1, 0.65),
    new THREE.MeshBasicMaterial({ color: 0x6cf7ff })
  );
  screen.position.set(0, 1.55, -0.29);
  g.add(screen);
  const stand = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 0.5, 0.18),
    new THREE.MeshLambertMaterial({ color: 0x222233 })
  );
  stand.position.set(0, 1.05, -0.35);
  g.add(stand);

  const queueGroup = new THREE.Group();
  queueGroup.position.set(-0.7, 1.05, 0.4);
  g.add(queueGroup);
  const outputGroup = new THREE.Group();
  outputGroup.position.set(1.7, 0, 0);
  g.add(outputGroup);
  scene.add(g);

  return {
    pos: g.position, group: g,
    queueGroup, outputGroup,
    queueMeshes: [], outputMeshes: [],
    queue: 0, output: 0, procT: 0,
    PROC_TIME: 2.5, QUEUE_MAX: 10, OUTPUT_MAX: 10,
  };
}

const devs = [createDev(8, -8)];
const STATION_R2 = 2.6 * 2.6;

function updateDev(dt) {
  for (const d of devs) {
    if (d.queue > 0 && d.output < d.OUTPUT_MAX) {
      d.procT += dt;
      if (d.procT >= d.PROC_TIME) {
        d.procT = 0;
        d.queue--; d.output++;
        refreshPile(d.queueGroup, d.queueMeshes, d.queue, orbGeo, orbMat, 0.4);
        refreshPile(d.outputGroup, d.outputMeshes, d.output, featureGeo, featureMat, 0.5);
      }
    } else {
      d.procT = 0;
    }

    const dx = d.pos.x - player.position.x;
    const dz = d.pos.z - player.position.z;
    if (dx*dx + dz*dz > STATION_R2) continue;

    if (carry.kind === 'idea' && d.queue < d.QUEUE_MAX) {
      while (carry.count > 0 && d.queue < d.QUEUE_MAX) {
        d.queue++; carry.count--;
      }
      if (carry.count === 0) carry.kind = null;
      refreshStack();
      refreshPile(d.queueGroup, d.queueMeshes, d.queue, orbGeo, orbMat, 0.4);
    } else if ((carry.kind === null || carry.kind === 'feature') && d.output > 0 && carry.count < maxStack) {
      while (d.output > 0 && carry.count < maxStack) {
        carry.kind = 'feature'; carry.count++; d.output--;
      }
      refreshStack();
      refreshPile(d.outputGroup, d.outputMeshes, d.output, featureGeo, featureMat, 0.5);
    }
  }
}

// --- Product Shelf: drop features for customers ---
const shelf = new THREE.Group();
shelf.position.set(16, 0, 6);

const shelfBase = new THREE.Mesh(
  new THREE.BoxGeometry(4.2, 0.9, 1.2),
  new THREE.MeshLambertMaterial({ color: 0xd4a66b })
);
shelfBase.position.y = 0.45;
shelfBase.castShadow = true; shelfBase.receiveShadow = true;
shelf.add(shelfBase);

const shelfStockGroup = new THREE.Group();
shelfStockGroup.position.set(-1.6, 0.9, 0);
shelf.add(shelfStockGroup);
scene.add(shelf);

const shelfMeshes = [];
const SHELF_MAX = 12;
const shelfState = { stock: 0 };

function refreshShelf() {
  while (shelfMeshes.length < shelfState.stock) {
    const m = new THREE.Mesh(featureGeo, featureMat);
    const i = shelfMeshes.length;
    m.position.set((i % 8) * 0.5, 0.25 + Math.floor(i / 8) * 0.5, 0);
    m.castShadow = true;
    shelfStockGroup.add(m);
    shelfMeshes.push(m);
  }
  for (let i = 0; i < shelfMeshes.length; i++) shelfMeshes[i].visible = i < shelfState.stock;
}

function updateShelf() {
  const dx = shelf.position.x - player.position.x;
  const dz = shelf.position.z - player.position.z;
  if (dx*dx + dz*dz > STATION_R2) return;
  if (carry.kind !== 'feature' || carry.count === 0) return;
  while (carry.count > 0 && shelfState.stock < SHELF_MAX) {
    carry.count--; shelfState.stock++;
  }
  if (carry.count === 0) carry.kind = null;
  refreshStack(); refreshShelf();
}

// --- Checkout Counter: where customers pay ---
const checkout = new THREE.Group();
checkout.position.set(22, 0, 6);

const counter = new THREE.Mesh(
  new THREE.BoxGeometry(2.2, 1.1, 1.4),
  new THREE.MeshLambertMaterial({ color: 0xb57a3d })
);
counter.position.y = 0.55;
counter.castShadow = true; counter.receiveShadow = true;
checkout.add(counter);

const register = new THREE.Mesh(
  new THREE.BoxGeometry(0.9, 0.55, 0.7),
  new THREE.MeshLambertMaterial({ color: 0x3a3f52 })
);
register.position.set(0, 1.37, 0);
register.castShadow = true;
checkout.add(register);

const regTop = new THREE.Mesh(
  new THREE.BoxGeometry(0.7, 0.08, 0.5),
  new THREE.MeshLambertMaterial({ color: 0x6cf7ff, emissive: 0x6cf7ff, emissiveIntensity: 0.3 })
);
regTop.position.set(0, 1.68, 0);
checkout.add(regTop);
scene.add(checkout);

// --- AI Intern: autonomous worker (ideas → dev → shelf) ---
const intern = {
  enabled: false, group: null, stackG: null, stackMeshes: [],
  carry: { kind: null, count: 0 },
  maxCarry: 5, speed: 3.2, target: null,
};
function enableIntern() {
  if (intern.enabled) return;
  intern.enabled = true;
  const g = new THREE.Group();
  const b = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.35, 0.75, 4, 10),
    new THREE.MeshLambertMaterial({ color: 0xa06bff })
  );
  b.position.y = 0.75; b.castShadow = true;
  g.add(b);
  const h = new THREE.Mesh(
    new THREE.SphereGeometry(0.28, 12, 10),
    new THREE.MeshLambertMaterial({ color: 0xffd9a0 })
  );
  h.position.y = 1.6; h.castShadow = true;
  g.add(h);
  const stackG = new THREE.Group();
  stackG.position.y = 1.9;
  g.add(stackG);
  g.position.set(3, 0, 2);
  scene.add(g);
  intern.group = g;
  intern.stackG = stackG;
}
function refreshInternStack() {
  const c = intern.carry;
  while (intern.stackMeshes.length < c.count) {
    const m = new THREE.Mesh(orbGeo, orbMat);
    m.castShadow = true;
    m.position.y = intern.stackMeshes.length * 0.4;
    intern.stackG.add(m);
    intern.stackMeshes.push(m);
  }
  for (let i = 0; i < intern.stackMeshes.length; i++) {
    const m = intern.stackMeshes[i];
    m.visible = i < c.count;
    if (m.visible) {
      m.geometry = c.kind === 'feature' ? featureGeo : orbGeo;
      m.material = c.kind === 'feature' ? featureMat : orbMat;
    }
  }
}
function pickInternTarget() {
  const c = intern.carry;
  if (c.kind === 'idea' && c.count > 0) {
    const d = devs.find(x => x.queue < x.QUEUE_MAX);
    if (d) return { kind: 'devDrop', dev: d, x: d.pos.x + 1.8, z: d.pos.z + 0.5 };
  }
  if (c.kind === 'feature' && c.count > 0) {
    if (shelfState.stock < SHELF_MAX) return { kind: 'shelf', x: shelf.position.x, z: shelf.position.z + 1.8 };
  }
  if (c.count === 0) {
    const dOut = devs.find(x => x.output > 0);
    if (dOut && shelfState.stock < SHELF_MAX) return { kind: 'devPick', dev: dOut, x: dOut.pos.x + 1.8, z: dOut.pos.z + 0.5 };
    let nearest = null, best = Infinity;
    for (const p of plots) {
      if (!p.ready) continue;
      const dx = p.group.position.x - intern.group.position.x;
      const dz = p.group.position.z - intern.group.position.z;
      const dist = dx*dx + dz*dz;
      if (dist < best) { best = dist; nearest = p; }
    }
    if (nearest) return { kind: 'plot', plot: nearest, x: nearest.group.position.x, z: nearest.group.position.z };
  }
  return null;
}
function updateIntern(dt) {
  if (!intern.enabled) return;
  if (!intern.target) intern.target = pickInternTarget();
  if (!intern.target) return;
  const g = intern.group;
  const t = intern.target;
  const tx = t.x - g.position.x;
  const tz = t.z - g.position.z;
  const d = Math.hypot(tx, tz);
  if (d > 0.35) {
    g.position.x += (tx/d) * intern.speed * dt;
    g.position.z += (tz/d) * intern.speed * dt;
    g.rotation.y = Math.atan2(tx/d, tz/d);
    return;
  }
  const c = intern.carry;
  if (t.kind === 'plot') {
    if (t.plot.ready && c.count < intern.maxCarry) {
      t.plot.ready = false; t.plot.orb.visible = false; t.plot.t = 0;
      c.kind = 'idea'; c.count++;
      refreshInternStack();
    }
  } else if (t.kind === 'devDrop') {
    while (c.count > 0 && t.dev.queue < t.dev.QUEUE_MAX) { t.dev.queue++; c.count--; }
    if (c.count === 0) c.kind = null;
    refreshInternStack();
    refreshPile(t.dev.queueGroup, t.dev.queueMeshes, t.dev.queue, orbGeo, orbMat, 0.4);
  } else if (t.kind === 'devPick') {
    while (t.dev.output > 0 && c.count < intern.maxCarry) {
      c.kind = 'feature'; c.count++; t.dev.output--;
    }
    refreshInternStack();
    refreshPile(t.dev.outputGroup, t.dev.outputMeshes, t.dev.output, featureGeo, featureMat, 0.5);
  } else if (t.kind === 'shelf') {
    while (c.count > 0 && shelfState.stock < SHELF_MAX) { c.count--; shelfState.stock++; }
    if (c.count === 0) c.kind = null;
    refreshInternStack();
    refreshShelf();
  }
  intern.target = null;
}

// --- Door (customer entry/exit) ---
const DOOR_POS = new THREE.Vector3(27, 0, -2);
const doorFrame = new THREE.Group();
doorFrame.position.copy(DOOR_POS);
const frameMat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
const doorL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.5, 0.2), frameMat);
doorL.position.set(-0.9, 1.25, 0); doorL.castShadow = true;
const doorR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.5, 0.2), frameMat);
doorR.position.set(0.9, 1.25, 0); doorR.castShadow = true;
const doorT = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, 0.2), frameMat);
doorT.position.set(0, 2.5, 0); doorT.castShadow = true;
doorFrame.add(doorL, doorR, doorT);
scene.add(doorFrame);

// --- Customers: spawn from door, buy from shelf, pay at checkout ---
const customers = [];
const CUSTOMER_SPEED = 3;
const FEATURE_PRICE = 5;
const MAX_CUSTOMERS = 5;
const CUSTOMER_SPAWN_INTERVAL = 2.5;
let customerSpawnT = 0;
const shelfFrontOf = () => new THREE.Vector3(
  shelf.position.x + (Math.random() - 0.5) * 2,
  0,
  shelf.position.z + 2.3
);
const checkoutFrontOf = () => new THREE.Vector3(
  checkout.position.x - 2.2,
  0,
  checkout.position.z + (Math.random() - 0.5) * 0.5
);

function spawnCustomer() {
  const g = new THREE.Group();
  const hue = Math.random();
  const bodyColor = new THREE.Color().setHSL(hue, 0.55, 0.55);
  const b = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.38, 0.8, 4, 8),
    new THREE.MeshLambertMaterial({ color: bodyColor })
  );
  b.position.y = 0.8; b.castShadow = true;
  g.add(b);
  const h = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 12, 10),
    new THREE.MeshLambertMaterial({ color: 0xffd9a0 })
  );
  h.position.y = 1.7; h.castShadow = true;
  g.add(h);
  const carried = new THREE.Mesh(featureGeo, featureMat);
  carried.position.y = 2.1; carried.castShadow = true; carried.visible = false;
  g.add(carried);
  g.position.copy(DOOR_POS);
  g.position.x += (Math.random() - 0.5) * 0.6;
  scene.add(g);
  customers.push({
    group: g, carried,
    state: 'toShelf',
    target: shelfFrontOf(),
    waitT: 0,
  });
}

function updateCustomers(dt) {
  customerSpawnT += dt;
  if (customerSpawnT > CUSTOMER_SPAWN_INTERVAL && customers.length < MAX_CUSTOMERS) {
    customerSpawnT = 0;
    if (shelfState.stock > 0 || customers.length < 2) spawnCustomer();
  }

  for (let i = customers.length - 1; i >= 0; i--) {
    const c = customers[i];

    if (c.state === 'paying') {
      c.waitT -= dt;
      if (c.waitT <= 0) {
        addCash(FEATURE_PRICE);
        c.carried.visible = false;
        c.state = 'leaving';
        c.target.copy(DOOR_POS);
      }
      continue;
    }

    const tx = c.target.x - c.group.position.x;
    const tz = c.target.z - c.group.position.z;
    const d = Math.hypot(tx, tz);
    if (d > 0.12) {
      c.group.position.x += (tx / d) * CUSTOMER_SPEED * dt;
      c.group.position.z += (tz / d) * CUSTOMER_SPEED * dt;
      c.group.rotation.y = Math.atan2(tx / d, tz / d);
      continue;
    }

    if (c.state === 'toShelf') {
      if (shelfState.stock > 0) {
        shelfState.stock--;
        refreshShelf();
        c.carried.visible = true;
        c.state = 'toCheckout';
        c.target = checkoutFrontOf();
      } else {
        c.waitT = (c.waitT || 0) + dt;
        if (c.waitT > 3) {
          c.state = 'leaving';
          c.target.copy(DOOR_POS);
        }
      }
    } else if (c.state === 'toCheckout') {
      c.state = 'paying';
      c.waitT = 0.7;
    } else if (c.state === 'leaving') {
      scene.remove(c.group);
      customers.splice(i, 1);
    }
  }
}

// --- Cash state ---
const state = { cash: 0 };
const cashValEl = document.getElementById('cash-val');
function addCash(n) {
  state.cash += n;
  cashValEl.textContent = Math.floor(state.cash).toString();
  renderUpgrades();
}

// --- Upgrades ---
const UPGRADES = [
  { id: 'growth',   label: 'Idea Growth',    base: 20,  scale: 1.6, max: 10,
    apply: lv => { plotGrowTime = Math.max(1.0, 5 - lv * 0.35); } },
  { id: 'speed',    label: 'Move Speed',     base: 25,  scale: 1.5, max: 10,
    apply: lv => { playerSpeed = 6 + lv * 0.5; } },
  { id: 'capacity', label: 'Carry Capacity', base: 30,  scale: 1.7, max: 10,
    apply: lv => { maxStack = 10 + lv * 2; } },
  { id: 'dev',      label: 'Dev Speed',      base: 50,  scale: 1.6, max: 10,
    apply: lv => { for (const d of devs) d.PROC_TIME = Math.max(0.3, 2.5 - lv * 0.2); } },
  { id: 'slot',     label: 'Extra Dev Slot', base: 200, scale: 1,   max: 1,
    apply: lv => { if (lv > 0 && devs.length < 2) devs.push(createDev(8, 4)); } },
  { id: 'intern',   label: 'Hire AI Intern', base: 500, scale: 1,   max: 1,
    apply: lv => { if (lv > 0) enableIntern(); } },
];
const upgLevels = {};
for (const u of UPGRADES) upgLevels[u.id] = 0;
function upgCost(u) {
  return Math.floor(u.base * Math.pow(u.scale, upgLevels[u.id]));
}
function buyUpgrade(id) {
  const u = UPGRADES.find(x => x.id === id);
  if (!u || upgLevels[id] >= u.max) return;
  const cost = upgCost(u);
  if (state.cash < cost) return;
  state.cash -= cost;
  upgLevels[id]++;
  u.apply(upgLevels[id]);
  addCash(0);
}
const upgEl = document.getElementById('upgrades');
function renderUpgrades() {
  // In-place update so we don't rebuild DOM every frame
  if (upgEl.children.length !== UPGRADES.length) {
    upgEl.innerHTML = '';
    for (const u of UPGRADES) {
      const btn = document.createElement('button');
      btn.className = 'upg-btn';
      btn.dataset.id = u.id;
      btn.onclick = () => buyUpgrade(u.id);
      upgEl.appendChild(btn);
    }
  }
  for (const btn of upgEl.children) {
    const u = UPGRADES.find(x => x.id === btn.dataset.id);
    const lv = upgLevels[u.id];
    const maxed = lv >= u.max;
    const cost = upgCost(u);
    btn.disabled = maxed || state.cash < cost;
    btn.innerHTML = `<span class="lvl">${maxed ? 'MAX' : 'Lv ' + lv}</span>${u.label}` +
      (maxed ? '' : `<span class="cost">$${cost}</span>`);
  }
}
addCash(0);

// --- Elevator + floor scaffold ---
// Only OFFICE is active. Other floors unlock but are placeholders until a
// Floor subclass is dropped in (see README at top of file).
const FLOORS = [
  { id: 'office',  name: 'Office — Floor 1', icon: '💻', cost: 0 },
  { id: 'cafe',    name: 'Café',             icon: '☕', cost: 1000 },
  { id: 'gym',     name: 'Gym',              icon: '💪', cost: 5000 },
  { id: 'rooftop', name: 'Rooftop',          icon: '🌇', cost: 25000 },
];
const unlocked = { office: true, cafe: false, gym: false, rooftop: false };
let currentFloor = 'office';
const elevModal = document.getElementById('elevator-modal');
const floorListEl = document.getElementById('floor-list');
const elevMsgEl = document.getElementById('elev-msg');
document.getElementById('elevator-btn').onclick = () => { renderFloors(); elevModal.classList.add('open'); };
document.getElementById('elev-close').onclick = () => elevModal.classList.remove('open');
elevModal.addEventListener('click', e => { if (e.target === elevModal) elevModal.classList.remove('open'); });

function renderFloors() {
  floorListEl.innerHTML = '';
  elevMsgEl.textContent = '';
  for (const f of FLOORS) {
    const isCurrent = f.id === currentFloor;
    const isUnlocked = unlocked[f.id];
    const card = document.createElement('div');
    card.className = 'floor-card' + (isUnlocked ? '' : ' locked');
    card.innerHTML = `
      <span class="icon">${isUnlocked ? f.icon : '🔒'}</span>
      <div style="flex:1">
        ${f.name}
        <span class="sub">${isCurrent ? 'Currently here' : isUnlocked ? 'Tap to travel' : 'Unlock for $' + f.cost.toLocaleString()}</span>
      </div>
      ${isCurrent ? '<span class="check">✓</span>' : ''}
    `;
    card.onclick = () => {
      if (!isUnlocked) {
        if (state.cash >= f.cost) {
          state.cash -= f.cost;
          unlocked[f.id] = true;
          addCash(0);
          elevMsgEl.textContent = `${f.name} unlocked!`;
          renderFloors();
        } else {
          elevMsgEl.textContent = `Need $${(f.cost - state.cash).toLocaleString()} more`;
        }
      } else if (f.id === currentFloor) {
        elevMsgEl.textContent = "You're already here.";
      } else {
        elevMsgEl.textContent = `${f.name} is a placeholder — drop in a Floor subclass to activate.`;
      }
    };
    floorListEl.appendChild(card);
  }
}

// --- Input ---
const keys = {};
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });
addEventListener('resize', () => { fitCamera(); renderer.setSize(innerWidth, innerHeight); });

// Tap-to-move: project pointer onto ground plane, walk toward target
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
let target = null;
renderer.domElement.addEventListener('pointerdown', e => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hit = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(groundPlane, hit)) target = hit;
});

// --- Floor architecture (drop-in modules, see README at top) ---
// The Office floor is built inline above for MVP simplicity; its update()
// fans out to the existing module-level update functions. New floors should
// build their scene into this.root and keep their state on the instance.
class Floor {
  constructor(scene) {
    this.scene = scene;
    this.root = new THREE.Group();
    scene.add(this.root);
  }
  build()     {}
  update(dt)  {}
  dispose()   { this.root.parent?.remove(this.root); }
}
class OfficeFloor extends Floor {
  update(dt) {
    updateFarm(dt);
    updateDev(dt);
    updateShelf();
    updateCustomers(dt);
    updateIntern(dt);
  }
}
const FLOOR_CLASSES = {
  office: OfficeFloor,
  // cafe:    CafeFloor,    // TODO: boosts idea growth on neighboring floors
  // gym:     GymFloor,     // TODO: boosts move speed
  // rooftop: RooftopFloor, // TODO: attracts investor NPCs
};
let currentFloorInst = new FLOOR_CLASSES.office(scene);

// --- Loop ---
const HALF = 28;
let last = performance.now();
const ISO = -Math.PI / 4, COS = Math.cos(ISO), SIN = Math.sin(ISO);
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;

  let dx = 0, dz = 0;
  if (keys['w'] || keys['arrowup'])    dz -= 1;
  if (keys['s'] || keys['arrowdown'])  dz += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  let wx = 0, wz = 0;
  if (dx || dz) {
    target = null; // keyboard cancels tap-target
    const len = Math.hypot(dx, dz);
    dx /= len; dz /= len;
    wx = dx * COS - dz * SIN;
    wz = dx * SIN + dz * COS;
  } else if (target) {
    const tx = target.x - player.position.x;
    const tz = target.z - player.position.z;
    const d = Math.hypot(tx, tz);
    if (d < 0.1) target = null;
    else { wx = tx / d; wz = tz / d; }
  }

  if (wx || wz) {
    player.position.x = Math.max(-HALF, Math.min(HALF, player.position.x + wx * playerSpeed * dt));
    player.position.z = Math.max(-HALF, Math.min(HALF, player.position.z + wz * playerSpeed * dt));
    player.rotation.y = Math.atan2(wx, wz);
  }

  currentFloorInst.update(dt);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// --- Save + load ---
const SAVE_KEY = 'startup-tycoon-v1';
function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      cash: state.cash,
      upgrades: upgLevels,
      unlocked,
      savedAt: Date.now(),
    }));
  } catch {}
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    state.cash = p.cash || 0;
    if (p.upgrades) {
      for (const u of UPGRADES) {
        const lv = p.upgrades[u.id] || 0;
        for (let i = 1; i <= lv; i++) u.apply(i);
        upgLevels[u.id] = lv;
      }
    }
    if (p.unlocked) Object.assign(unlocked, p.unlocked);
  } catch {}
}

// --- Offline / session timer ---
const offlineTimerEl = document.getElementById('offline-timer');
const sessionStart = Date.now();
function tickTimer() {
  const s = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(s / 60);
  offlineTimerEl.textContent =
    `Session ${m.toString().padStart(2,'0')}m ${(s%60).toString().padStart(2,'0')}s`;
}
tickTimer();
setInterval(tickTimer, 1000);

loadGame();
addCash(0);
setInterval(saveGame, 5000);
addEventListener('beforeunload', saveGame);

requestAnimationFrame(loop);
</script>
