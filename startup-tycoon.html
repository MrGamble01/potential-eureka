<!--
  STARTUP TYCOON — single-file MVP (Three.js from CDN)

  PLAY
    WASD / arrows — move
    Tap / click   — move to that spot on the floor
    Left buttons  — upgrades (scale cost per level)
    Elevator btn  — floor select (Office active; Café / Gym / Rooftop locked)

  CORE LOOP (Office floor)
    idea orbs grow on farm plots → carry on head → drop at Dev Station
    → processed into feature boxes → carry to Shelf → customers buy at Checkout

  ARCHITECTURE (extending to new floors)
    Each floor is a subclass of Floor with a scene root, build(), update(dt),
    and dispose(). Only OfficeFloor is implemented. To add a new one:

      1. Write a class: class CafeFloor extends Floor {
           build() { build meshes into this.root; wire interactions; }
           update(dt) { tick your logic here; }
           dispose() { clean up NPCs/timers; super.dispose(); }
         }
      2. Register: FLOOR_CLASSES.cafe = CafeFloor;
      3. Travel from elevator (card click): replace currentFloorInst with
         `new FLOOR_CLASSES[id](scene)`, call dispose() on the old one.
      4. Content ideas: Café boosts idea growth, Gym boosts move speed,
         Rooftop spawns investor NPCs who drop bigger cash.

  Save state: localStorage key `startup-tycoon-v1`, written every 5s and on
  beforeunload. Save payload is intentionally small (cash, upgrade levels,
  unlocked floors) — transient world state (orbs, customers) is not persisted.
-->

<script type="module">
import * as THREE from 'three';

// --- Scene + isometric camera ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfde8d4);

const camera = new THREE.OrthographicCamera();
const ZOOM = 14;
function fitCamera() {
  const a = innerWidth / innerHeight;
  camera.left = -ZOOM * a; camera.right = ZOOM * a;
  camera.top = ZOOM; camera.bottom = -ZOOM;
  camera.near = -100; camera.far = 200;
  camera.updateProjectionMatrix();
}
camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);
fitCamera();

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Screen-space utility ─────────────────────────────────────
const projV = new THREE.Vector3();
function worldToScreen(x, y, z) {
  projV.set(x, y, z).project(camera);
  return { x:(projV.x*0.5+0.5)*innerWidth, y:(-projV.y*0.5+0.5)*innerHeight };
}

// --- Lights ---
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
const sc = sun.shadow.camera;
sc.left = -25; sc.right = 25; sc.top = 25; sc.bottom = -25;
sc.near = 0.1; sc.far = 80;
scene.add(sun);

// --- Ground: grass (left) + peach office (right) ---
const grass = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 60),
  new THREE.MeshLambertMaterial({ color: 0x7ec85a })
);
grass.rotation.x = -Math.PI / 2;
grass.position.x = -15;
grass.receiveShadow = true;
scene.add(grass);

const office = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 60),
  new THREE.MeshLambertMaterial({ color: 0xffc99a })
);
office.rotation.x = -Math.PI / 2;
office.position.x = 15;
office.receiveShadow = true;
scene.add(office);

// ── Office walls ────────────────────────────────────────────
const wallMat = new THREE.MeshLambertMaterial({ color: 0xf2ede8 });
// Back wall (x = 29.3)
const backWall = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3.4, 28), wallMat);
backWall.position.set(29.3, 1.7, 0);
backWall.castShadow = true; backWall.receiveShadow = true;
scene.add(backWall);

// Windows on back wall
const frameMat2 = new THREE.MeshLambertMaterial({ color: 0x9c7a4d });
const glassMat  = new THREE.MeshBasicMaterial({ color:0x87ceeb, transparent:true, opacity:0.55, side:THREE.DoubleSide });
for (const wz of [-8, 0, 8]) {
  const hBar = new THREE.Mesh(new THREE.BoxGeometry(0.35,0.12,2.0), frameMat2);
  hBar.position.set(29.1, 1.55, wz); scene.add(hBar);
  const vBar = new THREE.Mesh(new THREE.BoxGeometry(0.35,2.0,0.12), frameMat2);
  vBar.position.set(29.1, 1.55, wz); scene.add(vBar);
  const glass = new THREE.Mesh(new THREE.PlaneGeometry(1.75, 1.75), glassMat);
  glass.rotation.y = Math.PI/2; glass.position.set(29.05, 1.55, wz); scene.add(glass);
}

// South side wall (z = 13)
const southWall = new THREE.Mesh(new THREE.BoxGeometry(29, 3.4, 0.4), wallMat);
southWall.position.set(14.5, 1.7, 13);
southWall.castShadow = true; southWall.receiveShadow = true;
scene.add(southWall);

// North side wall (z = -13), gap at x > 24 for door entry
const northWall = new THREE.Mesh(new THREE.BoxGeometry(23, 3.4, 0.4), wallMat);
northWall.position.set(12.5, 1.7, -13);
northWall.castShadow = true; northWall.receiveShadow = true;
scene.add(northWall);

// ── Office carpet ────────────────────────────────────────────
const rug = new THREE.Mesh(
  new THREE.BoxGeometry(26, 0.02, 22),
  new THREE.MeshLambertMaterial({ color: 0xeacdb5 })
);
rug.position.set(16, 0.01, 0); rug.receiveShadow = true;
scene.add(rug);

// ── Office decorations ───────────────────────────────────────
function makePlant(px, pz) {
  const g = new THREE.Group();
  const pot = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.25, 0.55, 12),
    new THREE.MeshLambertMaterial({ color: 0xc1440e })
  );
  pot.position.y = 0.275; pot.castShadow = true; g.add(pot);
  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 12, 10),
    new THREE.MeshLambertMaterial({ color: 0x3a9e3a })
  );
  leaves.position.y = 1.0; leaves.castShadow = true; g.add(leaves);
  g.position.set(px, 0, pz); scene.add(g);
}
makePlant(4, -11); makePlant(4, 11); makePlant(26, 11);

// Water cooler
const wcG = new THREE.Group();
const wcBody = new THREE.Mesh(
  new THREE.CylinderGeometry(0.28, 0.3, 1.2, 12),
  new THREE.MeshLambertMaterial({ color: 0xd0e8f5 })
);
wcBody.position.y = 0.6; wcBody.castShadow = true; wcG.add(wcBody);
const wcTank = new THREE.Mesh(
  new THREE.CylinderGeometry(0.18, 0.2, 0.45, 12),
  new THREE.MeshLambertMaterial({ color: 0x6ab4e8 })
);
wcTank.position.y = 1.42; wcTank.castShadow = true; wcG.add(wcTank);
wcG.position.set(5.5, 0, -11); scene.add(wcG);

// Supply closet
const supplyCloset = {
  pos: new THREE.Vector3(10, 0, -10),
  stock: 20,
  maxStock: 30,
  regenT: 0,
  REGEN_RATE: 5,   // seconds per 1 supply unit
  CARRY_AMT: 5,    // how many supplies a worker picks up per trip
};
// 3D: wooden cabinet
const scG = new THREE.Group();
scG.position.copy(supplyCloset.pos);
const scBack = new THREE.Mesh(new THREE.BoxGeometry(1.8,2.1,0.18), new THREE.MeshLambertMaterial({color:0x8b5a2b}));
scBack.position.y = 1.05; scBack.castShadow = true; scG.add(scBack);
const scBase = new THREE.Mesh(new THREE.BoxGeometry(1.8,0.9,0.55), new THREE.MeshLambertMaterial({color:0xae8a5a}));
scBase.position.set(0,0.45,-0.18); scBase.castShadow = true; scBase.receiveShadow = true; scG.add(scBase);
const scTop  = new THREE.Mesh(new THREE.BoxGeometry(1.8,0.6,0.55), new THREE.MeshLambertMaterial({color:0xae8a5a}));
scTop.position.set(0,1.5,-0.18); scTop.castShadow = true; scG.add(scTop);
// supply boxes on shelves
const sbMat = new THREE.MeshLambertMaterial({color:0x4da3ff});
for (let si=0;si<3;si++) {
  const sb = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3), sbMat);
  sb.position.set(-0.55+si*0.55, 1.65, -0.15);
  scG.add(sb);
}
const sbMat2 = new THREE.MeshLambertMaterial({color:0xff9a4a});
for (let si=0;si<2;si++) {
  const sb = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.3,10), sbMat2);
  sb.position.set(-0.3+si*0.6, 0.75, -0.15);
  scG.add(sb);
}
scene.add(scG);

function updateSupplyCloset(dt) {
  if (supplyCloset.stock < supplyCloset.maxStock) {
    supplyCloset.regenT += dt;
    if (supplyCloset.regenT >= supplyCloset.REGEN_RATE) {
      supplyCloset.regenT = 0;
      supplyCloset.stock = Math.min(supplyCloset.maxStock, supplyCloset.stock + 1);
    }
  }
}

// Workers — hired logistics staff, auto-stock the coffee machine
const workers = [];
const WORKER_SPEED = 4.5;
const MAX_WORKERS  = 3;

function workerHireCost() {
  return Math.floor(150 * Math.pow(1.5, workers.length));
}

function hireWorker() {
  if (workers.length >= MAX_WORKERS) return;
  const cost = workerHireCost();
  if (state.cash < cost) return;
  state.cash -= cost;

  const g = new THREE.Group();
  const color = new THREE.Color().setHSL(0.08 + workers.length * 0.04, 0.7, 0.55); // orange tones
  const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.35,0.75,4,8), new THREE.MeshLambertMaterial({color}));
  b.position.y = 0.75; b.castShadow = true; g.add(b);
  const h = new THREE.Mesh(new THREE.SphereGeometry(0.28,12,10), new THREE.MeshLambertMaterial({color:0xffd9a0}));
  h.position.y = 1.6; h.castShadow = true; g.add(h);
  // carry box (visible when holding supplies)
  const cBox = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4), new THREE.MeshLambertMaterial({color:0x4da3ff}));
  cBox.position.y = 2.0; cBox.castShadow = true; cBox.visible = false; g.add(cBox);
  // start near supply closet
  g.position.set(supplyCloset.pos.x + (Math.random()-0.5)*2, 0, supplyCloset.pos.z + 1);
  scene.add(g);

  workers.push({ group:g, carryBox:cBox, carrying:false, state:'toCloset', waitT:0 });
  addCash(0);
  renderOffice();
}

function updateWorkers(dt) {
  const coffeeAm = amenities.find(a => a.id === 'coffee' && a.isOwned);
  for (const w of workers) {
    if (w.state === 'waiting') {
      w.waitT -= dt;
      if (w.waitT <= 0) w.state = 'toCloset';
      continue;
    }

    let tx, tz, dist;
    if (w.state === 'toCloset') {
      tx = supplyCloset.pos.x - w.group.position.x;
      tz = supplyCloset.pos.z + 0.8 - w.group.position.z;
      dist = Math.hypot(tx, tz);
      if (dist > 0.3) {
        w.group.position.x += (tx/dist)*WORKER_SPEED*dt;
        w.group.position.z += (tz/dist)*WORKER_SPEED*dt;
        w.group.rotation.y = Math.atan2(tx/dist, tz/dist);
      } else {
        // arrived at closet
        if (supplyCloset.stock >= supplyCloset.CARRY_AMT) {
          supplyCloset.stock -= supplyCloset.CARRY_AMT;
          w.carrying = true; w.carryBox.visible = true;
          w.state = coffeeAm ? 'toCoffeeMachine' : 'waiting';
          if (!coffeeAm) { w.carrying=false; w.carryBox.visible=false; w.waitT=3; }
        } else {
          // not enough supply yet, wait
          w.state = 'waiting'; w.waitT = 3;
        }
      }
    } else if (w.state === 'toCoffeeMachine' && coffeeAm) {
      const destX = coffeeAm.position.x;
      const destZ = coffeeAm.position.z + 1.6;
      tx = destX - w.group.position.x;
      tz = destZ - w.group.position.z;
      dist = Math.hypot(tx, tz);
      if (dist > 0.3) {
        w.group.position.x += (tx/dist)*WORKER_SPEED*dt;
        w.group.position.z += (tz/dist)*WORKER_SPEED*dt;
        w.group.rotation.y = Math.atan2(tx/dist, tz/dist);
      } else {
        // arrived — stock the machine
        if (coffeeAm.stock < coffeeAm.maxStock) {
          coffeeAm.stock = Math.min(coffeeAm.maxStock, coffeeAm.stock + supplyCloset.CARRY_AMT);
        }
        w.carrying = false; w.carryBox.visible = false;
        w.state = 'toCloset'; // go back for more
      }
    }
  }
}

function makeStackMesh(kind, i) {

function refreshStack() {

  while (pool.length < carry.count) pool.push(makeStackMesh(carry.kind, pool.length));

}

const plots = [];

const PLOT_DEFS = [
  // Base 9
  ...([0,1,2].flatMap(r => [0,1,2].map(c => ({ x:-22+c*5, z:-6+r*6, tier:0 })))),
  // Tier-1 expansion (3 more)

  // Tier-2 expansion (3 more)

  g.visible = active;
  scene.add(g);
  plots.push({ group:g, orb, t: active ? Math.random()*plotGrowTime : 0, ready:false, tier:def.tier, active });
}

function activatePlots(level) {
  for (const p of plots) {
    if (!p.active && p.tier <= level) {
      p.active = true;
      p.group.visible = true;
      p.t = 0;
    }
  }
}

const PICKUP_R2 = 1.5 * 1.5;
function updateFarm(dt) {
  for (const p of plots) {
    if (!p.active) continue;
    if (!p.ready) {
      p.t += dt;
      if (p.t >= plotGrowTime) { p.ready = true; p.orb.visible = true; }
    }
  }
  const bob = Math.sin(performance.now() * 0.003) * 0.12;
  for (const p of plots) {
    if (!p.active) continue;
    if (p.ready) p.orb.position.y = 1.25 + bob;
  }

  if (carry.count >= maxStack) return;
  if (carry.kind && carry.kind !== 'idea') return; // can't mix types
  for (const p of plots) {
    if (!p.active) continue;
    if (!p.ready) continue;
    const dx = p.group.position.x - player.position.x;
    const dz = p.group.position.z - player.position.z;
    if (dx*dx + dz*dz < PICKUP_R2) {
      p.ready = false; p.orb.visible = false; p.t = 0;
      carry.kind = 'idea'; carry.count++; refreshStack();
      if (carry.count >= maxStack) return;
    }
  }
}

function refreshPile(group, meshes, count, geo, mat, spacingY) {
  while (meshes.length < count) {
    const m = new THREE.Mesh(geo, mat);
    const i = meshes.length;
    m.position.set((i % 3 - 1) * 0.4, Math.floor(i / 3) * spacingY, (Math.floor(i / 3) % 2) * 0.1);
    m.castShadow = true;
    group.add(m);
    meshes.push(m);
  }
  for (let i = 0; i < meshes.length; i++) meshes[i].visible = i < count;
}

const devs = [createDev(8, -8)];
const STATION_R2 = 2.6 * 2.6;

function updateDev(dt) {
  for (const d of devs) {
    if (d.queue > 0 && d.output < d.OUTPUT_MAX) {
      d.procT += dt;
      if (d.procT >= d.PROC_TIME) {
        d.procT = 0;
        d.queue--; d.output++;
        refreshPile(d.queueGroup, d.queueMeshes, d.queue, orbGeo, orbMat, 0.4);
        refreshPile(d.outputGroup, d.outputMeshes, d.output, featureGeo, featureMat, 0.5);
      }
    } else {
      d.procT = 0;
    }

    const dx = d.pos.x - player.position.x;
    const dz = d.pos.z - player.position.z;
    if (dx*dx + dz*dz > STATION_R2) continue;

    if (carry.kind === 'idea' && d.queue < d.QUEUE_MAX) {
      while (carry.count > 0 && d.queue < d.QUEUE_MAX) {
        d.queue++; carry.count--;
      }
      if (carry.count === 0) carry.kind = null;
      refreshStack();
      refreshPile(d.queueGroup, d.queueMeshes, d.queue, orbGeo, orbMat, 0.4);
    } else if ((carry.kind === null || carry.kind === 'feature') && d.output > 0 && carry.count < maxStack) {
      while (d.output > 0 && carry.count < maxStack) {
        carry.kind = 'feature'; carry.count++; d.output--;
      }
      refreshStack();
      refreshPile(d.outputGroup, d.outputMeshes, d.output, featureGeo, featureMat, 0.5);
    }
  }
}

const productionBots = [];

function spawnProductionBot() {

  scene.add(g);

  productionBots.push({
    group: g, stackG,
    stackMeshes: [],
    carry: { kind: null, count: 0 },
    maxCarry: 5, speed: 3.5,
    target: null,
  });
}

function refreshBotStack(bot) {
  const c = bot.carry;
  while (bot.stackMeshes.length < c.count) {
    const m = new THREE.Mesh(orbGeo, orbMat);
    m.castShadow = true;
    m.position.y = bot.stackMeshes.length * 0.4;
    bot.stackG.add(m);
    bot.stackMeshes.push(m);
  }
  for (let i = 0; i < bot.stackMeshes.length; i++) {
    const m = bot.stackMeshes[i];
    m.visible = i < c.count;
    if (m.visible) {
      m.geometry = c.kind === 'feature' ? featureGeo : orbGeo;
      m.material = c.kind === 'feature' ? featureMat : orbMat;
    }
  }
}

function pickBotTarget(bot) {
  const c = bot.carry;
  if (c.kind === 'idea' && c.count > 0) {
    const d = devs.find(x => x.queue < x.QUEUE_MAX);
    if (d) return { kind: 'devDrop', dev: d, x: d.pos.x + 1.8, z: d.pos.z + 0.5 };
  }
  if (c.kind === 'feature' && c.count > 0) {
    if (shelfState.stock < SHELF_MAX) return { kind: 'shelf', x: shelf.position.x, z: shelf.position.z + 1.8 };
  }
  if (c.count === 0) {
    // Prefer picking up finished features first (faster loop)
    const dOut = devs.find(x => x.output > 0);
    if (dOut && shelfState.stock < SHELF_MAX) return { kind: 'devPick', dev: dOut, x: dOut.pos.x + 1.8, z: dOut.pos.z + 0.5 };
    // Then go harvest ideas
    let nearest = null, best = Infinity;
    for (const p of plots) {
      if (!p.active || !p.ready) continue;
      const dx = p.group.position.x - bot.group.position.x;
      const dz = p.group.position.z - bot.group.position.z;
      const dist = dx*dx + dz*dz;
      if (dist < best) { best = dist; nearest = p; }
    }
    if (nearest) return { kind: 'plot', plot: nearest, x: nearest.group.position.x, z: nearest.group.position.z };
  }
  return null;
}

function updateProductionBots(dt) {
  for (const bot of productionBots) {
    if (!bot.target) bot.target = pickBotTarget(bot);
    if (!bot.target) continue;

    const t = bot.target;
    const tx = t.x - bot.group.position.x;
    const tz = t.z - bot.group.position.z;
    const d = Math.hypot(tx, tz);

    if (d > 0.35) {
      bot.group.position.x += (tx/d) * bot.speed * dt;
      bot.group.position.z += (tz/d) * bot.speed * dt;
      bot.group.rotation.y = Math.atan2(tx/d, tz/d);
      continue;
    }

    const c = bot.carry;
    if (t.kind === 'plot') {
      if (t.plot.ready && c.count < bot.maxCarry) {
        // Collect as many adjacent ready plots as possible
        for (const p of plots) {
          if (!p.active || !p.ready) continue;
          const pdx = p.group.position.x - bot.group.position.x;
          const pdz = p.group.position.z - bot.group.position.z;
          if (pdx*pdx + pdz*pdz < 3*3 && c.count < bot.maxCarry) {
            p.ready = false; p.orb.visible = false; p.t = 0;
            c.kind = 'idea'; c.count++;
          }
        }
        refreshBotStack(bot);
      }
    } else if (t.kind === 'devDrop') {
      while (c.count > 0 && t.dev.queue < t.dev.QUEUE_MAX) { t.dev.queue++; c.count--; }
      if (c.count === 0) c.kind = null;
      refreshBotStack(bot);
      refreshPile(t.dev.queueGroup, t.dev.queueMeshes, t.dev.queue, orbGeo, orbMat, 0.4);
    } else if (t.kind === 'devPick') {
      while (t.dev.output > 0 && c.count < bot.maxCarry) {
        c.kind = 'feature'; c.count++; t.dev.output--;
      }
      refreshBotStack(bot);
      refreshPile(t.dev.outputGroup, t.dev.outputMeshes, t.dev.output, featureGeo, featureMat, 0.5);
    } else if (t.kind === 'shelf') {
      while (c.count > 0 && shelfState.stock < SHELF_MAX) { c.count--; shelfState.stock++; }
      if (c.count === 0) c.kind = null;
      refreshBotStack(bot);
      refreshShelf();
    }
    bot.target = null;
  }
}

const customers = [];
const CUSTOMER_SPEED = 3;
let featurePrice = 5;
const MAX_CUSTOMERS = 2;
let customerSpawnInterval = 2.5;
let customerSpawnT = 0;
const shelfFrontOf = () => new THREE.Vector3(
  shelf.position.x + (Math.random() - 0.5) * 2,
  0,
  shelf.position.z + 2.3
);
const checkoutFrontOf = () => new THREE.Vector3(

);

function spawnCustomer() {
  const g = new THREE.Group();
  const hue = Math.random();
  const bodyColor = new THREE.Color().setHSL(hue, 0.55, 0.55);
  const b = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.38, 0.8, 4, 8),
    new THREE.MeshLambertMaterial({ color: bodyColor })
  );
  b.position.y = 0.8; b.castShadow = true;
  g.add(b);
  const h = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 12, 10),
    new THREE.MeshLambertMaterial({ color: 0xffd9a0 })
  );
  h.position.y = 1.7; h.castShadow = true;
  g.add(h);
  const carried = new THREE.Mesh(featureGeo, featureMat);
  carried.position.y = 2.1; carried.castShadow = true; carried.visible = false;
  g.add(carried);
  g.position.copy(DOOR_POS);
  g.position.x += (Math.random() - 0.5) * 0.6;
  scene.add(g);
  customers.push({
    group: g, carried,
    state: 'toShelf',
    target: shelfFrontOf(),
    waitT: 0,
  });
}

function updateCustomers(dt) {
  customerSpawnT += dt;
  const spawnInterval = rushActive ? 0.45 : customerSpawnInterval;
  const maxCust = rushActive ? MAX_CUSTOMERS + 4 : MAX_CUSTOMERS;
  if (customerSpawnT > spawnInterval && customers.length < maxCust) {
    customerSpawnT = 0;
    if (shelfState.stock > 0 || customers.length < 2) spawnCustomer();
  }

  for (let i = customers.length - 1; i >= 0; i--) {
    const c = customers[i];

    if (c.state === 'paying') {
      c.waitT -= dt;
      if (c.waitT <= 0) {
        addCash(featurePrice);
        c.carried.visible = false;
        c.state = 'leaving';
        c.target.copy(DOOR_POS);
      }
      continue;
    }

    const tx = c.target.x - c.group.position.x;
    const tz = c.target.z - c.group.position.z;
    const d = Math.hypot(tx, tz);
    if (d > 0.12) {
      c.group.position.x += (tx / d) * CUSTOMER_SPEED * dt;
      c.group.position.z += (tz / d) * CUSTOMER_SPEED * dt;
      c.group.rotation.y = Math.atan2(tx / d, tz / d);
      continue;
    }

    if (c.state === 'toShelf') {
      if (shelfState.stock > 0) {
        shelfState.stock--;
        refreshShelf();
        c.carried.visible = true;
        c.state = 'toCheckout';
        c.target = checkoutFrontOf();
      } else {
        c.waitT = (c.waitT || 0) + dt;
        if (c.waitT > 3) {
          c.state = 'leaving';
          c.target.copy(DOOR_POS);
        }
      }
    } else if (c.state === 'toCheckout') {
      c.state = 'paying';
      c.waitT = 0.7;
    } else if (c.state === 'leaving') {
      scene.remove(c.group);
      customers.splice(i, 1);
    }
  }
}

const employees = [];
const EMP_SPEED = 3;

function deskFront(desk) {
  return { x: desk.pos.x, z: desk.pos.z + 1.3 };

function hireCost() {
  return Math.floor(250 * Math.pow(1.6, employees.length));

function hireEmployee() {

const EMP_REV_INTERVAL = 1.0;  // generate revenue every second
let empRevT = 0;
const COFFEE_BOOST_DUR = 60;   // seconds caffeinated

function updateEmployees(dt) {
  // Passive revenue tick
  empRevT += dt;
  if (empRevT >= EMP_REV_INTERVAL) {
    empRevT = 0;
    for (const e of employees) {
      if (e.state === 'atDesk') {
        addCash(e.caffeinated ? 4 : 2);
      }
    }
  }

  const coffeeAm = amenities.find(a => a.id === 'coffee' && a.isOwned);

  for (const e of employees) {
    // Countdown caffeine
    if (e.caffeinated) {
      e.caffeinatedT -= dt;
      if (e.caffeinatedT <= 0) e.caffeinated = false;
    }

    if (e.state === 'atDesk') {
      e.coffeeWaitT -= dt;
      if (e.coffeeWaitT <= 0 && coffeeAm && coffeeAm.stock > 0) {
        e.need = 'coffee';
        e.state = 'toCoffeeMachine';
        e.target = {
          x: coffeeAm.position.x + (Math.random()-0.5)*0.8,
          z: coffeeAm.position.z + 1.6,
        };
      }
      continue;
    }

    if (e.state === 'gettingCoffee') {
      e.waitT -= dt;
      if (e.waitT <= 0) {
        if (coffeeAm && coffeeAm.stock > 0) {
          coffeeAm.stock--;
          e.caffeinated = true;
          e.caffeinatedT = COFFEE_BOOST_DUR;
        }
        e.need = null;
        e.state = 'goToDesk';
        e.target = deskFront(e.desk);
      }
      continue;
    }

    // Moving
    const tx = e.target.x - e.group.position.x;
    const tz = e.target.z - e.group.position.z;
    const d = Math.hypot(tx, tz);
    if (d > 0.15) {
      e.group.position.x += (tx/d)*EMP_SPEED*dt;
      e.group.position.z += (tz/d)*EMP_SPEED*dt;
      e.group.rotation.y = Math.atan2(tx/d, tz/d);
      continue;
    }

    if (e.state === 'goToDesk') {
      e.state = 'atDesk';
      e.coffeeWaitT = 25 + Math.random() * 20;
    } else if (e.state === 'toCoffeeMachine') {
      e.state = 'gettingCoffee';
      e.waitT = 1.5;
    }
  }
}

const RUSH_CYCLE = 90;   // seconds between rushes
const RUSH_DUR   = 20;   // seconds a rush lasts
let rushT = 0, rushActive = false;
const rushSepEl   = document.getElementById('rush-sep');
const rushLabelEl = document.getElementById('rush-label');
const statusBarEl = document.getElementById('status-bar');

function updateRushHour(dt) {
  rushT += dt;
  if (!rushActive && rushT >= RUSH_CYCLE) {
    rushActive = true; rushT = 0;
    statusBarEl.classList.add('rush');
    rushSepEl.style.display = '';
    rushLabelEl.style.display = '';
    showToast('⚡ Rush Hour! Customers flooding in!', 'rush');
  } else if (rushActive && rushT >= RUSH_DUR) {
    rushActive = false; rushT = 0;
    statusBarEl.classList.remove('rush');
    rushSepEl.style.display = 'none';
    rushLabelEl.style.display = 'none';
    showToast('Rush over — back to normal.', 'rush');
  }
  if (rushActive) {
    const remaining = Math.ceil(RUSH_DUR - rushT);
    rushLabelEl.textContent = `⚡ RUSH ${remaining}s`;
  }
}

const upgLevels = {};
for (const u of UPGRADES) upgLevels[u.id] = 0;
function upgCost(u) {
  return Math.floor(u.base * Math.pow(u.scale, upgLevels[u.id]));
}
function buyUpgrade(id) {
  const u = UPGRADES.find(x => x.id === id);
  if (!u || upgLevels[id] >= u.max) return;
  const cost = upgCost(u);
  if (state.cash < cost) return;
  state.cash -= cost;
  upgLevels[id]++;
  u.apply(upgLevels[id]);
  addCash(0);
}
const upgEl = document.getElementById('upgrades');
function renderUpgrades() {
  // In-place update so we don't rebuild DOM every frame
  if (upgEl.children.length !== UPGRADES.length) {
    upgEl.innerHTML = '';
    for (const u of UPGRADES) {
      const btn = document.createElement('button');
      btn.className = 'upg-btn';
      btn.dataset.id = u.id;
      btn.onclick = () => buyUpgrade(u.id);
      upgEl.appendChild(btn);
    }
  }
  for (const btn of upgEl.children) {
    const u = UPGRADES.find(x => x.id === btn.dataset.id);
    const lv = upgLevels[u.id];
    const maxed = lv >= u.max;
    const cost = upgCost(u);
    btn.disabled = maxed || state.cash < cost;
    btn.innerHTML = `<span class="lvl${maxed ? ' maxed' : ''}">${maxed ? 'MAX' : 'Lv ' + lv}</span>${u.label}` +
      (maxed ? '' : `<span class="cost">$${fmtCash(cost)}</span>`);
  }
}

const HALF = 28;
let last = performance.now();
const ISO = -Math.PI / 4, COS = Math.cos(ISO), SIN = Math.sin(ISO);
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;

  let dx = 0, dz = 0;
  if (keys['w'] || keys['arrowup'])    dz -= 1;
  if (keys['s'] || keys['arrowdown'])  dz += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  let wx = 0, wz = 0;
  if (dx || dz) {
    target = null; // keyboard cancels tap-target
    const len = Math.hypot(dx, dz);
    dx /= len; dz /= len;
    wx = dx * COS - dz * SIN;
    wz = dx * SIN + dz * COS;
  } else if (target) {
    const tx = target.x - player.position.x;
    const tz = target.z - player.position.z;
    const d = Math.hypot(tx, tz);
    if (d < 0.1) target = null;
    else { wx = tx / d; wz = tz / d; }
  }

  if (wx || wz) {
    player.position.x = Math.max(-HALF, Math.min(HALF, player.position.x + wx * playerSpeed * dt));
    player.position.z = Math.max(-HALF, Math.min(HALF, player.position.z + wz * playerSpeed * dt));
    player.rotation.y = Math.atan2(wx, wz);
  }

  currentFloorInst.update(dt);
  updateRushHour(dt);
  updateLabels();

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// --- Save + load ---
const SAVE_KEY = 'startup-tycoon-v3';
function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: 3,
      cash: state.cash,
      allTimeCash: state.allTimeCash,
      upgrades: upgLevels,
      unlocked,
      employees: employees.length,
      workers: workers.length,
      bots: productionBots.length,
      amenities: amenities.filter(a => a.isOwned).map(a => ({ id: a.id, stock: a.stock })),
      savedAt: Date.now(),
    }));
  } catch {}
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    state.cash = p.cash || 0;
    state.allTimeCash = p.allTimeCash || 0;
    if (p.upgrades) {
      for (const u of UPGRADES) {
        const lv = p.upgrades[u.id] || 0;
        for (let i = 1; i <= lv; i++) u.apply(i);
        upgLevels[u.id] = lv;
      }
    }
    if (p.unlocked) Object.assign(unlocked, p.unlocked);
    // Re-hire employees silently (free on load). Temporarily zero out cash
    // checks because these were already paid for in a previous session.
    if (p.employees) {
      const origCash = state.cash;
      state.cash = 1e12;
      for (let i = 0; i < p.employees && i < desks.length; i++) hireEmployee();
      state.cash = origCash;
    }
    if (p.amenities) {
      for (const saved of p.amenities) {
        const am = amenities.find(a => a.id === saved.id);
        if (am && !am.isOwned) {
          am.isOwned = true;
          am.stock = typeof saved.stock === 'number' ? saved.stock : 0;
          buildAmenity(am);
        }
      }
    }
    if (p.workers) {
      const orig = state.cash; state.cash = 1e12;
      for (let i = 0; i < p.workers && workers.length < MAX_WORKERS; i++) hireWorker();
      state.cash = orig;
    }
    // Fast-forward milestone pointer (also unlock desks for milestones already passed)
    while (nextMilestoneIdx < MILESTONES.length && state.allTimeCash >= MILESTONES[nextMilestoneIdx].at) {
      const ms = MILESTONES[nextMilestoneIdx];
      if (ms.desks > 0) unlockMoreDesks(ms.desks);
      nextMilestoneIdx++;
    }
  } catch {}
}

// --- Session timer ---
const sessionChipEl = document.getElementById('session-chip');
const sessionStart = Date.now();
function tickTimer() {
  const s = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(s / 60);
  sessionChipEl.textContent =
    `Session ${m.toString().padStart(2,'0')}m ${(s%60).toString().padStart(2,'0')}s`;
}
tickTimer();
setInterval(tickTimer, 1000);

// Start with 2 production bots running automatically
spawnProductionBot();
spawnProductionBot();

loadGame();
addCash(25);
setInterval(saveGame, 5000);
addEventListener('beforeunload', saveGame);

requestAnimationFrame(loop);
</script>
