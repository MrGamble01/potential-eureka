<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Startup Tycoon</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1a1a2e; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// --- Scene + isometric camera ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfde8d4);

const camera = new THREE.OrthographicCamera();
const ZOOM = 14;
function fitCamera() {
  const a = innerWidth / innerHeight;
  camera.left = -ZOOM * a; camera.right = ZOOM * a;
  camera.top = ZOOM; camera.bottom = -ZOOM;
  camera.near = -100; camera.far = 200;
  camera.updateProjectionMatrix();
}
camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);
fitCamera();

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// --- Lights ---
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
const sc = sun.shadow.camera;
sc.left = -25; sc.right = 25; sc.top = 25; sc.bottom = -25;
sc.near = 0.1; sc.far = 80;
scene.add(sun);

// --- Ground: grass (left) + peach office (right) ---
const grass = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 60),
  new THREE.MeshLambertMaterial({ color: 0x7ec85a })
);
grass.rotation.x = -Math.PI / 2;
grass.position.x = -15;
grass.receiveShadow = true;
scene.add(grass);

const office = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 60),
  new THREE.MeshLambertMaterial({ color: 0xffc99a })
);
office.rotation.x = -Math.PI / 2;
office.position.x = 15;
office.receiveShadow = true;
scene.add(office);

// --- Player (capsule body + sphere head) ---
const player = new THREE.Group();
const body = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.42, 0.9, 4, 10),
  new THREE.MeshLambertMaterial({ color: 0x4a90ff })
);
body.position.y = 0.87;
body.castShadow = true;
player.add(body);
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.34, 14, 12),
  new THREE.MeshLambertMaterial({ color: 0xffd9a0 })
);
head.position.y = 1.85;
head.castShadow = true;
player.add(head);
player.position.set(5, 0, 0);
scene.add(player);

// --- Player head-stack (generic: holds ideas OR features) ---
const MAX_STACK = 10;
const stackGroup = new THREE.Group();
stackGroup.position.y = 2.25;
player.add(stackGroup);
const orbGeo = new THREE.SphereGeometry(0.3, 16, 12);
const orbMat = new THREE.MeshLambertMaterial({
  color: 0xfff066, emissive: 0xfff066, emissiveIntensity: 0.55,
});
const featureGeo = new THREE.BoxGeometry(0.45, 0.45, 0.45);
const featureMat = new THREE.MeshLambertMaterial({ color: 0xff6b9d });

const carry = { kind: null, count: 0 };
const stackOrbs = [], stackBoxes = [];
function makeStackMesh(kind, i) {
  const m = new THREE.Mesh(
    kind === 'feature' ? featureGeo : orbGeo,
    kind === 'feature' ? featureMat : orbMat
  );
  m.castShadow = true;
  m.position.y = i * 0.45;
  stackGroup.add(m);
  return m;
}
function refreshStack() {
  for (const m of stackOrbs) m.visible = false;
  for (const m of stackBoxes) m.visible = false;
  const pool = carry.kind === 'feature' ? stackBoxes : stackOrbs;
  while (pool.length < carry.count) pool.push(makeStackMesh(carry.kind, pool.length));
  for (let i = 0; i < carry.count; i++) pool[i].visible = true;
}

// --- Idea Farm: 3x3 plots growing orbs over time ---
const PLOT_GROW_TIME = 5;
const plots = [];
const plotGeo = new THREE.BoxGeometry(2.4, 0.1, 2.4);
const plotMat = new THREE.MeshLambertMaterial({ color: 0x6b4a2a });
for (let r = 0; r < 3; r++) {
  for (let c = 0; c < 3; c++) {
    const g = new THREE.Group();
    g.position.set(-22 + c * 5, 0, -6 + r * 6);
    const dirt = new THREE.Mesh(plotGeo, plotMat);
    dirt.position.y = 0.05; dirt.receiveShadow = true;
    g.add(dirt);
    const orb = new THREE.Mesh(orbGeo, orbMat);
    orb.position.y = 1.2; orb.castShadow = true; orb.visible = false;
    g.add(orb);
    scene.add(g);
    plots.push({ group: g, orb, t: Math.random() * PLOT_GROW_TIME, ready: false });
  }
}

const PICKUP_R2 = 1.5 * 1.5;
function updateFarm(dt) {
  for (const p of plots) {
    if (!p.ready) {
      p.t += dt;
      if (p.t >= PLOT_GROW_TIME) { p.ready = true; p.orb.visible = true; }
    }
  }
  const bob = Math.sin(performance.now() * 0.003) * 0.12;
  for (const p of plots) if (p.ready) p.orb.position.y = 1.25 + bob;

  if (carry.count >= MAX_STACK) return;
  if (carry.kind && carry.kind !== 'idea') return; // can't mix types
  for (const p of plots) {
    if (!p.ready) continue;
    const dx = p.group.position.x - player.position.x;
    const dz = p.group.position.z - player.position.z;
    if (dx*dx + dz*dz < PICKUP_R2) {
      p.ready = false; p.orb.visible = false; p.t = 0;
      carry.kind = 'idea'; carry.count++; refreshStack();
      if (carry.count >= MAX_STACK) return;
    }
  }
}

// --- Dev Station: ideas → features on a timer ---
const devStation = new THREE.Group();
devStation.position.set(8, 0, -8);

const desk = new THREE.Mesh(
  new THREE.BoxGeometry(2.6, 1, 1.6),
  new THREE.MeshLambertMaterial({ color: 0x9c7a4d })
);
desk.position.y = 0.5; desk.castShadow = true; desk.receiveShadow = true;
devStation.add(desk);

const monitor = new THREE.Mesh(
  new THREE.BoxGeometry(1.3, 0.85, 0.1),
  new THREE.MeshLambertMaterial({ color: 0x222233 })
);
monitor.position.set(0, 1.55, -0.35);
monitor.castShadow = true;
devStation.add(monitor);
const screen = new THREE.Mesh(
  new THREE.PlaneGeometry(1.1, 0.65),
  new THREE.MeshBasicMaterial({ color: 0x6cf7ff })
);
screen.position.set(0, 1.55, -0.29);
devStation.add(screen);
const stand = new THREE.Mesh(
  new THREE.BoxGeometry(0.2, 0.5, 0.18),
  new THREE.MeshLambertMaterial({ color: 0x222233 })
);
stand.position.set(0, 1.05, -0.35);
devStation.add(stand);
scene.add(devStation);

// Queue pile (orbs on desk) + output pile (feature boxes next to desk)
const devQueueGroup = new THREE.Group();
devQueueGroup.position.set(-0.7, 1.05, 0.4);
devStation.add(devQueueGroup);
const devQueueMeshes = [];

const devOutputGroup = new THREE.Group();
devOutputGroup.position.set(1.7, 0, 0);
devStation.add(devOutputGroup);
const devOutputMeshes = [];

const dev = {
  pos: devStation.position,
  queue: 0, output: 0, procT: 0,
  PROC_TIME: 2.5, QUEUE_MAX: 10, OUTPUT_MAX: 10,
};

function refreshPile(group, meshes, count, geo, mat, spacingY) {
  while (meshes.length < count) {
    const m = new THREE.Mesh(geo, mat);
    const i = meshes.length;
    m.position.set((i % 3 - 1) * 0.4, Math.floor(i / 3) * spacingY, (Math.floor(i / 3) % 2) * 0.1);
    m.castShadow = true;
    group.add(m);
    meshes.push(m);
  }
  for (let i = 0; i < meshes.length; i++) meshes[i].visible = i < count;
}

const STATION_R2 = 2.6 * 2.6;
function updateDev(dt) {
  if (dev.queue > 0 && dev.output < dev.OUTPUT_MAX) {
    dev.procT += dt;
    if (dev.procT >= dev.PROC_TIME) {
      dev.procT = 0;
      dev.queue--; dev.output++;
      refreshPile(devQueueGroup, devQueueMeshes, dev.queue, orbGeo, orbMat, 0.4);
      refreshPile(devOutputGroup, devOutputMeshes, dev.output, featureGeo, featureMat, 0.5);
    }
  } else {
    dev.procT = 0;
  }

  const dx = dev.pos.x - player.position.x;
  const dz = dev.pos.z - player.position.z;
  if (dx*dx + dz*dz > STATION_R2) return;

  if (carry.kind === 'idea' && dev.queue < dev.QUEUE_MAX) {
    while (carry.count > 0 && dev.queue < dev.QUEUE_MAX) {
      dev.queue++; carry.count--;
    }
    if (carry.count === 0) carry.kind = null;
    refreshStack();
    refreshPile(devQueueGroup, devQueueMeshes, dev.queue, orbGeo, orbMat, 0.4);
  } else if ((carry.kind === null || carry.kind === 'feature') && dev.output > 0 && carry.count < MAX_STACK) {
    while (dev.output > 0 && carry.count < MAX_STACK) {
      carry.kind = 'feature'; carry.count++; dev.output--;
    }
    refreshStack();
    refreshPile(devOutputGroup, devOutputMeshes, dev.output, featureGeo, featureMat, 0.5);
  }
}

// --- Input ---
const keys = {};
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });
addEventListener('resize', () => { fitCamera(); renderer.setSize(innerWidth, innerHeight); });

// Tap-to-move: project pointer onto ground plane, walk toward target
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
let target = null;
renderer.domElement.addEventListener('pointerdown', e => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hit = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(groundPlane, hit)) target = hit;
});

// --- Loop ---
const SPEED = 6, HALF = 28;
let last = performance.now();
const ISO = -Math.PI / 4, COS = Math.cos(ISO), SIN = Math.sin(ISO);
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;

  let dx = 0, dz = 0;
  if (keys['w'] || keys['arrowup'])    dz -= 1;
  if (keys['s'] || keys['arrowdown'])  dz += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  let wx = 0, wz = 0;
  if (dx || dz) {
    target = null; // keyboard cancels tap-target
    const len = Math.hypot(dx, dz);
    dx /= len; dz /= len;
    wx = dx * COS - dz * SIN;
    wz = dx * SIN + dz * COS;
  } else if (target) {
    const tx = target.x - player.position.x;
    const tz = target.z - player.position.z;
    const d = Math.hypot(tx, tz);
    if (d < 0.1) target = null;
    else { wx = tx / d; wz = tz / d; }
  }

  if (wx || wz) {
    player.position.x = Math.max(-HALF, Math.min(HALF, player.position.x + wx * SPEED * dt));
    player.position.z = Math.max(-HALF, Math.min(HALF, player.position.z + wz * SPEED * dt));
    player.rotation.y = Math.atan2(wx, wz);
  }

  updateFarm(dt);
  updateDev(dt);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
