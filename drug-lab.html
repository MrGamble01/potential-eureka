<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Grow Op — Build Your Empire</title>
<style>
html,body{margin:0;height:100%;background:#0a0a08;overflow:hidden;
  font-family:"Courier New",Lucida Console,monospace;}
canvas{display:block;touch-action:none;}

/* ── HUD ── */
#cash-hud{
  position:fixed;top:14px;right:16px;
  background:rgba(4,10,4,0.92);
  border:1px solid rgba(0,180,60,0.35);
  color:#22dd55;font-weight:900;font-size:20px;
  padding:9px 15px;border-radius:6px;
  display:flex;align-items:center;gap:8px;
  pointer-events:none;user-select:none;
  text-shadow:0 0 8px rgba(34,221,85,0.5);
  letter-spacing:1px;
}
#cash-hud .bill{
  display:inline-block;width:20px;height:12px;border-radius:2px;
  background:linear-gradient(135deg,#1a7a30,#0d4a1a);
  border:1px solid rgba(34,221,85,0.4);
  position:relative;
}
#cash-hud .bill::after{content:"$";position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:#22dd55;font-size:8px;font-weight:900;}

/* ── Heat meter ── */
#heat-hud{
  position:fixed;top:62px;right:16px;
  background:rgba(4,10,4,0.92);
  border:1px solid rgba(180,30,0,0.35);
  border-radius:6px;padding:8px 14px;min-width:160px;
  pointer-events:none;user-select:none;
}
.heat-label{font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:#884422;margin-bottom:5px;}
.heat-bar-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.heat-bar-fill{height:100%;width:0%;border-radius:3px;
  background:linear-gradient(90deg,#f59e0b,#ef4444);
  transition:width 0.4s ease;
  box-shadow:0 0 6px rgba(239,68,68,0.4);}
.heat-val{font-size:11px;font-weight:800;color:#cc4422;margin-top:4px;text-align:right;}

/* ── Act badge ── */
#act-badge{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(4,10,4,0.9);
  border:1px solid rgba(0,180,60,0.2);
  border-radius:6px;padding:5px 14px;
  font-size:11px;font-weight:800;color:#557755;
  letter-spacing:1.5px;text-transform:uppercase;
  pointer-events:none;user-select:none;
}

/* ── Status bar ── */
#status-bar{
  position:fixed;top:48px;left:50%;transform:translateX(-50%);
  background:rgba(4,10,4,0.9);
  border:1px solid rgba(0,180,60,0.15);
  border-radius:6px;padding:4px 12px;
  font-size:11px;font-weight:700;color:#446644;
  pointer-events:none;user-select:none;white-space:nowrap;
}
#status-bar.event-active{
  border-color:rgba(239,68,68,0.5)!important;
  color:#ef4444!important;
  background:rgba(30,5,5,0.95)!important;
  animation:statusPulse 0.6s ease-in-out infinite;
}
@keyframes statusPulse{0%,100%{box-shadow:0 0 6px rgba(239,68,68,0.2);}
  50%{box-shadow:0 0 18px rgba(239,68,68,0.6);}}

/* ── Left panel ── */
#left-panel{
  position:fixed;top:14px;left:14px;
  display:flex;flex-direction:column;gap:7px;
  max-width:210px;user-select:none;
  max-height:calc(100vh - 28px);overflow-y:auto;
}
#left-panel::-webkit-scrollbar{width:4px;}
#left-panel::-webkit-scrollbar-track{background:transparent;}
#left-panel::-webkit-scrollbar-thumb{background:rgba(0,180,60,0.2);border-radius:2px;}

.panel{
  background:rgba(4,10,4,0.92);
  border:1px solid rgba(0,180,60,0.15);
  border-radius:6px;padding:10px 12px;color:#88cc88;
}
.panel-title{
  font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:#446644;margin-bottom:7px;
}
.stat-line{display:flex;justify-content:space-between;
  font-size:11px;font-weight:700;padding:2px 0;color:#88cc88;}

/* ── Action buttons ── */
.act-btn{
  display:block;width:100%;margin-top:5px;
  background:rgba(0,140,40,0.1);border:1px solid rgba(0,180,60,0.28);
  color:#88cc88;border-radius:4px;padding:7px 10px;
  font-weight:700;font-size:11px;font-family:inherit;
  cursor:pointer;text-align:left;transition:all 0.12s;
  letter-spacing:0.3px;
}
.act-btn:hover:not(:disabled){background:rgba(0,140,40,0.22);border-color:rgba(0,200,60,0.5);}
.act-btn:active:not(:disabled){transform:scale(0.98);}
.act-btn:disabled{opacity:0.35;cursor:not-allowed;}
.act-btn .cost{float:right;color:#22dd55;font-size:10px;font-weight:900;}
.act-btn.danger{background:rgba(140,20,0,0.12);border-color:rgba(200,40,0,0.3);color:#cc5533;}
.act-btn.danger:hover:not(:disabled){background:rgba(140,20,0,0.25);}
.act-btn.locked{background:rgba(0,0,0,0.1);border-color:rgba(255,255,255,0.06);color:#334433;}

/* ── Upgrade buttons ── */
.upg-btn{
  display:block;width:100%;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  border-radius:4px;padding:7px 10px;
  font-weight:600;text-align:left;cursor:pointer;
  color:#88cc88;font-size:11px;font-family:inherit;transition:all 0.12s;
}
.upg-btn:hover:not(:disabled){background:rgba(0,140,40,0.12);border-color:rgba(0,180,60,0.25);}
.upg-btn:disabled{opacity:0.4;cursor:not-allowed;}
.upg-btn .lvl{
  float:right;background:rgba(0,140,40,0.3);color:#55cc55;
  padding:1px 6px;border-radius:4px;font-size:9px;font-weight:800;
}
.upg-btn .lvl.maxed{background:rgba(200,160,0,0.3);color:#ddbb00;}
.upg-btn .cost{display:block;color:#22dd55;font-size:10px;margin-top:2px;font-weight:700;}
.upg-cat{
  font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:#334433;
  padding:5px 2px 2px;margin-top:3px;
  border-top:1px solid rgba(255,255,255,0.05);
}
.upg-cat:first-child{border-top:none;margin-top:0;}

/* ── Labels overlay ── */
#labels{position:fixed;inset:0;pointer-events:none;z-index:5;}
#labels>div{
  position:absolute;top:0;left:0;
  background:rgba(4,10,4,0.9);color:#88cc88;
  padding:2px 7px;border-radius:4px;
  font-weight:700;font-size:10px;white-space:nowrap;
  transform:translate(-50%,-100%);
  border:1px solid rgba(0,180,60,0.15);
  font-family:"Courier New",monospace;
}
#labels>div.bubble{background:rgba(4,10,4,0.95);color:#22dd55;font-size:13px;padding:1px 5px;}
#labels>div.ready{background:rgba(0,120,40,0.8);color:#aaffaa;font-size:10px;}
#labels>div.heat-pop{background:rgba(180,30,0,0.85);color:#ffaaaa;font-size:10px;}
#labels>div.prompt{background:rgba(200,160,0,0.85);color:#fff;font-size:10px;}

/* ── Toast notifications ── */
#toast-container{
  position:fixed;bottom:80px;right:16px;
  display:flex;flex-direction:column;gap:6px;
  pointer-events:none;z-index:50;max-width:260px;
}
.toast{
  background:rgba(4,10,4,0.97);color:#88cc88;
  padding:9px 13px;border-radius:6px;
  font-weight:700;font-size:12px;font-family:"Courier New",monospace;
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
  animation:toastIn 0.22s ease,toastOut 0.3s ease 2.7s forwards;
  border:1px solid rgba(0,180,60,0.2);
  border-left:3px solid #22dd55;
}
@keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px);}}
.toast.bust{border-left-color:#ef4444;color:#ffaaaa;}
.toast.event{border-left-color:#f59e0b;color:#ffddaa;}
.toast.good{border-left-color:#22dd55;color:#aaffaa;}
.toast.info{border-left-color:#5599ff;color:#aaccff;}

/* ── Cash pops ── */
.cash-pop{
  position:fixed;color:#22dd55;font-weight:900;font-size:15px;
  pointer-events:none;z-index:20;font-family:"Courier New",monospace;
  text-shadow:0 0 8px rgba(34,221,85,0.6);
  animation:cashPop 1.3s ease forwards;white-space:nowrap;
}
@keyframes cashPop{
  0%{opacity:1;transform:translateY(0) scale(1);}
  50%{opacity:1;transform:translateY(-30px) scale(1.1);}
  100%{opacity:0;transform:translateY(-55px) scale(0.9);}
}
.heat-pop{color:#ef4444;text-shadow:0 0 8px rgba(239,68,68,0.6);}

/* ── Event modal ── */
#event-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.8);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;z-index:200;
}
#event-modal.open{display:flex;animation:evFade 0.2s ease;}
@keyframes evFade{from{opacity:0;}to{opacity:1;}}
.ev-panel{
  background:rgba(4,10,4,0.98);
  border:1px solid rgba(0,180,60,0.2);
  border-radius:10px;padding:24px 22px;max-width:360px;width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);font-family:"Courier New",monospace;
}
.ev-icon{font-size:36px;text-align:center;margin-bottom:10px;}
.ev-title{font-size:17px;font-weight:900;color:#aaffaa;margin-bottom:6px;text-align:center;}
.ev-body{font-size:12px;color:#557755;line-height:1.6;margin-bottom:18px;}
.ev-choices{display:flex;flex-direction:column;gap:8px;}
.ev-choice{
  background:rgba(0,140,40,0.1);border:1px solid rgba(0,180,60,0.3);
  color:#88cc88;border-radius:6px;padding:10px 14px;
  font-weight:700;font-size:12px;font-family:inherit;
  cursor:pointer;text-align:left;transition:all 0.12s;
}
.ev-choice:hover{background:rgba(0,140,40,0.25);border-color:rgba(0,200,60,0.5);}
.ev-choice.risky{border-color:rgba(200,60,0,0.4);background:rgba(140,30,0,0.12);color:#cc8866;}
.ev-choice.risky:hover{background:rgba(140,30,0,0.25);}
.ev-effect{font-size:10px;color:#334433;margin-top:3px;font-style:italic;}

/* ── Bust modal ── */
#bust-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.9);
  display:none;align-items:center;justify-content:center;z-index:300;
}
#bust-modal.open{display:flex;animation:bustIn 0.4s ease;}
@keyframes bustIn{from{opacity:0;}to{opacity:1;}}
.bust-panel{
  background:rgba(15,4,4,0.99);
  border:1px solid rgba(239,68,68,0.5);
  border-radius:12px;padding:30px 28px;max-width:380px;width:90vw;
  text-align:center;box-shadow:0 0 60px rgba(239,68,68,0.3);
  font-family:"Courier New",monospace;
}
.bust-icon{font-size:48px;margin-bottom:12px;}
.bust-title{font-size:26px;font-weight:900;color:#ef4444;margin-bottom:8px;letter-spacing:2px;}
.bust-sub{font-size:13px;color:#884444;line-height:1.6;margin-bottom:20px;}
.bust-stats{font-size:12px;color:#664444;margin-bottom:20px;
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,0,0,0.1);
  border-radius:6px;padding:12px;}
.bust-stats .row{display:flex;justify-content:space-between;padding:2px 0;}
.bust-stats strong{color:#ff6644;}
.bust-restart{
  background:rgba(140,20,0,0.2);border:1px solid rgba(200,40,0,0.4);
  color:#ff8866;border-radius:6px;padding:10px 22px;
  font-weight:800;font-size:13px;font-family:inherit;cursor:pointer;
}
.bust-restart:hover{background:rgba(140,20,0,0.38);}

/* ── Activity feed ── */
#activity-feed{
  position:fixed;top:185px;right:16px;
  background:rgba(4,10,4,0.92);
  border:1px solid rgba(0,180,60,0.12);
  border-radius:6px;padding:9px 12px;
  width:178px;max-height:calc(100vh - 210px);overflow:hidden;
  pointer-events:none;user-select:none;
}
.feed-title{font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:#334433;margin-bottom:6px;}
.feed-entry{font-size:10px;font-weight:600;color:#557755;
  padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.04);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;}
.feed-entry.fresh{color:#88cc88;}
.feed-entry:last-child{border-bottom:none;}

/* ── Back button ── */
#back-btn{
  position:fixed;bottom:16px;left:16px;
  background:rgba(4,10,4,0.9);border:1px solid rgba(0,180,60,0.25);
  color:#557755;font-size:12px;font-weight:700;font-family:inherit;
  padding:8px 14px;border-radius:6px;cursor:pointer;
  text-decoration:none;display:flex;align-items:center;gap:6px;
  transition:all 0.15s;
}
#back-btn:hover{background:rgba(0,140,40,0.15);color:#88cc88;}

/* ── Red flash overlay for DEA raid ── */
#raid-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:150;
  background:rgba(180,0,0,0);
  animation:none;
}
#raid-overlay.active{animation:raidFlash 0.5s ease-in-out infinite;}
@keyframes raidFlash{0%,100%{background:rgba(180,0,0,0);}50%{background:rgba(180,0,0,0.12);}}

/* ── Grow meter on plants ── */
.grow-bar{
  position:absolute;bottom:0;left:0;right:0;height:4px;
  background:rgba(0,180,60,0.15);border-radius:2px;overflow:hidden;
}
</style>
</head>

<div id="raid-overlay"></div>
<div id="act-badge">ACT I — THE GARAGE</div>
<div id="status-bar">Tending the plants...</div>
<div id="labels"></div>

</div>

<script type="module">
import * as THREE from 'three';

// ── Save key (separate from startup game) ──
const LS_KEY = 'drug-lab-v1';

// ── Game state ──
let state = {
  cash: 50,
  totalEarned: 0,
  totalSold: 0,
  heat: 0,
  upgrades: {},
  ownedRooms: ['garage'],
  trimmers: 0,
  lookouts: 0,
  runners: 0,
  cooks: 0,
  batches: 0,
  sessionStart: Date.now(),
};

// ── Upgrade definitions ──
const UPG = [
  {id:'lights1',  name:'Better Grow Lights',    icon:'💡', cat:'Grow Op',       maxLv:3, base:120, mult:2.2, desc:'Plants grow 30% faster per level'},
  {id:'yield1',   name:'Bigger Yield',           icon:'🌿', cat:'Grow Op',       maxLv:4, base:200, mult:2.0, desc:'+20% product per harvest per level'},
  {id:'potsize',  name:'Larger Pots',            icon:'🪴', cat:'Grow Op',       maxLv:2, base:350, mult:2.5, desc:'Double the plant capacity'},
  {id:'trim',     name:'Electric Trimmer',       icon:'✂️', cat:'Processing',    maxLv:3, base:180, mult:2.0, desc:'Trim 25% faster per level'},
  {id:'bags',     name:'Vac-Seal Bags',          icon:'📦', cat:'Processing',    maxLv:3, base:250, mult:2.0, desc:'+15% sale price per level'},
  {id:'network',  name:'Distribution Network',   icon:'🚗', cat:'Sales',         maxLv:4, base:400, mult:1.8, desc:'Buyers arrive 30% faster per level'},
  {id:'price',    name:'Premium Product',        icon:'💎', cat:'Sales',         maxLv:3, base:500, mult:2.2, desc:'+40% sale price per level'},
  {id:'lookout_sys',name:'Lookout System',       icon:'📡', cat:'Security',      maxLv:3, base:300, mult:2.0, desc:'Heat builds 20% slower per level'},
  {id:'cleanup',  name:'Clean Operation',        icon:'🧹', cat:'Security',      maxLv:2, base:600, mult:2.5, desc:'Heat drains 25% faster per level'},
  {id:'chemistry',name:'Chemistry Equipment',    icon:'⚗️', cat:'The Next Level',maxLv:1, base:2500,mult:1.0, desc:'Unlock the cook station — harder product, way more $'},
];

// ── Room definitions ──
const ROOM_DEFS = [
  {id:'garage',  gx:0,gz:0, cost:0,    label:'🏠 The Garage',     act:1},
  {id:'growroom',gx:1,gz:0, cost:600,  label:'🌿 Grow Room',      act:1},
  {id:'basement',gx:0,gz:1, cost:2000, label:'🔒 The Basement',   act:2},
  {id:'security',gx:-1,gz:0,cost:4000, label:'👁️ Security Post',  act:2},
  {id:'lab',     gx:0,gz:-1,cost:12000,label:'⚗️ The Lab',        act:3},
  {id:'warehouse',gx:1,gz:1,cost:8000, label:'📦 Warehouse',      act:2},
  {id:'front',   gx:-1,gz:1,cost:20000,label:'💈 Laundry Front',  act:3},
  {id:'penthouse',gx:1,gz:-1,cost:50000,label:'👑 Penthouse',     act:3},
];

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1108);
scene.fog = new THREE.Fog(0x0d1108, 30, 55);

const camera = new THREE.OrthographicCamera();
let cameraZoom = 12;
const ZOOM_MIN = 6, ZOOM_MAX = 22;
function fitCamera() {
  const a = innerWidth / innerHeight;
  camera.left = -cameraZoom * a; camera.right = cameraZoom * a;
  camera.top = cameraZoom; camera.bottom = -cameraZoom;
  camera.near = -100; camera.far = 200;
  camera.updateProjectionMatrix();
}
let panX = 0, panZ = 0;
function applyCamera() {
  camera.position.set(20 + panX, 20, 20 + panZ);
  camera.lookAt(panX, 0, panZ);
}
applyCamera(); fitCamera();

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => { fitCamera(); renderer.setSize(innerWidth, innerHeight); });

// ── Lights ──
const ambLight = new THREE.AmbientLight(0x1a2a14, 0.8);
scene.add(ambLight);
const sun = new THREE.DirectionalLight(0x88aa66, 0.6);
sun.position.set(12, 25, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -50; sun.shadow.camera.right = 50;
sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50;
sun.shadow.bias = -0.001;

// ── Screen-space utility ──

// ── stepToward (shared NPC walker) ──
function stepToward(obj, tx, tz, speed, dt) {
  const dx = tx - obj.position.x, dz = tz - obj.position.z;
  const dist = Math.sqrt(dx*dx + dz*dz);
  if (dist < 0.05) return true;
  const step = Math.min(dist, speed * dt);
  obj.position.x += (dx/dist)*step;
  obj.position.z += (dz/dist)*step;
  // Face direction
  if (dist > 0.01) obj.rotation.y = Math.atan2(dx, dz);
  return false;
}

// ── Room building ──
const ownedRoomSet = new Set(['garage']);
const roomMeshes = {};

const PALETTE = {
  garage:    {floor:0x2a2a22, wall:0x3a3530},
  growroom:  {floor:0x1a2a1a, wall:0x243824},
  basement:  {floor:0x1e1e24, wall:0x2a2a30},
  security:  {floor:0x1e1e1e, wall:0x282828},
  lab:       {floor:0x1a2420, wall:0x203028},
  warehouse: {floor:0x242420, wall:0x302e28},
  front:     {floor:0x282418, wall:0x383020},
  penthouse: {floor:0x181820, wall:0x242230},
};

function roomCenter(def) {
  return {cx: def.gx * 16, cz: def.gz * 16};
}

function buildRoom(def) {
  const pal = PALETTE[def.id] || {floor:0x222222, wall:0x333333};
  const {cx, cz} = roomCenter(def);
  const floorMat = new THREE.MeshLambertMaterial({color: pal.floor});
  const wallMat  = new THREE.MeshLambertMaterial({color: pal.wall});
  const meshes = {floor:null, walls:[], decor:[]};

  // Floor
  const floor = new THREE.Mesh(new THREE.BoxGeometry(16, 0.2, 16), floorMat);
  floor.position.set(cx, -0.1, cz);
  floor.receiveShadow = true;
  scene.add(floor); meshes.floor = floor;

  // Walls (outer only; shared walls removed when neighbor unlocked)
  const wallDefs = [
    {pos:[cx,1.5,cz-8], geo:[16.4,3,0.25], key:`${def.gx},${def.gz}:${def.gx},${def.gz-1}`},
    {pos:[cx,1.5,cz+8], geo:[16.4,3,0.25], key:`${def.gx},${def.gz}:${def.gx},${def.gz+1}`},
    {pos:[cx-8,1.5,cz], geo:[0.25,3,16.4], key:`${def.gx},${def.gz}:${def.gx-1},${def.gz}`},
    {pos:[cx+8,1.5,cz], geo:[0.25,3,16.4], key:`${def.gx},${def.gz}:${def.gx+1},${def.gz}`},
  ];
  for (const wd of wallDefs) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...wd.geo), wallMat);
    m.position.set(...wd.pos); m.castShadow = true; m.receiveShadow = true;
    scene.add(m); meshes.walls.push(m);
  }

  // Overhead light
  const pt = new THREE.PointLight(def.id === 'growroom' ? 0x9955ff : 0xaaffaa, 0.5, 20);
  pt.position.set(cx, 5, cz);
  scene.add(pt); meshes.decor.push(pt);

  // Fixture
  const fix = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.1,0.6),
    new THREE.MeshLambertMaterial({color:0x111111}));
  fix.position.set(cx, 3.9, cz); scene.add(fix); meshes.decor.push(fix);

  roomMeshes[def.id] = meshes;

  // Remove shared wall with already-owned neighbor
  removeSharedWalls(def);
}

function removeSharedWalls(def) {
  // Check all 4 directions
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (const [dg,dz] of dirs) {
    const ngx = def.gx + dg, ngz = def.gz + dz;
    const neighbor = ROOM_DEFS.find(r => r.gx===ngx && r.gz===ngz);
    if (!neighbor || !ownedRoomSet.has(neighbor.id)) continue;
    // Remove shared walls between def and neighbor
    removeWallBetween(def, neighbor);
    removeWallBetween(neighbor, def);
  }
}

function removeWallBetween(a, b) {
  const meshes = roomMeshes[a.id];
  if (!meshes) return;
  const {cx:ax,cz:az} = roomCenter(a);
  const {cx:bx,cz:bz} = roomCenter(b);
  // Find the wall mesh that faces b
  const dx = bx-ax, dz = bz-az;
  const toRemove = [];
  for (const m of meshes.walls) {
    const mx = m.position.x - ax, mz = m.position.z - az;
    // Wall is on the correct edge if its offset direction matches
    if (Math.abs(dx)>0 && Math.sign(mx)===Math.sign(dx) && Math.abs(mz)<2) toRemove.push(m);
    if (Math.abs(dz)>0 && Math.sign(mz)===Math.sign(dz) && Math.abs(mx)<2) toRemove.push(m);
  }
  for (const m of toRemove) {
    scene.remove(m);
    meshes.walls.splice(meshes.walls.indexOf(m),1);
  }
}

const growPlots = [];

function upgLv(id) { return state.upgrades[id] || 0; }
function growTime() { return GROW_TIME_BASE / (1 + upgLv('lights1') * 0.3); }
function yieldCount() { return 1 + Math.floor(upgLv('yield1') * 0.4); }

function buildGrowPlot(x, z, roomId) {
  const g = new THREE.Group();
  scene.add(g);

  // Pot
  const potMat = new THREE.MeshLambertMaterial({color:0x2a1a0e});
  const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.32,0.55,10), potMat);
  pot.position.set(x, 0.27, z); pot.castShadow = true; scene.add(pot);

  // Soil
  const soil = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.06,10),
    new THREE.MeshLambertMaterial({color:0x1a1208}));
  soil.position.set(x, 0.57, z); scene.add(soil);

  // UV light above
  const uvLight = new THREE.PointLight(0x8833ee, 0.6, 5);
  uvLight.position.set(x, 3.8, z);
  scene.add(uvLight);

  // Light fixture bar
  const bar = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.08,0.22),
    new THREE.MeshLambertMaterial({color:0x111111, emissive:0x220033, emissiveIntensity:0.4}));
  bar.position.set(x, 3.85, z); scene.add(bar);

  // Plant group (grows over time)
  const plantG = new THREE.Group();
  plantG.position.set(x, 0.6, z);
  scene.add(plantG);

  const plot = {
    x, z, roomId,
    pot, soil, plantG, uvLight, bar,
    progress: Math.random() * 0.3, // stagger starts
    ready: false,
    hasBud: false, // bud picked up by player
    stage: -1,
  };
  growPlots.push(plot);
  updatePlantMesh(plot);
  return plot;
}

function updatePlantMesh(plot) {
  const {plantG, progress} = plot;
  // Clear old
  while (plantG.children.length) plantG.remove(plantG.children[0]);
  if (progress <= 0.01) { plot.stage = 0; return; }

  const stage = progress < 0.35 ? 1 : progress < 0.7 ? 2 : 3;
  if (stage === plot.stage) return;
  plot.stage = stage;

  const greenShade = stage === 3 ? 0x22cc44 : stage === 2 ? 0x2a8a2a : 0x1a5a1a;
  const mat = new THREE.MeshLambertMaterial({
    color: greenShade,
    emissive: stage === 3 ? 0x114411 : 0x000000,
    emissiveIntensity: stage === 3 ? 0.4 : 0,
  });
  const h = 0.25 + stage * 0.3;
  // Main stalk
  const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,h,6), mat);
  stalk.position.y = h/2; plantG.add(stalk);
  // Leaf fans
  const leafCount = 2 + stage;
  for (let i = 0; i < leafCount; i++) {
    const angle = (i/leafCount)*Math.PI*2;
    const leafMat = new THREE.MeshLambertMaterial({
      color: greenShade,
      emissive: stage===3 ? 0x0a2a0a : 0x000000,
      emissiveIntensity: stage===3 ? 0.3 : 0,
    });
    const leaf = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.04, 0.3 + stage*0.1), leafMat);
    leaf.position.set(Math.cos(angle)*0.22, h*0.65, Math.sin(angle)*0.22);
    leaf.rotation.y = angle; leaf.rotation.z = 0.4;
    leaf.castShadow = true;
    plantG.add(leaf);
  }
  // Buds on stage 3
  if (stage === 3) {
    const budMat = new THREE.MeshLambertMaterial({
      color:0x44dd44, emissive:0x00aa00, emissiveIntensity:0.5});
    const bud = new THREE.Mesh(new THREE.SphereGeometry(0.14,8,6), budMat);
    bud.position.y = h + 0.14; plantG.add(bud);
  }
}

// ── Steam particles ──
const steamParticles = [];
const steamPool = [];
function getOrCreateSteam() {
  if (steamPool.length) return steamPool.pop();
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.06,6,5),
    new THREE.MeshBasicMaterial({color:0xaaffaa, transparent:true, opacity:0.4}));
  scene.add(m); return m;
}
function spawnSteam(x,z) {
  const m = getOrCreateSteam();
  m.position.set(x+(Math.random()-0.5)*0.3, 1.2, z+(Math.random()-0.5)*0.3);
  m.visible = true;
  m.material.opacity = 0.35 + Math.random()*0.2;
  steamParticles.push({mesh:m, vy:0.4+Math.random()*0.3, life:1.0});
}
function updateSteam(dt) {
  for (let i = steamParticles.length-1; i>=0; i--) {
    const p = steamParticles[i];
    p.life -= dt*0.5;
    p.mesh.position.y += p.vy*dt;
    p.mesh.position.x += (Math.random()-0.5)*0.02;
    p.mesh.material.opacity = Math.max(0, p.life * 0.4);
    const s = 1 + (1-p.life)*1.5;
    p.mesh.scale.setScalar(s);
    if (p.life <= 0) {
      p.mesh.visible = false;
      steamPool.push(p.mesh);
      steamParticles.splice(i,1);
    }
  }
}

// ── Expand panel ──
function renderExpandPanel() {
  const el = document.getElementById('expand-list');
  el.innerHTML = '';
  for (const def of ROOM_DEFS) {
    if (def.id==='garage') continue;
    if (ownedRoomSet.has(def.id)) {
      const d = document.createElement('div');
      d.style.cssText='font-size:10px;color:#335533;padding:2px 0;';
      d.textContent='✓ '+def.label;
      el.appendChild(d);
      continue;
    }
    const btn = document.createElement('button');
    btn.className='act-btn'+(state.cash<def.cost?' locked':'');
    btn.disabled = state.cash<def.cost;
    const need = def.cost-state.cash;
    btn.innerHTML=`${def.label}<span class="cost">${state.cash>=def.cost?'$'+fmtCash(def.cost):'Need $'+fmtCash(need)}</span>`;
    btn.onclick = () => buyRoom(def.id);
    el.appendChild(btn);
  }
  if (el.children.length===0) {
    el.innerHTML='<div style="font-size:10px;color:#22dd55;padding:4px 0">Full empire unlocked.</div>';
  }
}

function buyRoom(id) {
  const def = ROOM_DEFS.find(r=>r.id===id);
  if (!def||ownedRoomSet.has(id)||state.cash<def.cost) return;
  state.cash -= def.cost;
  ownedRoomSet.add(id);
  state.ownedRooms.push(id);
  buildRoom(def);
  onRoomUnlocked(id);
  refreshHud();
  renderExpandPanel();
  showToast(`${def.label} unlocked!`, 'good');
  addFeed(`🏗️ ${def.label} opened`);
  saveGame();
}

function onRoomUnlocked(id) {
  const def = ROOM_DEFS.find(r=>r.id===id);
  const {cx,cz} = roomCenter(def);
  // Add grow plots for grow rooms
  if (id==='growroom') {
    buildGrowPlot(cx-3, cz-3, id);
    buildGrowPlot(cx+3, cz-3, id);
    buildGrowPlot(cx-3, cz+3, id);
    buildGrowPlot(cx+3, cz+3, id);
  }
  if (id==='basement') {
    buildGrowPlot(cx-2, cz-2, id);
    buildGrowPlot(cx+2, cz-2, id);
  }
  if (id==='lab' && !chemStation) {
    buildChemStation(cx, cz);
    showToast('⚗️ Chemistry Station built! Time to cook.', 'info');
  }
}

// ── Upgrades panel ──
function upgCost(u) { return Math.floor(u.base * Math.pow(u.mult, upgLv(u.id))); }

function renderUpgradesPanel() {
  const el = document.getElementById('upgrades-panel');
  el.innerHTML = '<div class="panel-title">🔧 Upgrades</div>';
  let lastCat = '';
  for (const u of UPG) {
    const lv = upgLv(u.id);
    if (lv >= u.maxLv && u.id==='chemistry') continue; // hide if bought
    // Lock chemistry until act 2
    if (u.cat==='The Next Level' && currentAct()<2) continue;
    if (u.cat !== lastCat) {
      const cat = document.createElement('div');
      cat.className='upg-cat'; cat.textContent=u.cat;
      el.appendChild(cat); lastCat=u.cat;
    }
    const cost = upgCost(u);
    const maxed = lv>=u.maxLv;
    const btn = document.createElement('button');
    btn.className='upg-btn';
    btn.disabled = maxed || state.cash<cost;
    const lvEl = maxed?`<span class="lvl maxed">MAX</span>`:`<span class="lvl">Lv${lv}</span>`;
    btn.innerHTML=`${u.icon} ${u.name} ${lvEl}${!maxed?`<span class="cost">$${fmtCash(cost)} · ${u.desc}</span>`:''}`;
    if (!maxed) btn.onclick = () => buyUpgrade(u.id);
    el.appendChild(btn);
  }
}

function buyUpgrade(id) {
  const u = UPG.find(x=>x.id===id);
  if (!u) return;
  const cost = upgCost(u);
  if (state.cash<cost || upgLv(id)>=u.maxLv) return;
  state.cash -= cost;
  state.upgrades[id] = (state.upgrades[id]||0)+1;
  if (id==='chemistry' && !chemStation) {
    // Find lab room center or use garage back
    const labDef = ROOM_DEFS.find(r=>r.id==='lab');
    if (ownedRoomSet.has('lab')) {
      const {cx,cz}=roomCenter(labDef);
      buildChemStation(cx, cz);
    } else {
      buildChemStation(-6, -5);
    }
    showToast('⚗️ Chemistry Station built! Now you\'re cooking.','good');
    addFeed('⚗️ Chemistry unlocked');
  }
  showToast(`${u.icon} ${u.name} upgraded!`,'good');
  addFeed(`🔧 ${u.name} Lv${state.upgrades[id]}`);
  saveGame();
  refreshHud();
  renderUpgradesPanel();
}

function saveGame() {
  const sv = {
    cash:state.cash, totalEarned:state.totalEarned, totalSold:state.totalSold,
    heat:state.heat, upgrades:state.upgrades,
    ownedRooms:[...ownedRoomSet],
    trimmers:state.trimmers, lookouts:state.lookouts,
    runners:state.runners||0, cooks:state.cooks||0,
    batches:state.batches, sessionStart:state.sessionStart,
    stashCount, trimQueue, trimBags,
  };
  try{localStorage.setItem(LS_KEY, JSON.stringify(sv));}catch(e){}
}
function loadGame() {
  try{
    const sv = JSON.parse(localStorage.getItem(LS_KEY)||'null');
    if(!sv) return;
    state.cash=sv.cash||50;
    state.totalEarned=sv.totalEarned||0;
    state.totalSold=sv.totalSold||0;
    state.heat=Math.min(99,sv.heat||0); // don't load at 100
    state.upgrades=sv.upgrades||{};
    state.trimmers=sv.trimmers||0;
    state.lookouts=sv.lookouts||0;
    state.runners=sv.runners||0;
    state.cooks=sv.cooks||0;
    state.batches=sv.batches||0;
    state.sessionStart=sv.sessionStart||Date.now();
    stashCount=sv.stashCount||0;
    trimQueue=sv.trimQueue||0;
    trimBags=sv.trimBags||0;
    // Restore rooms
    for(const id of (sv.ownedRooms||['garage'])) {
      if(id==='garage') continue;
      const def=ROOM_DEFS.find(r=>r.id===id);
      if(def && !ownedRoomSet.has(id)){
        ownedRoomSet.add(id); state.ownedRooms.push(id);
        buildRoom(def); onRoomUnlocked(id);
      }
    }
    // Restore chem station if chemistry upgrade bought
    if((state.upgrades['chemistry']||0)>=1 && !chemStation) {
      const labDef=ROOM_DEFS.find(r=>r.id==='lab');
      if(ownedRoomSet.has('lab')){const{cx,cz}=roomCenter(labDef);buildChemStation(cx,cz);}
      else buildChemStation(-6,-5);
    }
    // Restore crew NPCs
    for(let i=0;i<state.trimmers;i++){
      const g=buildTrimmerNPC();
      g.position.set(trimStation.x+(Math.random()-0.5)*2,0,trimStation.z+(Math.random()-0.5)*2);
      scene.add(g); trimmerNPCs.push({group:g,state:'idle',timer:0});
    }
    for(let i=0;i<state.lookouts;i++){
      const g=buildLookoutNPC();
      g.position.set(6+(Math.random()-0.5)*3,0,7+(Math.random()-0.5)*3);
      scene.add(g); lookoutNPCs.push({group:g,patrolAngle:Math.random()*Math.PI*2,patrolRadius:4+Math.random()*2});
    }
  }catch(e){console.warn('Load failed',e);}
}

loadGame();

// ── Main game loop ──
let lastTime = performance.now();
let autoSaveTimer = 0;
let statusMsg = 'Tending the plants...';
let statusTimer = 0;

function setStatus(msg, duration=4) {
  statusMsg=msg; statusTimer=duration;
  document.getElementById('status-bar').textContent=msg;
}


// ── Update grow plots ──
function updateGrowPlots(dt) {
  const speed = 1/growTime();
  for (const p of growPlots) {
    if (p.ready) continue;
    p.progress = Math.min(1, p.progress + speed*dt);
    if (p.progress>=1 && !p.ready) {
      p.ready=true;
      setLabel('plot_'+growPlots.indexOf(p),'🌿 Ready!', p.x, 1.8, p.z, 'ready');
    }
    if (p.stage !== Math.floor(p.progress*3)+1) updatePlantMesh(p);
    // UV flicker
    p.uvLight.intensity = 0.5 + Math.sin(now()*3+p.x)*0.1;
  }
}
function now(){return performance.now()/1000;}

// ── Update trim station ──
let trimAutoTimer = 0;
function updateTrimStation(dt) {
  if (trimQueue<=0) return;
  const speedMult = 1 + upgLv('trim')*0.25 + trimmerNPCs.length*0.4;
  trimProgress += (dt/TRIM_TIME)*speedMult;
  if (trimProgress>=1) {
    trimProgress=0; trimQueue--;
    const bags = 1 + upgLv('yield1');
    trimBags += bags; state.batches++;
    addFeed(`✂️ Trimmed batch → ${bags} bags`);
  }
  // Auto trimmer NPCs work their way toward station
  for (const t of trimmerNPCs) {
    if (trimQueue>0) {
      stepToward(t.group, trimStation.x+(Math.random()-0.5)*0.8, trimStation.z+1, 2.5, dt);
      // Arm swing animation
      const ag = t.group.children.find(c=>c instanceof THREE.Group);
    }
  }
}

// ── Update chemistry station ──
function updateChemStation_tick(dt) {
  if (!chemStation) return;
  if (chemQueue<=0) return;
  const speedMult = 1 + (state.cooks||0)*0.5;
  chemProgress += (dt/CHEM_TIME)*speedMult;
  if (chemProgress>=1) {
    chemProgress=0; chemQueue--;
    chemProduct+=2; state.batches++;
    addFeed('⚗️ Batch cooked → 2 units');
    setLabel('chem',`⚗️ Cook Station [${chemProduct} units]`, chemStation.x, 2.2, chemStation.z);
  }
  // Steam from station
  if (Math.random()<dt*3) spawnSteam(chemStation.x, chemStation.z);
  // Glow flicker
  chemStation.burnerLight.intensity = 0.6 + Math.sin(now()*8)*0.25;
}

// ── Update player ──
function updatePlayer(dt) {
  const spd = playerSpeed();
  // WASD movement override
  let moved=false;
  if(keys['KeyW']||keys['ArrowUp'])    {player.position.z-=spd*dt;moved=true;}
  if(keys['KeyS']||keys['ArrowDown'])  {player.position.z+=spd*dt;moved=true;}
  if(keys['KeyA']||keys['ArrowLeft'])  {player.position.x-=spd*dt;moved=true;}
  if(keys['KeyD']||keys['ArrowRight']) {player.position.x+=spd*dt;moved=true;}
  if(moved) { pState='idle'; pTarget=null; }

  // Walk-to target (click)
  if (pState==='walkTo' && pTarget) {
    const arrived = stepToward(player, pTarget.x, pTarget.z, spd, dt);
    if(arrived) {pState='idle'; pTarget=null;}
  }

  // Walk arm swing
  const armL = player.userData.armL;
  const armR = player.userData.armR;
  if(armL && armR) {
    const swing = Math.sin(now()*6)*0.25;
    armL.rotation.x = swing; armR.rotation.x = -swing;
  }

  // Proximity checks
  const px=player.position.x, pz=player.position.z;

  // Near a ready plot — auto-prompt
  if (!pCarrying) {
    for (const p of growPlots) {
      const dx=px-p.x, dz=pz-p.z;
      if(dx*dx+dz*dz < 2.5 && p.ready) {
        harvestPlot(p); break;
      }
    }
  }

  // Near trim station with bud
  if(pCarrying==='bud') {
    if((px-trimStation.x)**2+(pz-trimStation.z)**2 < 3.5) {
      depositAtTrim();
    }
  }

  // Near stash with bags (from trimming or chem)
  if(pCarrying==='bag') {
    if((px-stashNode.x)**2+(pz-stashNode.z)**2 < 4) {
      depositAtStash();
    }
  }

  // Pick up trimmed bags from trim station
  if(!pCarrying && trimBags>0) {
    if((px-trimStation.x)**2+(pz-trimStation.z)**2 < 3) {
      pickupBagsFromTrim();
    }
  }

  // Pick up chem product
  if(!pCarrying && chemProduct>0 && chemStation) {
    if((px-chemStation.x)**2+(pz-chemStation.z)**2 < 3.5) {
      pickupChemProduct();
    }
  }

  // Near dealer
  for(let i=dealers.length-1;i>=0;i--) {
    const d=dealers[i];
    if(d.state==='waiting' && !d.paid) {
      const dx=px-d.group.position.x, dz=pz-d.group.position.z;
      if(dx*dx+dz*dz<3.5) {
        sellToDealer(d, i);
        break;
      }
    }
  }

  // Keep player roughly on floor
  player.position.y = 0;
}

function harvestPlot(p) {
  p.ready=false; p.progress=0; p.stage=-1;
  updatePlantMesh(p);
  removeLabel('plot_'+growPlots.indexOf(p));
  pCarrying='bud';
  player.userData.carryMesh.visible=true;
  setStatus('Harvest done! Take it to the Trim Station.');
  addFeed('🌿 Harvested a plant');
}

function depositAtTrim() {
  trimQueue++;
  pCarrying=null;
  player.userData.carryMesh.visible=false;
  setStatus('Trimming in progress...');
}

function depositAtStash() {
  if(trimBags>0) {
    const b=trimBags; trimBags=0;
    stashCount+=b;
    setLabel('stash',`📦 Stash [${stashCount}]`,stashNode.x,2.6,stashNode.z);
    addFeed(`📦 Stashed ${b} bags`);
  }
  if(chemProduct>0) {
    stashCount+=chemProduct; chemProduct=0;
    setLabel('stash',`📦 Stash [${stashCount}]`,stashNode.x,2.6,stashNode.z);
  }
  pCarrying=null;
  player.userData.carryMesh.visible=false;
  setStatus(`${stashCount} in stash. Buyers incoming.`);
}

function pickupBagsFromTrim() {
  if(trimBags<=0) return;
  pCarrying='bag';
  player.userData.carryMesh.visible=true;
  player.userData.carryMesh.material.color.setHex(0x88cc22);
  player.userData.carryMesh.material.emissive.setHex(0x224400);
  setStatus('Carry to stash!');
}

function pickupChemProduct() {
  pCarrying='bag';
  player.userData.carryMesh.visible=true;
  player.userData.carryMesh.material.color.setHex(0x22ffaa);
  player.userData.carryMesh.material.emissive.setHex(0x004433);
  setLabel('chem','⚗️ Cook Station', chemStation.x, 2.2, chemStation.z);
  setStatus('Move the product to stash!');
}

// Also deposit chemistry bags if raw buds dropped at chem
function depositAtChem() {
  if(!chemStation) return;
  chemQueue++;
  pCarrying=null;
  player.userData.carryMesh.visible=false;
  setStatus('Batch queued in cook station.');
  setLabel('chem',`⚗️ Cooking... [${chemQueue} queued]`, chemStation.x, 2.2, chemStation.z);
}

function sellToDealer(d, idx) {
  if (stashCount<=0) {
    setStatus('Stash empty!'); return;
  }
  d.paid=true;
  const qty=Math.min(stashCount, d.buyCount);
  const price=salePrice()*qty;
  stashCount-=qty; state.totalSold+=qty;
  addCash(price);
  addHeat(heatGainPerSale());
  const s=worldToScreen(d.group.position.x,2,d.group.position.z);
  cashPop(s.x,s.y,price);
  if(state.heat<85) heatPop(s.x,s.y+20);
  addFeed(`💰 Sold ${qty} bags → +$${fmtCash(price)}`);
  showToast(`+$${fmtCash(price)} — ${qty} unit${qty>1?'s':''} moved`,'good');
  d.state='leaving';
  setLabel('stash',`📦 Stash [${stashCount}]`,stashNode.x,2.6,stashNode.z);
  saveGame();
  renderUpgradesPanel();
  renderExpandPanel();
}

// ── Update dealers ──
function updateDealers(dt) {
  for(let i=dealers.length-1;i>=0;i--) {
    const d=dealers[i];
    if(d.state==='walking') {
      const arrived=stepToward(d.group, stashNode.x+(Math.random()-0.5)*2, stashNode.z+3, 2.2, dt);
      if(arrived) { d.state='waiting'; setLabel('deal_'+i,'💰 Buyer',d.group.position.x,2.2,d.group.position.z,'prompt'); }
    } else if(d.state==='leaving') {
      removeLabel('deal_'+i);
      const gone=stepToward(d.group,d.group.position.x+(Math.random()-0.5)*4,10,2.5,dt);
      if(gone||d.group.position.z>12){ scene.remove(d.group); dealers.splice(i,1); }
    } else if(d.state==='waiting') {
      // If no stash, leave
      if(stashCount<=0){ d.state='leaving'; removeLabel('deal_'+i); }
    }
  }
}

// ── Dealer spawn ──
function updateDealerSpawn(dt) {
  if(stashCount<=0) return;
  dealerSpawnTimer+=dt;
  if(dealerSpawnTimer>=dealerArrivalTime()) {
    dealerSpawnTimer=0;
    if(dealers.filter(d=>d.state!=='leaving').length<4) spawnDealer();
  }
}

// ── Trimmer NPCs ──
function updateTrimmerNPCs(dt) {
  for(const t of trimmerNPCs) {
    if(trimQueue>0) {
      stepToward(t.group, trimStation.x+(Math.random()-0.5)*0.6, trimStation.z+1.2, 2.5, dt);
    } else {
      stepToward(t.group, trimStation.x+(Math.random()-0.5)*3, trimStation.z+(Math.random()-0.5)*2, 1.0, dt);
    }
  }
}

// ── Lookout NPCs ──
function updateLookoutNPCs(dt) {
  for(const l of lookoutNPCs) {
    l.patrolAngle += dt*0.5;
    const tx = l.patrolRadius*Math.cos(l.patrolAngle);
    const tz = l.patrolRadius*Math.sin(l.patrolAngle) + 5;
    stepToward(l.group, tx, tz, 2.0, dt);
  }
}

// ── Heat drain ──
function updateHeatDrain(dt) {
  if(state.heat<=0) return;
  const drain=heatDrainPerSec();
  state.heat=Math.max(0, state.heat-drain*dt);
  document.getElementById('heat-fill').style.width=state.heat+'%';
  document.getElementById('heat-val').textContent=Math.floor(state.heat);
}

// ── Events ──
function updateEvents(dt) {
  if(activeEvent) return;
  eventCooldown -= dt;
  // Trigger DEA raid at 95+ heat
  if(state.heat>=95 && !raidActive) { triggerRaid(); eventCooldown=90; return; }
  if(eventCooldown<=0 && state.totalEarned>100) {
    eventCooldown=50+Math.random()*50;
    if(Math.random()<0.4) triggerEvent();
  }
}

// ── Label update every frame ──
function updateLabels() {
  // Update plant labels
  for(let i=0;i<growPlots.length;i++) {
    const p=growPlots[i];
    if(p.ready) {
      setLabel('plot_'+i,'🌿 READY!',p.x,1.8+Math.sin(now()*3)*0.05,p.z,'ready');
    }
  }
  // Update dealer labels
  for(let i=0;i<dealers.length;i++) {
    const d=dealers[i];
    if(d.state==='waiting') {
      setLabel('deal_'+i,'💰 Buyer',d.group.position.x,2.2,d.group.position.z,'prompt');
    }
  }
  // Trim station label
  if(trimStation) {
    const msg=trimQueue>0?`✂️ Trimming... [${trimQueue}]`:trimBags>0?`✂️ ${trimBags} bags ready`:'✂️ Trim Station';
    setLabel('trim',msg,trimStation.x,1.6,trimStation.z);
  }
}

// Also handle click on chem station deposit if carrying bud
renderer.domElement.addEventListener('click', e => {
  if (!chemStation || !pCarrying) return;
  // Already handled in updatePlayer proximity check below
}, true);

// Override player near-chem check: if carrying bud near chem, deposit there instead
const _origUpdatePlayer = updatePlayer;
// Extend proximity check in main update to include chem station
const _chemDepositCheck = (dt) => {
  if(pCarrying==='bud' && chemStation) {
    const px=player.position.x, pz=player.position.z;
    if((px-chemStation.x)**2+(pz-chemStation.z)**2 < 3.5) {
      depositAtChem();
    }
  }
};

// Render initial panels
refreshHud();
renderUpgradesPanel();
renderExpandPanel();
addFeed('🌿 Operation started');
addFeed('💡 Plants need ~18s to grow');
addFeed('🏃 Walk to ready plants to harvest');

// Autosave on unload
window.addEventListener('beforeunload', saveGame);

// ── Start ──
requestAnimationFrame(animate);

function animate(now_ms) {
  requestAnimationFrame(animate);
  const dt=Math.min((now_ms-lastTime)/1000, 0.1);
  lastTime=now_ms;

  if(!raidActive) {
    updateGrowPlots(dt);
    updateTrimStation(dt);
    updateChemStation_tick(dt);
    _chemDepositCheck(dt);
    updatePlayer(dt);
    updateDealers(dt);
    updateTrimmerNPCs(dt);
    updateLookoutNPCs(dt);
    updateSteam(dt);
    updateHeatDrain(dt);
    updateEvents(dt);
    updateDealerSpawn(dt);
  } else {
    raidTimer-=dt;
    if(raidTimer<=0) {
      raidActive=false;
      document.getElementById('raid-overlay').classList.remove('active');
      document.getElementById('status-bar').classList.remove('event-active');
      document.getElementById('status-bar').textContent='Heat died down. Resume operations.';
      showToast('DEA pulled out. Stay careful.','info');
    }
  }

  if(statusTimer>0){statusTimer-=dt;if(statusTimer<=0)document.getElementById('status-bar').textContent=statusMsg;}

  autoSaveTimer+=dt;
  if(autoSaveTimer>8){autoSaveTimer=0;saveGame();}

  updateLabels();
  renderer.render(scene,camera);
}

</script>
