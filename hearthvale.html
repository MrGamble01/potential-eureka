<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Hearthvale — Cozy Town Builder</title>
  <meta name="description" content="A cozy top-down colony builder. Grow a riverside village, place homes and workshops, let villagers wander and work, and trade with a traveling merchant. Retro pixel art, runs in your browser, no install.">
  <meta property="og:title" content="Hearthvale">
  <meta property="og:description" content="Build a cozy riverside town. Place homes and workshops, watch villagers work, trade with a traveling merchant.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#3a5f43">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%233a5f43'/><path d='M14 34 L32 18 L50 34 L50 50 L14 50 Z' fill='%23c8574f'/><rect x='22' y='38' width='8' height='12' fill='%236e4a2c'/><rect x='36' y='38' width='8' height='8' fill='%23bfe4f2'/></svg>">
  <link rel="stylesheet" href="css/arcade-chrome.css">
  <style>
    :root {
      --panel: rgba(24, 30, 26, 0.92);
      --panel-2: rgba(34, 42, 36, 0.95);
      --ink: #eef3ea;
      --ink-dim: #a9b6a6;
      --gold: #f2c14e;
      --wood: #c99a6a;
      --stone: #b7bec8;
      --food: #8ec26b;
      --line: rgba(255,255,255,0.12);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #2b3a2e;
      color: var(--ink);
      font-family: var(--font);
      user-select: none;
      touch-action: none;
    }
    #game { position: fixed; inset: 0; display: block; image-rendering: pixelated; cursor: grab; }
    #game.building { cursor: crosshair; }
    #game.panning { cursor: grabbing; }

    /* ---- Top resource HUD ---- */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px 8px 130px;
      background: linear-gradient(180deg, rgba(20,26,22,0.9), rgba(20,26,22,0));
      font-family: var(--mono); font-size: 14px; font-weight: 600;
      pointer-events: none; z-index: 400; flex-wrap: wrap;
    }
    .res {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(180deg, #4a3826, #3a2b1c);
      border: 1px solid #6b4e30; border-top-color: #85643f;
      border-radius: 9px; padding: 6px 11px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .res .ic { font-size: 15px; }
    .res .val { min-width: 26px; font-variant-numeric: tabular-nums; }
    .res .rate { font-size: 11px; color: var(--ink-dim); font-weight: 500; }
    .res.wood .ic { color: var(--wood); }
    .res.stone .ic { color: var(--stone); }
    .res.food .ic { color: var(--food); }
    .res.gold .ic { color: var(--gold); }
    #clock { margin-left: auto; }
    #clock .day { color: var(--gold); }

    /* ---- Build bar ---- */
    #buildbar {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: 12px; z-index: 400;
      display: flex; gap: 7px; padding: 9px;
      background: linear-gradient(180deg, #4a3826, #362819);
      border: 2px solid #6b4e30; border-top-color: #85643f;
      border-radius: 15px; max-width: calc(100vw - 20px);
      overflow-x: auto; box-shadow: 0 10px 34px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn {
      position: relative; flex: 0 0 auto;
      width: 60px; height: 66px; border: 1px solid #6b4e30;
      border-radius: 10px; background: linear-gradient(180deg, #5a4531, #46351f); color: var(--ink);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; cursor: pointer; transition: transform .12s, border-color .12s, background .12s;
      font-family: var(--font);
    }
    .btn:hover { transform: translateY(-3px); border-color: rgba(242,193,78,0.7); }
    .btn.sel { border-color: var(--gold); background: linear-gradient(180deg, #6b5335, #514027); box-shadow: 0 0 0 2px rgba(242,193,78,0.4); }
    .btn.locked { opacity: 0.4; }
    .btn.cantafford .cost { color: #e06a5c; }
    .btn .emoji { font-size: 24px; line-height: 1; }
    .btn .lbl { font-size: 9px; letter-spacing: .3px; color: var(--ink-dim); text-transform: uppercase; }
    .btn .cost { font-family: var(--mono); font-size: 8.5px; color: var(--ink-dim); white-space: nowrap; }
    .btn.tool { width: 52px; }

    /* ---- Building info panel ---- */
    #panel {
      position: fixed; right: 12px; top: 62px; width: 240px; z-index: 400;
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
      padding: 14px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: none; box-shadow: 0 10px 34px rgba(0,0,0,0.45);
    }
    #panel.show { display: block; }
    #panel h3 { font-size: 16px; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
    #panel .sub { font-size: 12px; color: var(--ink-dim); margin-bottom: 10px; }
    #panel .stat { display: flex; justify-content: space-between; font-size: 12.5px; font-family: var(--mono); padding: 3px 0; }
    #panel .stat b { color: var(--gold); }
    #panel .row { display: flex; gap: 8px; margin-top: 11px; }
    #panel button {
      flex: 1; padding: 8px; border-radius: 9px; border: 1px solid var(--line);
      background: var(--panel-2); color: var(--ink); font-family: var(--font);
      font-size: 12px; font-weight: 600; cursor: pointer; transition: background .12s, border-color .12s;
    }
    #panel button:hover { border-color: rgba(242,193,78,0.6); }
    #panel button.danger:hover { border-color: #e06a5c; color: #ffb3aa; }

    /* ---- Toast / event log ---- */
    #toasts { position: fixed; left: 12px; bottom: 92px; z-index: 400; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
    .toast {
      background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--gold);
      border-radius: 9px; padding: 8px 12px; font-size: 12.5px; max-width: 280px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      animation: toastin .3s ease, toastout .4s ease forwards 4.4s;
    }
    @keyframes toastin { from { transform: translateX(-16px); opacity: 0; } }
    @keyframes toastout { to { transform: translateX(-16px); opacity: 0; } }

    /* ---- Trader modal ---- */
    #trader {
      position: fixed; inset: 0; z-index: 600; display: none;
      align-items: center; justify-content: center; background: rgba(6,10,7,0.6);
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    }
    #trader.show { display: flex; }
    .trader-card {
      width: min(440px, 92vw); background: var(--panel-2); border: 1px solid var(--line);
      border-radius: 18px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .trader-card h2 { font-size: 20px; margin-bottom: 2px; display: flex; align-items: center; gap: 9px; }
    .trader-card .flavor { font-size: 13px; color: var(--ink-dim); margin-bottom: 16px; font-style: italic; }
    .trade-row {
      display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px;
      padding: 9px 0; border-top: 1px solid var(--line);
    }
    .trade-row .good { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px; }
    .trade-row .price { font-family: var(--mono); font-size: 12px; color: var(--gold); }
    .trade-row .tbtns { display: flex; gap: 6px; }
    .trade-row button {
      border: 1px solid var(--line); background: var(--panel); color: var(--ink);
      border-radius: 8px; padding: 5px 9px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--mono);
    }
    .trade-row button:hover { border-color: var(--gold); }
    .trade-row button:disabled { opacity: 0.35; cursor: default; }
    .trader-card .closebtn {
      width: 100%; margin-top: 16px; padding: 11px; border-radius: 11px; border: none;
      background: var(--gold); color: #2b2410; font-weight: 800; font-size: 14px; cursor: pointer;
    }

    /* ---- Town goal panel ---- */
    #goals {
      position: fixed; left: 12px; top: 56px; z-index: 360; width: 210px;
      background: linear-gradient(180deg, #4a3826, #362819);
      border: 2px solid #6b4e30; border-top-color: #85643f; border-radius: 12px;
      padding: 9px 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .goals-title { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 3px; }
    .goals-text { font-size: 13px; font-weight: 600; line-height: 1.25; margin-bottom: 7px; }
    .goals-bar { height: 6px; border-radius: 4px; background: rgba(0,0,0,0.35); overflow: hidden; }
    .goals-fill { height: 100%; width: 0%; border-radius: 4px; background: linear-gradient(90deg, #8ec26b, #f2c14e); transition: width .4s ease; }
    #happy-chip .ic { font-size: 15px; }

    /* ---- Hint / first-run ---- */
    #hint {
      position: fixed; left: 50%; top: 54px; transform: translateX(-50%); z-index: 350;
      background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
      padding: 8px 15px; font-size: 12.5px; color: var(--ink-dim);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); pointer-events: none;
      transition: opacity .4s;
    }
    @media (max-width: 640px) {
      #hud { padding-left: 10px; font-size: 12px; }
      #panel { top: auto; bottom: 90px; right: 8px; left: 8px; width: auto; }
      #goals { top: auto; bottom: 92px; left: 8px; width: 170px; }
      #hint { display: none; }
    }
  </style>
</head>
<body>
  <a class="ea-back ea-back--float" href="/"><span class="ea-chevron">&#8249;</span><span class="ea-word">ARCADE</span></a>

  <canvas id="game"></canvas>

  <div id="hud">
    <div class="res wood"><span class="ic">&#129717;</span><span class="val" id="r-wood">0</span></div>
    <div class="res stone"><span class="ic">&#129704;</span><span class="val" id="r-stone">0</span></div>
    <div class="res food"><span class="ic">&#127822;</span><span class="val" id="r-food">0</span></div>
    <div class="res gold"><span class="ic">&#129689;</span><span class="val" id="r-gold">0</span></div>
    <div class="res"><span class="ic">&#128101;</span><span class="val" id="r-pop">0</span><span class="rate" id="r-popcap">/0</span></div>
    <div class="res" id="happy-chip"><span class="ic" id="r-happyface">&#128578;</span><span class="val" id="r-happy">50</span><span class="rate">%</span></div>
    <div class="res" id="clock"><span class="day">Day <span id="r-day">1</span></span>&nbsp;<span id="r-tod">&#9728;</span></div>
  </div>

  <div id="goals">
    <div class="goals-title">&#10022; TOWN GOAL</div>
    <div class="goals-text" id="goal-text">&mdash;</div>
    <div class="goals-bar"><div class="goals-fill" id="goal-fill"></div></div>
  </div>

  <div id="hint">Drag to look around &middot; pick a building below &middot; click the ground to place it</div>

  <div id="buildbar"></div>

  <div id="panel">
    <h3><span id="p-emoji">&#127968;</span><span id="p-name">Building</span></h3>
    <div class="sub" id="p-sub">&mdash;</div>
    <div id="p-stats"></div>
    <div class="row" id="p-actions"></div>
  </div>

  <div id="toasts"></div>

  <div id="trader">
    <div class="trader-card">
      <h2><span>&#128658;</span><span>Traveling Merchant</span></h2>
      <div class="flavor" id="trader-flavor">"Fine wares from far-off roads! What'll it be?"</div>
      <div id="trade-rows"></div>
      <button class="closebtn" id="trader-close">Send them on their way</button>
    </div>
  </div>

<script>
"use strict";
(function () {
  // ============================================================
  //  HEARTHVALE — a cozy top-down riverside colony builder.
  //  Zero dependencies. Procedural pixel art, tile world,
  //  wandering villagers, a small economy, a traveling trader.
  // ============================================================

  const SAVE_KEY = 'hearthvale-v1';
  const TILE = 16;               // base pixel size of one tile
  const MAP_W = 56, MAP_H = 42;  // world size in tiles
  const WORLD_PX_W = MAP_W * TILE, WORLD_PX_H = MAP_H * TILE;

  // ---- Palette (warm, cohesive, DS/Stardew-flavored) -----------
  const C = {
    // ground
    grass: ['#80bd63', '#7cba5f'], grassDk: '#5f9a4c', grassLt: '#9ccd7c', grassTuft: '#6cae54',
    dirt: '#c49a63', dirtDk: '#a67b48', dirtLt: '#d6b380', dirtEdge: '#8c6236',
    water: '#57abdd', waterDk: '#3d8ec7', waterHi: '#93d6ef', shore: '#e4d29e',
    // vegetation
    pine: '#3f8a4c', pineDk: '#2f6b3b', pineHi: '#5aa85f',
    leaf: '#57a556', leafDk: '#3c8145', leafHi: '#76bd6b',
    trunk: '#7a5232', trunkDk: '#573a22',
    // stone / mountains
    rock: '#a1a8b2', rockDk: '#787f8a', rockHi: '#c2c8d0',
    mtn: '#9299a3', mtnDk: '#6d737c', mtnHi: '#c0c6cf', mtnSnow: '#eef2f6',
    // timber-frame walls
    beam: '#6a4830', beamDk: '#4d331f', beamHi: '#84603f',
    plaster: '#ecdcb4', plasterDk: '#d4c091', plasterSh: '#c2ad7e',
    stoneW: '#aab1bb', stoneWDk: '#828a95', stoneWHi: '#c7cdd5',
    // roofs
    roofRed: '#c1564d', roofRedDk: '#93382f', roofRedHi: '#d67a6f',
    roofBlue: '#5a7ec2', roofBlueDk: '#3f5c98', roofBlueHi: '#7c9bd6',
    thatch: '#d3b25c', thatchDk: '#a9873c', thatchHi: '#e6cc82',
    slate: '#8a929e', slateDk: '#626a76', slateHi: '#b6bcc5',
    // details
    outline: '#2b1f16', door: '#7a5230', doorDk: '#573a22', handle: '#e8c25a',
    glass: '#bfe4f2', glassDk: '#7fb2c9', glow: '#ffdf9e', glowDim: '#e0a44a',
    skin: '#f1bf95', skinDk: '#d29a70',
    hair: ['#5a3d29', '#8a5a2b', '#2d2420', '#a9702f', '#c9a24a'],
    flower: ['#f2c14e', '#e0708b', '#c78be0', '#fff4d6'],
    fence: '#9a6c3e', fenceDk: '#5f4022', fenceHi: '#b98a54',
    lamp: '#3c3a44', lampGlow: '#ffdf9e', wood: '#b98a54', woodDk: '#7a5230',
  };

  // Convert #rrggbb → [r,g,b]
  function hexToRgb(h) { h = h.replace('#', ''); return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)]; }
  // Stamp a 1px dark outline into transparent pixels bordering opaque ones —
  // the single biggest lever for a crisp, intentional pixel-art silhouette.
  function addOutline(x, w, h, color) {
    color = color || C.outline;
    const img = x.getImageData(0, 0, w, h), d = img.data;
    const solid = (px, py) => px >= 0 && py >= 0 && px < w && py < h && d[(py * w + px) * 4 + 3] > 32;
    const hits = [];
    for (let py = 0; py < h; py++) for (let px = 0; px < w; px++) {
      const i = (py * w + px) * 4;
      if (d[i + 3] > 32) continue;
      if (solid(px - 1, py) || solid(px + 1, py) || solid(px, py - 1) || solid(px, py + 1)) hits.push(i);
    }
    const [r, g, b] = hexToRgb(color);
    for (const i of hits) { d[i] = r; d[i + 1] = g; d[i + 2] = b; d[i + 3] = 255; }
    x.putImageData(img, 0, 0);
  }

  // ---- Procedural sound (tiny WebAudio synth, no assets) -------
  let _actx = null;
  function audioCtx() {
    if (_actx === null) { try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { _actx = false; } }
    if (_actx && _actx.state === 'suspended') { try { _actx.resume(); } catch (e) { } }
    return _actx || null;
  }
  function tone(freq, dur, type, vol, when) {
    const ac = audioCtx(); if (!ac) return;
    const t = ac.currentTime + (when || 0);
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol || 0.12, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(ac.destination); o.start(t); o.stop(t + dur + 0.03);
  }
  function SFX(kind) {
    if (typeof state !== 'undefined' && state && state.muted) return;
    switch (kind) {
      case 'place':   tone(330, 0.08, 'square', 0.10); tone(494, 0.12, 'square', 0.09, 0.06); break;
      case 'upgrade': tone(392, 0.09, 'triangle', 0.11); tone(587, 0.10, 'triangle', 0.10, 0.07); tone(784, 0.15, 'triangle', 0.10, 0.14); break;
      case 'coin':    tone(880, 0.05, 'square', 0.09); tone(1175, 0.10, 'square', 0.08, 0.05); break;
      case 'goal':    tone(523, 0.10, 'triangle', 0.12); tone(659, 0.10, 'triangle', 0.12, 0.10); tone(784, 0.20, 'triangle', 0.12, 0.20); break;
      case 'error':   tone(150, 0.16, 'sawtooth', 0.08); break;
      case 'trader':  tone(440, 0.10, 'sine', 0.10); tone(330, 0.16, 'sine', 0.09, 0.09); break;
    }
  }

  // ---- Sprite factory -----------------------------------------
  // Draw at base resolution into an offscreen canvas, then blit
  // scaled with smoothing off for a crisp retro look.
  function makeCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const x = c.getContext('2d');
    x.imageSmoothingEnabled = false;
    return { c, x };
  }
  function rrand(seed) { // deterministic per-tile variation
    let t = seed + 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }

  // ---- Tile sprites (16x16) -----------------------------------
  const SPR = {};
  function buildTileSprites() {
    const P = (x, px, py, pw, ph, col) => { x.fillStyle = col; x.fillRect(px, py, pw, ph); };

    // --- grass: warm two-tone with sparse tufts (baked, stable, low-noise) ---
    for (let v = 0; v < 4; v++) {
      const { c, x } = makeCanvas(TILE, TILE);
      x.fillStyle = C.grass[v & 1]; x.fillRect(0, 0, TILE, TILE);
      for (let i = 0; i < 3; i++) { // soft organic darker patches
        const rx = Math.floor(rrand(v * 40 + i * 7) * (TILE - 3));
        const ry = Math.floor(rrand(v * 22 + i * 5) * (TILE - 2));
        x.globalAlpha = 0.22; x.fillStyle = C.grassDk; x.fillRect(rx, ry, 3, 2); x.globalAlpha = 1;
      }
      for (let i = 0; i < 2; i++) { // tiny grass tufts
        const rx = 3 + Math.floor(rrand(v * 13 + i * 9) * (TILE - 6));
        const ry = 5 + Math.floor(rrand(v * 29 + i * 3) * (TILE - 8));
        P(x, rx, ry, 1, 2, C.grassDk); P(x, rx + 1, ry - 1, 1, 2, C.grassTuft); P(x, rx + 2, ry, 1, 2, C.grassDk);
      }
      SPR['grass' + v] = c;
    }
    // --- dirt road ---
    {
      const { c, x } = makeCanvas(TILE, TILE);
      x.fillStyle = C.dirt; x.fillRect(0, 0, TILE, TILE);
      for (let i = 0; i < 10; i++) {
        const rx = Math.floor(rrand(i * 7) * TILE), ry = Math.floor(rrand(i * 11 + 2) * TILE);
        P(x, rx, ry, 2, 1, (i % 2) ? C.dirtDk : C.dirtLt);
      }
      P(x, 4, 6, 1, 1, C.dirtEdge); P(x, 11, 10, 1, 1, C.dirtEdge);
      SPR.dirt = c;
    }
    // --- water: static gentle ripples (no frame swap → no blink) ---
    {
      const { c, x } = makeCanvas(TILE, TILE);
      x.fillStyle = C.water; x.fillRect(0, 0, TILE, TILE);
      for (let i = 0; i < 4; i++) {
        const ry = 2 + i * 4;
        P(x, 2 + (i & 1) * 5, ry, 4, 1, C.waterHi);
        P(x, 9 - (i & 1) * 4, ry + 2, 3, 1, C.waterDk);
      }
      SPR.water0 = c; SPR.water1 = c;
    }
    // --- shore/sand ---
    {
      const { c, x } = makeCanvas(TILE, TILE);
      x.fillStyle = C.shore; x.fillRect(0, 0, TILE, TILE);
      for (let i = 0; i < 6; i++) P(x, Math.floor(rrand(i * 5) * TILE), Math.floor(rrand(i * 9) * TILE), 1, 1, C.dirtLt);
      SPR.sand = c;
    }
    // --- pine tree (tall, outlined) ---
    {
      const { c, x } = makeCanvas(TILE, TILE * 2);
      P(x, 7, 24, 3, 6, C.trunk); P(x, 9, 24, 1, 6, C.trunkDk);
      // each tier is a triangle: narrow at the top (tip), wide at the base
      const tier = (cy, halfW) => {
        for (let r = 0; r < 8; r++) {
          const gap = Math.round(((7 - r) / 7) * halfW);
          const w = (halfW - gap) * 2;
          if (w <= 0) continue;
          const x0 = 8 - halfW + gap;
          P(x, x0, cy + r, w, 1, r >= 6 ? C.pineDk : C.pine);

  // ---- Building sprites: 3/4-view timber-frame, outlined ------
  const B_ART = {
    house:     { roof: 'red',    wall: 'timber', chimney: true },
    farm:      { roof: 'thatch', wall: 'timber', chimney: false },
    lumber:    { roof: 'blue',   wall: 'timber', chimney: false },
    quarry:    { roof: 'slate',  wall: 'stone',  chimney: false },
    bakery:    { roof: 'red',    wall: 'timber', chimney: true },
    carpenter: { roof: 'blue',   wall: 'timber', chimney: true },
    market:    { roof: 'thatch', wall: 'timber', chimney: false },
    well:      { well: true },
    tavern:    { roof: 'red',    wall: 'timber', chimney: true },
  };
  const B_ROOF = {
    red:   [C.roofRed, C.roofRedDk, C.roofRedHi],
    blue:  [C.roofBlue, C.roofBlueDk, C.roofBlueHi],
    thatch:[C.thatch, C.thatchDk, C.thatchHi],
    slate: [C.slate, C.slateDk, C.slateHi],
  };

  function makeBuildingSprite(type) {
    const def = BUILDINGS[type];
    const art = B_ART[type] || { roof: 'red', wall: 'timber' };
    const W = def.w * TILE, gh = def.h * TILE;
    const RISE = Math.round(TILE * 0.85);   // roof rises above the top tile
    const H = gh + RISE;
    const { c, x } = makeCanvas(W, H);
    const P = (px, py, pw, ph, col) => { x.fillStyle = col; x.fillRect(Math.round(px), Math.round(py), Math.round(pw), Math.round(ph)); };

    if (art.well) {
      const cx = W / 2;
      for (let r = 0; r < 6; r++) { const half = r + 1; P(cx - half - 1, r, (half + 1) * 2, 1, r < 2 ? C.roofRedDk : C.roofRed); }
      P(cx - 7, 5, 14, 1, C.beamDk);
      P(cx - 6, 6, 2, H - 16, C.wood); P(cx + 4, 6, 2, H - 16, C.wood);
      const ry = H - 10;
      P(cx - 6, ry, 12, 8, C.stoneW); P(cx - 6, ry, 12, 1, C.stoneWHi);
      for (let i = -5; i < 6; i += 3) P(cx + i, ry + 2, 1, 5, C.stoneWDk);
      P(cx - 3, ry + 2, 6, 4, '#274a5a');
      addOutline(x, W, H); def._sprite = c; def._rise = RISE; return c;
    }

    const foundH = 5;
    const wallH = Math.max(11, Math.round(gh * 0.5));
    const wallBottom = H - foundH;
    const wallTop = wallBottom - wallH;
    const roofH = wallTop; // roof spans from top of sprite down to the eave
    const [rc, rcd, rch] = B_ROOF[art.roof];

    // stone foundation
    P(0, wallBottom, W, foundH, C.stoneWDk); P(0, wallBottom, W, 1, C.stoneW);
    for (let i = 1; i < W; i += 4) P(i, wallBottom + 1, 1, foundH - 1, C.slateDk);

    // walls
    if (art.wall === 'stone') {
      P(0, wallTop, W, wallH, C.stoneW); P(0, wallTop, W, 1, C.stoneWHi);
      for (let yy = wallTop + 2; yy < wallBottom; yy += 3) P(0, yy, W, 1, C.stoneWDk);
      for (let xx = 3; xx < W; xx += 5) P(xx, wallTop, 1, wallH, C.stoneWDk);
    } else {
      P(0, wallTop, W, wallH, C.plaster);
      P(0, wallBottom - 2, W, 2, C.plasterSh);
      P(0, wallTop, 2, wallH, C.beam); P(W - 2, wallTop, 2, wallH, C.beam);
      P(0, wallTop, W, 2, C.beam);
      P(Math.round(W / 2 - 1), wallTop, 2, wallH, C.beamDk);
      P(Math.round(W * 0.28), wallTop, 1, wallH, C.beamDk);
      P(Math.round(W * 0.72), wallTop, 1, wallH, C.beamDk);
      P(0, wallTop, W, 1, C.beamHi);
    }

    // roof: overhanging gable with shingle rows + ridge
    const eave = 2;
    for (let r = 0; r < roofH; r++) {
      const t = roofH > 1 ? r / roofH : 0;
      const inset = Math.round((1 - t) * (W / 2 - 3)); // widest at the eave (bottom), narrow ridge on top
      const x0 = inset - eave, x1 = W - inset + eave;
      P(x0, r, x1 - x0, 1, ((roofH - r) % 3 === 0) ? rcd : rc);
      P(x0, r, 1, 1, rcd); P(x1 - 1, r, 1, 1, rcd);
      if (r > 1 && r < roofH - 1) P(x0 + 1, r, 1, 1, rch);
    }
    P(Math.round(W / 2 - 4), 0, 8, 2, rcd);   // ridge cap
    P(0, wallTop - 2, W, 2, C.beamDk);         // dark eave beam

    // door with frame
    const dw = Math.max(5, Math.round(W * 0.24)), dh = Math.round(wallH * 0.72);
    const ddx = Math.round(W / 2 - dw / 2), ddy = wallBottom - dh;
    P(ddx - 1, ddy - 1, dw + 2, dh + 1, C.beamDk);
    P(ddx, ddy, dw, dh, C.door); P(ddx, ddy, dw, 1, C.doorDk);
    P(ddx + 1, ddy + 2, 1, dh - 3, C.doorDk);
    P(ddx + dw - 2, ddy + Math.round(dh / 2), 1, 1, C.handle);

    // windows with a warm glow
    const wy = wallTop + Math.round(wallH * 0.28), winW = 4, winH = 4;
    const win = (wx) => {
      P(wx - 1, wy - 1, winW + 2, winH + 2, C.beam);
      P(wx, wy, winW, winH, C.glow); P(wx, wy, winW, 1, C.glass);
      P(wx + 2, wy, 1, winH, C.beamDk); P(wx, wy + 2, winW, 1, C.beamDk);
    };
    if (ddx > 6) win(3);
    if (W - ddx - dw > 6) win(W - 7);
    if (W >= 40) { win(Math.round(W * 0.30)); win(Math.round(W * 0.62)); }

    // chimney with static smoke
    if (art.chimney) {
      const cxp = W - 8;
      P(cxp, 2, 4, roofH * 0.6 + 4, C.slateDk); P(cxp, 2, 4, 1, C.slate); P(cxp, 1, 4, 1, C.rock);
      x.globalAlpha = 0.45; x.fillStyle = '#e8e8ee';
      x.beginPath(); x.arc(cxp + 2, 0, 2, 0, 7); x.fill();
      x.beginPath(); x.arc(cxp + 4, -3, 2.3, 0, 7); x.fill();
      x.globalAlpha = 1;
    }

    buildingDetails(x, type, W, wallTop, wallBottom);
    addOutline(x, W, H);
    def._sprite = c; def._rise = RISE;
    return c;
  }

  // Per-type props/signage painted onto the building so each trade reads
  // at a glance (hay, logs, awnings, barrels, stone, planks).
  function buildingDetails(x, type, W, wallTop, wallBottom) {
    const P = (px, py, pw, ph, col) => { x.fillStyle = col; x.fillRect(Math.round(px), Math.round(py), Math.round(pw), Math.round(ph)); };
    const baseY = wallBottom, wallH = wallBottom - wallTop;
    if (type === 'farm') {                       // hay bales
      for (let i = 0; i < 2; i++) { const bx = 1 + i * 7, by = baseY - 5; P(bx, by, 6, 5, C.thatch); P(bx, by, 6, 1, C.thatchHi); P(bx, by + 2, 6, 1, C.thatchDk); P(bx + 2, by, 1, 5, C.thatchDk); }
    } else if (type === 'lumber') {              // log stack
      const lg = (bx, by) => { P(bx, by, 7, 3, C.trunk); P(bx, by, 7, 1, '#8a5a2b'); P(bx, by + 1, 1, 1, '#c9a24a'); P(bx + 6, by + 1, 1, 1, '#c9a24a'); };
      lg(1, baseY - 3); lg(1, baseY - 6); P(3, baseY - 9, 4, 3, C.trunk);
    } else if (type === 'bakery') {              // striped awning over the door
      const aw = Math.round(W * 0.5), ax = Math.round(W / 2 - aw / 2), ay = wallTop + Math.round(wallH * 0.5);
      for (let i = 0; i < aw; i += 4) { P(ax + i, ay, 2, 3, '#c1564d'); P(ax + i + 2, ay, 2, 3, '#f4ede0'); } P(ax, ay + 3, aw, 1, C.beamDk);
    } else if (type === 'market') {              // full awning + crate
      const ay = wallTop + 2; for (let i = 0; i < W; i += 4) { P(i, ay, 2, 3, '#3f9950'); P(i + 2, ay, 2, 3, '#f4ede0'); } P(0, ay + 3, W, 1, C.beamDk);
      P(1, baseY - 6, 6, 6, C.wood); P(1, baseY - 6, 6, 1, C.fenceHi); P(1, baseY - 3, 6, 1, C.woodDk); P(3, baseY - 6, 1, 6, C.woodDk);
    } else if (type === 'tavern') {              // hanging mug sign + barrel
      P(2, wallTop + 3, 1, 4, C.beamDk); P(1, wallTop + 7, 4, 4, '#caa06c'); P(2, wallTop + 8, 2, 2, '#f2c14e');
      const bx = W - 8, by = baseY - 7; P(bx, by, 7, 7, C.wood); P(bx, by, 7, 1, C.fenceHi); P(bx, by + 2, 7, 1, C.fenceDk); P(bx, by + 5, 7, 1, C.fenceDk);
    } else if (type === 'quarry') {              // stone blocks
      P(1, baseY - 4, 5, 4, C.stoneW); P(1, baseY - 4, 5, 1, C.stoneWHi); P(6, baseY - 4, 4, 4, C.stoneWDk); P(2, baseY - 8, 5, 4, C.stoneW); P(2, baseY - 8, 5, 1, C.stoneWHi);
    } else if (type === 'carpenter') {           // planks + sawhorse
      P(1, baseY - 2, 9, 2, '#d8b184'); P(1, baseY - 5, 9, 2, '#d8b184'); P(2, baseY - 3, 1, 3, C.woodDk); P(8, baseY - 3, 1, 3, C.woodDk);
    }
  }
