    { text: 'Bank 150 gold', prog: () => [Math.floor(state.res.gold), 150], done: () => state.res.gold >= 150, reward: { stone: 25 } },
    { text: 'Grow to 10 villagers', prog: () => [state.villagers.length, 10], done: () => state.villagers.length >= 10, reward: { gold: 80 } },
    { text: 'Keep the town happy (85%+)', prog: () => [Math.floor(state.happy), 85], done: () => state.happy >= 85, reward: { gold: 120 } },
  ];
  function checkGoals() {
    if (!state || state.goalIndex >= GOALS.length) return;
    const g = GOALS[state.goalIndex];
    if (g.done()) {
      for (const k in g.reward) state.res[k] = (state.res[k] || 0) + g.reward[k];
      const rew = Object.keys(g.reward).map(k => '+' + g.reward[k] + ' ' + shortRes(k)).join(' ');
      toast('✦ Goal done: ' + g.text + '  ' + rew);
      SFX('goal');
      state.goalIndex++;
      state.happy = Math.min(100, state.happy + 5); // a win cheers the town
      renderGoal(); save();
    }
  }
  function renderGoal() {
    const tEl = document.getElementById('goal-text'), fEl = document.getElementById('goal-fill');
    if (!tEl || !fEl) return;
    if (state.goalIndex >= GOALS.length) { tEl.textContent = 'Hearthvale is thriving! 🎉'; fEl.style.width = '100%'; return; }
    const g = GOALS[state.goalIndex], p = g.prog();
    tEl.textContent = g.text;
    fEl.style.width = Math.max(0, Math.min(100, (p[0] / p[1]) * 100)) + '%';
  }

  // Terrain codes
  const T_GRASS = 0, T_DIRT = 1, T_WATER = 2, T_SAND = 3, T_BRIDGE = 4;
  // Object codes (decoration on top of terrain)
  const O_NONE = 0, O_TREE = 1, O_ROCK = 2, O_FLOWER = 3, O_BUSH = 4, O_MTN = 5;

  function idx(tx, ty) { return ty * MAP_W + tx; }
  function inMap(tx, ty) { return tx >= 0 && ty >= 0 && tx < MAP_W && ty < MAP_H; }

  function generateWorld(seed) {
    tiles = new Uint8Array(MAP_W * MAP_H);
    tileObj = new Uint8Array(MAP_W * MAP_H);
    occ = new Int16Array(MAP_W * MAP_H).fill(-1); // building id occupying tile, -1 none
    decos = [];
    const pushDeco = (kind, tx, ty) => { if (inMap(tx, ty)) decos.push({ kind, tx, ty }); };

    // base grass with variant speckle
    for (let ty = 0; ty < MAP_H; ty++)
      for (let tx = 0; tx < MAP_W; tx++)
        tiles[idx(tx, ty)] = T_GRASS;

    // a winding river down the middle (Riverwood!)
    let rx = MAP_W * 0.5;
    for (let ty = 0; ty < MAP_H; ty++) {
      rx += (rrand(seed + ty * 3) - 0.5) * 2.4;
      rx = Math.max(6, Math.min(MAP_W - 6, rx));
      const width = 2 + Math.floor(rrand(seed + ty) * 2);
      for (let w = -width; w <= width; w++) {
        const cx = Math.round(rx + w);
        if (!inMap(cx, ty)) continue;
        if (Math.abs(w) === width) { if (tiles[idx(cx, ty)] === T_GRASS) tiles[idx(cx, ty)] = T_SAND; }
        else tiles[idx(cx, ty)] = T_WATER;
      }
    }

    // mountain border ring — frames the valley like the reference
    for (let ty = 0; ty < MAP_H; ty++)
      for (let tx = 0; tx < MAP_W; tx++) {
        const edge = Math.min(tx, ty, MAP_W - 1 - tx, MAP_H - 1 - ty);
        if (edge === 0) { tiles[idx(tx, ty)] = T_GRASS; tileObj[idx(tx, ty)] = O_MTN; }
        else if (edge === 1 && tiles[idx(tx, ty)] === T_GRASS && rrand(seed + tx * 3 + ty * 7) < 0.5) tileObj[idx(tx, ty)] = O_MTN;
      }

    // forests (dense clusters of mixed pine + bush) and rock fields
    function scatter(count, objs, clusterR, density, seedBase) {
      for (let i = 0; i < count; i++) {
        const cx = 4 + Math.floor(rrand(seedBase + i * 13) * (MAP_W - 8));
        const cy = 4 + Math.floor(rrand(seedBase + i * 7 + 5) * (MAP_H - 8));
        const n = density + Math.floor(rrand(seedBase + i) * density);
        for (let k = 0; k < n; k++) {
          const ox = cx + Math.floor((rrand(seedBase + i * 31 + k) - 0.5) * clusterR * 2);
          const oy = cy + Math.floor((rrand(seedBase + i * 17 + k * 3) - 0.5) * clusterR * 2);
          if (inMap(ox, oy) && tiles[idx(ox, oy)] === T_GRASS && tileObj[idx(ox, oy)] === O_NONE)
            tileObj[idx(ox, oy)] = objs.length > 1 ? (rrand(seedBase + ox * 5 + oy) < 0.7 ? objs[0] : objs[1]) : objs[0];
        }
      }
    }
    scatter(22, [O_TREE, O_BUSH], 3, 7, seed + 100);
    scatter(9, [O_ROCK], 2, 3, seed + 400);
    // scattered lone trees for a lived-in valley
    for (let i = 0; i < 70; i++) {
      const tx = 2 + Math.floor(rrand(seed + i * 5 + 700) * (MAP_W - 4));
      const ty = 2 + Math.floor(rrand(seed + i * 9 + 350) * (MAP_H - 4));
      if (inMap(tx, ty) && tiles[idx(tx, ty)] === T_GRASS && tileObj[idx(tx, ty)] === O_NONE)
        tileObj[idx(tx, ty)] = rrand(seed + i) < 0.7 ? O_TREE : O_BUSH;
    }
    // flower sprinkles
    for (let i = 0; i < 90; i++) {
      const tx = Math.floor(rrand(seed + i * 5 + 900) * MAP_W);
      const ty = Math.floor(rrand(seed + i * 9 + 300) * MAP_H);
      if (inMap(tx, ty) && tiles[idx(tx, ty)] === T_GRASS && tileObj[idx(tx, ty)] === O_NONE)
        tileObj[idx(tx, ty)] = O_FLOWER;
    }
    // ground detail decorations (flat, cosmetic) — fills the empty grass
    function scatterDeco(kind, count, seedBase, nearWater) {
      for (let i = 0; i < count; i++) {
        const tx = 2 + Math.floor(rrand(seedBase + i * 5) * (MAP_W - 4));
        const ty = 2 + Math.floor(rrand(seedBase + i * 9 + 3) * (MAP_H - 4));
        if (!inMap(tx, ty) || tiles[idx(tx, ty)] !== T_GRASS || tileObj[idx(tx, ty)] !== O_NONE) continue;
        if (nearWater) {
          let ok = false;
          for (const d of [[1, 0], [-1, 0], [0, 1], [0, -1]]) { const nx = tx + d[0], ny = ty + d[1]; if (inMap(nx, ny) && tiles[idx(nx, ny)] === T_WATER) ok = true; }
          if (!ok) continue;
        }
        pushDeco(kind, tx, ty);
      }
    }
    scatterDeco('tallgrass', 100, seed + 1000, false);
    scatterDeco('pebble', 45, seed + 2000, false);
    scatterDeco('mushroom', 28, seed + 3000, false);
    scatterDeco('stump', 12, seed + 4000, false);
    scatterDeco('reeds', 44, seed + 5000, true);

    // starter clearing near center-left
    const startX = Math.floor(MAP_W * 0.30), startY = Math.floor(MAP_H * 0.5);
    for (let ty = startY - 5; ty <= startY + 5; ty++)
      for (let tx = startX - 6; tx <= startX + 6; tx++)
        if (inMap(tx, ty) && tiles[idx(tx, ty)] === T_GRASS) tileObj[idx(tx, ty)] = O_NONE;

    // dirt roads: a vertical lane + a horizontal lane out to the bridge
    for (let ty = startY - 6; ty <= startY + 6; ty++)
      for (let d = 0; d < 2; d++) { const tx = startX + d; if (inMap(tx, ty) && tiles[idx(tx, ty)] === T_GRASS) { tiles[idx(tx, ty)] = T_DIRT; tileObj[idx(tx, ty)] = O_NONE; } }
    for (let tx = startX; tx < MAP_W - 2; tx++)
      for (let d = 0; d < 2; d++) { const ty = startY + d; if (inMap(tx, ty) && tiles[idx(tx, ty)] === T_GRASS) { tiles[idx(tx, ty)] = T_DIRT; tileObj[idx(tx, ty)] = O_NONE; } }

    // bridge across the river along the horizontal road
    for (let ty = startY - 1; ty <= startY + 2; ty++)
      for (let tx = 0; tx < MAP_W; tx++)
        if (inMap(tx, ty) && tiles[idx(tx, ty)] === T_WATER) tiles[idx(tx, ty)] = T_BRIDGE;

    // a little fenced crop plot NW of the clearing (cosmetic)
    const fx = startX - 6, fy = startY - 5;
    for (let ty = fy; ty < fy + 3; ty++)
      for (let tx = fx; tx < fx + 4; tx++)
        if (inMap(tx, ty) && tiles[idx(tx, ty)] === T_GRASS) { tiles[idx(tx, ty)] = T_DIRT; tileObj[idx(tx, ty)] = O_NONE; pushDeco('crop', tx, ty); }
    for (let tx = fx - 1; tx <= fx + 4; tx++) { pushDeco('fence', tx, fy - 1); pushDeco('fence', tx, fy + 3); }

    // props to make the clearing feel lived-in
    pushDeco('well', startX - 2, startY - 2);
    pushDeco('lamp', startX - 1, startY - 3); pushDeco('lamp', startX + 4, startY + 2); pushDeco('lamp', startX + 7, startY - 2);
    pushDeco('barrel', startX + 3, startY - 2); pushDeco('logs', startX - 3, startY + 2);

    return { startX, startY };
  }

  // walkable for villagers
  function walkable(tx, ty) {
    if (!inMap(tx, ty)) return false;
    const t = tiles[idx(tx, ty)];
    if (t === T_WATER) return false;
    if (occ[idx(tx, ty)] >= 0) return false;
    const o = tileObj[idx(tx, ty)];
    if (o === O_TREE || o === O_ROCK || o === O_BUSH || o === O_MTN) return false;
    return true;
  }

  // ---- Camera --------------------------------------------------
  function clampCam() {
    const vw = view.w / cam.z, vh = view.h / cam.z;
    cam.x = Math.max(0, Math.min(WORLD_PX_W - vw, cam.x));
    cam.y = Math.max(0, Math.min(WORLD_PX_H - vh, cam.y));
    if (WORLD_PX_W < vw) cam.x = (WORLD_PX_W - vw) / 2;
    if (WORLD_PX_H < vh) cam.y = (WORLD_PX_H - vh) / 2;
  }

  // ---- Placement ----------------------------------------------
  let buildMode = null;   // building type key or 'demolish' or null
  let hoverTile = null;

  function canPlaceAt(type, tx, ty) {
    const def = BUILDINGS[type];
    if (def.unique && state.buildings.some(b => b.type === type)) return false;
    for (let dy = 0; dy < def.h; dy++)
      for (let dx = 0; dx < def.w; dx++) {
        const gx = tx + dx, gy = ty + dy;
        if (!inMap(gx, gy)) return false;
        const t = tiles[idx(gx, gy)];
        if (t === T_WATER || t === T_BRIDGE) return false;
        if (occ[idx(gx, gy)] >= 0) return false;
        const o = tileObj[idx(gx, gy)];
        if (o === O_TREE || o === O_ROCK || o === O_BUSH || o === O_MTN) return false;
      }
    return true;
  }
  function canAfford(type) {
    const cost = BUILDINGS[type].cost;
    return Object.keys(cost).every(k => state.res[k] >= cost[k]);
  }
  function payCost(type, refund) {
    const cost = BUILDINGS[type].cost, sign = refund ? 1 : -1, mult = refund ? 0.5 : 1;
    for (const k in cost) state.res[k] += sign * Math.floor(cost[k] * mult);
  }
  function nearCount(tx, ty, def, obj) {
    let n = 0;
    for (let dy = -1; dy <= def.h; dy++)
      for (let dx = -1; dx <= def.w; dx++) {
        const gx = tx + dx, gy = ty + dy;
        if (inMap(gx, gy) && tileObj[idx(gx, gy)] === obj) n++;
      }
    return n;
  }

  function placeBuilding(type, tx, ty) {
    const def = BUILDINGS[type];
    const b = { id: state._nextId++, type, tx, ty, staffed: false, worker: null, level: 1 };
    // clear flowers under footprint; mark occupancy
    for (let dy = 0; dy < def.h; dy++)
      for (let dx = 0; dx < def.w; dx++) {
        const i = idx(tx + dx, ty + dy);
        if (tileObj[i] === O_FLOWER) tileObj[i] = O_NONE;
        occ[i] = b.id;
      }
    // bonus flavor for lumber/quarry near resource
    if (def.wantsNear) b.bonus = nearCount(tx, ty, def, def.wantsNear === 'tree' ? O_TREE : O_ROCK) > 0;
    state.buildings.push(b);
    payCost(type);
    if (def.housing) { for (let k = 0; k < def.housing; k++) spawnVillager(b); }
    assignJobs();
    SFX('place');
    toast(def.emoji + ' ' + def.name + ' built!');
    save();
    return b;
  }

  function demolish(b) {
    const def = BUILDINGS[b.type];
    for (let dy = 0; dy < def.h; dy++)
      for (let dx = 0; dx < def.w; dx++) occ[idx(b.tx + dx, b.ty + dy)] = -1;
    // villagers of this home leave; villagers working here go idle
    state.villagers = state.villagers.filter(v => v.homeId !== b.id);
    state.villagers.forEach(v => { if (v.jobId === b.id) { v.jobId = null; v.state = 'idle'; } });
    state.buildings = state.buildings.filter(x => x.id !== b.id);
    payCost(b.type, true);
    assignJobs();
    toast('Removed ' + def.name + ' (half materials refunded)');
    save();
  }

  function doorTile(b) {
    const def = BUILDINGS[b.type];
    return { tx: b.tx + Math.floor(def.w / 2), ty: b.ty + def.h - 1 };
  }

  // ---- Villagers ----------------------------------------------
  const V_COLORS = ['#e06a5c', '#5f83c8', '#e0a13f', '#7bbf63', '#c78be0', '#4fb0a8', '#e0708b'];
  function spawnVillager(home) {
    const d = doorTile(home);
    const spot = findWalkableNear(d.tx, d.ty) || d;
    const v = {
      id: state._nextId++, homeId: home.id, jobId: null,
      x: spot.tx * TILE + TILE / 2, y: spot.ty * TILE + TILE / 2,
      tx: spot.tx, ty: spot.ty, state: 'idle',
      color: V_COLORS[Math.floor(rrand(state._nextId * 7) * V_COLORS.length)],
      ph: rrand(state._nextId * 3) * 6, wait: 0,
    };
    state.villagers.push(v);
    return v;
  }
  function findWalkableNear(tx, ty) {
    for (let r = 0; r < 5; r++)
      for (let dy = -r; dy <= r; dy++)
        for (let dx = -r; dx <= r; dx++) {
          if (walkable(tx + dx, ty + dy)) return { tx: tx + dx, ty: ty + dy };
        }
    return null;
  }
  function effHousing(b) { return (BUILDINGS[b.type].housing || 0) * (b.level || 1); }
  function popCap() {
    return state.buildings.filter(b => BUILDINGS[b.type].housing)
      .reduce((s, b) => s + effHousing(b), 0);
  }
  const MAX_LEVEL = 3;
  function canUpgrade(b) { const d = BUILDINGS[b.type]; return (d.housing || d.prod || d.happy) && (b.level || 1) < MAX_LEVEL; }
  function upgradeCost(b) {
    const def = BUILDINGS[b.type], lvl = b.level || 1, cost = {};
    for (const k in def.cost) cost[k] = Math.ceil(def.cost[k] * (lvl + 1) * 0.7);
    if (Object.keys(cost).length === 0) cost.wood = 10 * lvl; // decoratives (well)
    return cost;
  }
  function upgradeBuilding(b) {
    if (!canUpgrade(b)) return;
    const cost = upgradeCost(b);
    if (!Object.keys(cost).every(k => state.res[k] >= cost[k])) { toast("Can't afford the upgrade yet."); SFX('error'); return; }
    for (const k in cost) state.res[k] -= cost[k];
    b.level = (b.level || 1) + 1;
    const def = BUILDINGS[b.type];
    if (def.housing) { for (let k = 0; k < def.housing; k++) spawnVillager(b); assignJobs(); } // extra rooms → extra folk
    state.happy = Math.min(100, state.happy + 3);
    SFX('upgrade');
    toast('⬆️ ' + def.name + ' upgraded to Lv' + b.level + '!');
    save();
  }
  // Assign idle villagers to unstaffed worker-buildings.
  function assignJobs() {
    const needy = state.buildings.filter(b => BUILDINGS[b.type].worker && !state.villagers.some(v => v.jobId === b.id));
    const free = state.villagers.filter(v => !v.jobId);
    needy.forEach((b, i) => { if (free[i]) { free[i].jobId = b.id; free[i].state = 'toWork'; } });
    // recompute staffed flags
    state.buildings.forEach(b => { b.staffed = state.villagers.some(v => v.jobId === b.id); });
  }

  function buildingById(id) { return state.buildings.find(b => b.id === id); }

  function isNight() { return state.time < 6 || state.time >= 20.5; }

  // Road-preferring Dijkstra over walkable tiles. Villagers hug the dirt
  // roads (cost 1) and only cut across grass (cost 3) when it's shorter.
  function pathfind(sx, sy, tx, ty) {
    if (!walkable(tx, ty)) { const n = findWalkableNear(tx, ty); if (!n) return null; tx = n.tx; ty = n.ty; }
    if (sx === tx && sy === ty) return [];
    const W = MAP_W, H = MAP_H, N = W * H;
    const start = sy * W + sx, goal = ty * W + tx;
    const dist = new Float32Array(N); dist.fill(Infinity);
    const prev = new Int32Array(N); prev.fill(-1);
    dist[start] = 0;
    const heap = [[0, start]];
    const push = (d, i) => { heap.push([d, i]); let c = heap.length - 1; while (c > 0) { const p = (c - 1) >> 1; if (heap[p][0] <= heap[c][0]) break; const t = heap[p]; heap[p] = heap[c]; heap[c] = t; c = p; } };
    const pop = () => { const top = heap[0], last = heap.pop(); if (heap.length) { heap[0] = last; let c = 0; for (; ;) { let l = 2 * c + 1, r = 2 * c + 2, s = c; if (l < heap.length && heap[l][0] < heap[s][0]) s = l; if (r < heap.length && heap[r][0] < heap[s][0]) s = r; if (s === c) break; const t = heap[s]; heap[s] = heap[c]; heap[c] = t; c = s; } } return top; };
    let iters = 0;
    while (heap.length && iters++ < 20000) {
      const [d, cur] = pop();
      if (d > dist[cur]) continue;
      if (cur === goal) break;
      const cx = cur % W, cy = (cur / W) | 0;
      const nbs = [[cx - 1, cy], [cx + 1, cy], [cx, cy - 1], [cx, cy + 1]];
      for (const nb of nbs) {
        const nx = nb[0], ny = nb[1];
        if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
        const isGoal = (nx === tx && ny === ty);
        if (!isGoal && !walkable(nx, ny)) continue;
        const ni = ny * W + nx;
        const t = tiles[ni];
        const step = (t === T_DIRT || t === T_BRIDGE) ? 1 : 3;
        const nd = d + step;
        if (nd < dist[ni]) { dist[ni] = nd; prev[ni] = cur; push(nd, ni); }
      }
    }
    if (goal !== start && prev[goal] === -1) return null;
    const path = []; let c = goal;
    while (c !== -1 && c !== start) { path.push({ tx: c % W, ty: (c / W) | 0 }); c = prev[c]; }
    path.reverse();
    return path;
  }

  function villagerTick(v, dt) {
    // follow an existing path, tile by tile; faster on roads
    if (v.path && v.path.length) {
      v.sleeping = false;
      const tgt = v.path[0];
      const gx = tgt.tx * TILE + TILE / 2, gy = tgt.ty * TILE + TILE / 2;
      const dx = gx - v.x, dy = gy - v.y, dist = Math.hypot(dx, dy);
      const onRoad = inMap(v.tx, v.ty) && (tiles[idx(v.tx, v.ty)] === T_DIRT || tiles[idx(v.tx, v.ty)] === T_BRIDGE);
      const spd = (onRoad ? 34 : 22) * dt * TILE / 16;
      if (dist < 1.5) { v.x = gx; v.y = gy; v.tx = tgt.tx; v.ty = tgt.ty; v.path.shift(); }
      else { v.x += dx / dist * Math.min(spd, dist); v.y += dy / dist * Math.min(spd, dist); }
      return;
    }
    // arrived / idle — decide the next destination
    v.wait -= dt;
    if (v.wait > 0) return;
    v.wait = 0.5 + rrand((v.id + Math.floor(state.time)) * 13) * 1.8;

    let dest = null;
    if (isNight()) {
      const hd = homeDoor(v);
      if (hd && v.tx === hd.tx && v.ty === hd.ty) { v.sleeping = true; return; } // tucked in
      dest = hd;
    } else if (v.jobId) {
      const b = buildingById(v.jobId);
      if (b) {
        const wd = findWalkableNear(doorTile(b).tx, doorTile(b).ty);
        dest = (v.state === 'atWork') ? randomStroll(v) : wd;   // work, then wander a bit
        v.state = (v.state === 'atWork') ? 'roam' : 'atWork';
      } else { v.jobId = null; }
    }
    if (!dest) dest = randomStroll(v);
    if (dest) { const p = pathfind(v.tx, v.ty, dest.tx, dest.ty); if (p && p.length) v.path = p; }
  }
  function homeDoor(v) {
    const b = buildingById(v.homeId);
    if (!b) return null;
    const d = doorTile(b);
    return findWalkableNear(d.tx, d.ty);
  }
  function randomStroll(v) {
    for (let i = 0; i < 8; i++) {
      const nx = v.tx + Math.floor((rrand((v.id + i + Math.floor(state.time) * 10) * 5) - 0.5) * 9);
      const ny = v.ty + Math.floor((rrand((v.id + i * 3 + Math.floor(state.time) * 7) * 9) - 0.5) * 9);
      if (walkable(nx, ny)) return { tx: nx, ty: ny };
    }
    return walkable(v.tx, v.ty) ? { tx: v.tx, ty: v.ty } : null;
  }

  // ---- Economy / time -----------------------------------------
  let prodFlashTimer = {};
  // Production fires every PROD_INTERVAL in-game hours, tracked against an
  // absolute hour counter (_prodAbs) so day-wrap can't drop or double a cycle.
  let _prodAbs = null;

  function runProduction() {
    const pop = state.villagers.length;
    let gained = {};
    state.buildings.forEach(b => {
      const def = BUILDINGS[b.type];
      if (def.prod && (!def.worker || b.staffed)) {
        // consumption gate
        let ok = true;
        if (def.cons) for (const k in def.cons) if (state.res[k] < def.cons[k]) ok = false;
        if (!ok) return;
        if (def.cons) for (const k in def.cons) state.res[k] -= def.cons[k];
        for (const k in def.prod) {
          let amt = def.prod[k] * (b.level || 1);   // higher tier → more output
          if (b.bonus) amt = Math.ceil(amt * 1.5);
          state.res[k] += amt; gained[k] = (gained[k] || 0) + amt;
        }
      }
    });
    // villagers eat
    const eat = pop * FOOD_PER_VILLAGER;
    state.res.food -= eat;
    if (state.res.food < 0) {
      state.res.food = 0;
      state.happy = Math.max(0, state.happy - 8);
      toast('⚠️ Not enough food — villagers are hungry!');
    } else {
      state.happy = Math.min(100, state.happy + 1);
    }
    // amenities (well, tavern) add happiness passively, scaled by level
    const amenity = state.buildings.reduce((s, b) => s + (BUILDINGS[b.type].happy ? Math.ceil(BUILDINGS[b.type].happy / 6) * (b.level || 1) : 0), 0);
    if (amenity) state.happy = Math.min(100, state.happy + amenity);
    Object.keys(gained).forEach(k => { prodFlashTimer[k] = 0.5; });
    updateHUD();
  }

  function onNewDay() {
    // trader arrival
    if (state.day >= state.nextTraderDay && state.buildings.some(b => b.type === 'market')) {
      openTrader();
      state.nextTraderDay = state.day + 3 + Math.floor(rrand(state.day * 17) * 3);
    } else if (state.day >= state.nextTraderDay) {
      // no market yet — remind and push out
      state.nextTraderDay = state.day + 2;
    }
    // happiness drives population: happy towns attract newcomers,
    // miserable ones drive people away.
    if (state.happy >= 55 && state.villagers.length < popCap() && state.res.food > state.villagers.length * 2) {
      const homes = state.buildings.filter(b => BUILDINGS[b.type].housing &&
        state.villagers.filter(v => v.homeId === b.id).length < BUILDINGS[b.type].housing);
      if (homes.length) {
        spawnVillager(homes[Math.floor(rrand(state.day * 5) * homes.length)]);
        assignJobs();
        toast('👶 A new villager joined Hearthvale!');
      }
      state.sadDays = 0;
    } else if (state.happy < 25) {
      state.sadDays = (state.sadDays || 0) + 1;
      if (state.sadDays >= 2 && state.villagers.length > 0) {
        const leaver = state.villagers[state.villagers.length - 1];
        state.villagers = state.villagers.filter(v => v !== leaver);
        assignJobs();
        toast('💔 A villager left — Hearthvale is unhappy.');
        state.sadDays = 0;
      }
    } else {
      state.sadDays = 0;
    }
    save();
  }

  // ---- Trader --------------------------------------------------
  const TRADE_GOODS = [
    { k: 'wood', ic: '🪵', name: 'Wood' },
    { k: 'stone', ic: '🪨', name: 'Stone' },
    { k: 'food', ic: '🍎', name: 'Food' },
  ];
  let traderPrices = null;
  function openTrader() {
    traderPrices = {};
    TRADE_GOODS.forEach(g => {
      const base = { wood: 2, stone: 3, food: 2 }[g.k];
      const buy = base + Math.round(rrand((state.day + g.k.length) * 31) * base); // trader sells to you
      const sell = Math.max(1, buy - 1 - Math.floor(rrand(state.day * 7 + g.k.length) * 2)); // trader buys from you
      traderPrices[g.k] = { buy, sell };
    });
    renderTrader();
    document.getElementById('trader').classList.add('show');
    SFX('trader');
    toast('🚚 A traveling merchant has arrived at the market!');
  }
  function renderTrader() {
    const rows = document.getElementById('trade-rows');
    rows.innerHTML = '';
    TRADE_GOODS.forEach(g => {
      const p = traderPrices[g.k];
      const row = document.createElement('div');
      row.className = 'trade-row';
      row.innerHTML =
        '<div class="good"><span>' + g.ic + '</span>' + g.name + ' <span style="color:var(--ink-dim)">(have ' + Math.floor(state.res[g.k]) + ')</span></div>' +
        '<div class="price">buy ' + p.buy + ' / sell ' + p.sell + '</div>' +
        '<div class="tbtns"><button data-act="buy" data-k="' + g.k + '"' + (state.res.gold < p.buy ? ' disabled' : '') + '>Buy</button>' +
        '<button data-act="sell" data-k="' + g.k + '"' + (state.res[g.k] < 1 ? ' disabled' : '') + '>Sell</button></div>';
      rows.appendChild(row);
    });
    rows.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
      const k = btn.dataset.k, p = traderPrices[k];
      if (btn.dataset.act === 'buy' && state.res.gold >= p.buy) { state.res.gold -= p.buy; state.res[k] += 1; SFX('coin'); }
      else if (btn.dataset.act === 'sell' && state.res[k] >= 1) { state.res[k] -= 1; state.res.gold += p.sell; SFX('coin'); }
      renderTrader(); updateHUD(); save();
    }));
  }
  document.getElementById('trader-close').addEventListener('click', () => {
    document.getElementById('trader').classList.remove('show'); save();
  });

  // ============================================================
  //  Rendering
  // ============================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let waterFrame = 0, waterTimer = 0;

  function resize() {
    view = { w: window.innerWidth, h: window.innerHeight };
    canvas.width = Math.floor(view.w * dpr);
    canvas.height = Math.floor(view.h * dpr);
    canvas.style.width = view.w + 'px';
    canvas.style.height = view.h + 'px';
    ctx.imageSmoothingEnabled = false;
    clampCam();
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
    const z = cam.z;
    // visible tile bounds
    const x0 = Math.max(0, Math.floor(cam.x / TILE));
    const y0 = Math.max(0, Math.floor(cam.y / TILE));
    const x1 = Math.min(MAP_W - 1, Math.ceil((cam.x + view.w / z) / TILE));
    const y1 = Math.min(MAP_H - 1, Math.ceil((cam.y + view.h / z) / TILE));
    const sx = -cam.x * z, sy = -cam.y * z;

    // sky/void behind
    ctx.fillStyle = '#3a5240'; ctx.fillRect(0, 0, view.w, view.h);

    // terrain layer
    for (let ty = y0; ty <= y1; ty++) {
      for (let tx = x0; tx <= x1; tx++) {
        const t = tiles[idx(tx, ty)];
        let spr;
        if (t === T_GRASS) spr = SPR['grass' + ((tx * 7 + ty * 13) & 3)];
        else if (t === T_DIRT) spr = SPR.dirt;
        else if (t === T_SAND) spr = SPR.sand;
        else if (t === T_BRIDGE) spr = SPR.bridge;
        else spr = SPR['water' + waterFrame];
        ctx.drawImage(spr, Math.round(sx + tx * TILE * z), Math.round(sy + ty * TILE * z), TILE * z, TILE * z);
      }
    }
    // flat decorations (crop patches, pebbles, mushrooms, tall grass, reeds)
    for (const d of decos) {
      if (!FLAT_DECO[d.kind] || d.tx < x0 - 1 || d.tx > x1 + 1 || d.ty < y0 - 1 || d.ty > y1 + 1) continue;
      const spr = SPR[d.kind]; if (spr) ctx.drawImage(spr, Math.round(sx + d.tx * TILE * z), Math.round(sy + d.ty * TILE * z), TILE * z, TILE * z);
    }
    // object layer (flowers flat; trees/rocks/mountains/props sorted by baseline y)
    const drawables = [];
    for (let ty = y0; ty <= y1; ty++)
      for (let tx = x0; tx <= x1; tx++) {
        const o = tileObj[idx(tx, ty)];
        if (o === O_FLOWER) ctx.drawImage(SPR.flowers, Math.round(sx + tx * TILE * z), Math.round(sy + ty * TILE * z), TILE * z, TILE * z);
        else if (o === O_TREE) drawables.push({ y: ty + 0.9, spr: SPR.tree, tx, ty });
        else if (o === O_BUSH) drawables.push({ y: ty + 0.9, spr: SPR.bush, tx, ty });
        else if (o === O_ROCK) drawables.push({ y: ty + 0.9, spr: SPR.rock, tx, ty });
        else if (o === O_MTN) drawables.push({ y: ty + 0.9, spr: SPR.mtn, tx, ty });
      }
    // decoration props (fences/stumps short, everything sorted for overlap)
    for (const d of decos) {
      if (FLAT_DECO[d.kind] || d.tx < x0 - 1 || d.tx > x1 + 1 || d.ty < y0 - 1 || d.ty > y1 + 1) continue;
      const spr = SPR[d.kind]; if (!spr) continue;
      drawables.push({ y: d.ty + (d.kind === 'fence' || d.kind === 'stump' ? 0.5 : 0.9), spr, tx: d.tx, ty: d.ty });
    }
    // buildings + villagers
    state.buildings.forEach(b => { const def = BUILDINGS[b.type]; if (b.ty + def.h >= y0 - 2 && b.ty <= y1 + 2) drawables.push({ y: b.ty + def.h, kind: 'building', b }); });
    state.villagers.forEach(v => { const vty = v.y / TILE; if (vty >= y0 - 2 && vty <= y1 + 2) drawables.push({ y: vty, kind: 'villager', v }); });
    drawables.sort((a, b) => a.y - b.y);

    for (const d of drawables) {
      if (d.kind === 'building') drawBuilding(d.b, sx, sy, z);
      else if (d.kind === 'villager') drawVillager(d.v, sx, sy, z);
      else { // sprite prop: bottom-aligned to its tile so it "stands" on the ground
        const wpx = d.spr.width, hpx = d.spr.height;
        const drawY = (d.ty + 1) * TILE - hpx;
        ctx.drawImage(d.spr, Math.round(sx + d.tx * TILE * z), Math.round(sy + drawY * z), wpx * z, hpx * z);
      }
    }

    // road tool: single-tile hover highlight
    if (buildMode === 'road' && hoverTile && inMap(hoverTile.tx, hoverTile.ty)) {
      const i = idx(hoverTile.tx, hoverTile.ty), tl = tiles[i], o = tileObj[i];
      const ok = state.res.wood >= 1 && occ[i] < 0 && tl !== T_WATER && tl !== T_DIRT && tl !== T_BRIDGE && o !== O_TREE && o !== O_ROCK && o !== O_MTN && o !== O_BUSH;
      if (ok) { ctx.globalAlpha = 0.55; ctx.drawImage(SPR.dirt, Math.round(sx + hoverTile.tx * TILE * z), Math.round(sy + hoverTile.ty * TILE * z), TILE * z, TILE * z); ctx.globalAlpha = 1; }
      ctx.strokeStyle = ok ? '#8ec26b' : '#e06a5c'; ctx.lineWidth = 2;
      ctx.strokeRect(Math.round(sx + hoverTile.tx * TILE * z) + 1, Math.round(sy + hoverTile.ty * TILE * z) + 1, TILE * z - 2, TILE * z - 2);
    }
    // placement ghost
    if (buildMode && buildMode !== 'demolish' && buildMode !== 'road' && hoverTile) {
      const def = BUILDINGS[buildMode];
      const ok = canPlaceAt(buildMode, hoverTile.tx, hoverTile.ty) && canAfford(buildMode);
      ctx.globalAlpha = 0.6;
      if (def._sprite) ctx.drawImage(def._sprite, Math.round(sx + hoverTile.tx * TILE * z), Math.round(sy + (hoverTile.ty * TILE - (def._rise || 6)) * z), def.w * TILE * z, (def.h * TILE + (def._rise || 6)) * z);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = ok ? '#8ec26b' : '#e06a5c';
      ctx.lineWidth = 2;
      ctx.strokeRect(Math.round(sx + hoverTile.tx * TILE * z) + 1, Math.round(sy + hoverTile.ty * TILE * z) + 1, def.w * TILE * z - 2, def.h * TILE * z - 2);
    }
    if (buildMode === 'demolish' && hoverTile) {
      const i = idx(hoverTile.tx, hoverTile.ty);
      if (inMap(hoverTile.tx, hoverTile.ty) && occ[i] >= 0) {
        const b = buildingById(occ[i]); const def = BUILDINGS[b.type];
        ctx.strokeStyle = '#e06a5c'; ctx.lineWidth = 2;
        ctx.strokeRect(Math.round(sx + b.tx * TILE * z) + 1, Math.round(sy + b.ty * TILE * z) + 1, def.w * TILE * z - 2, def.h * TILE * z - 2);
      }
    }
    // selection highlight
    if (selected) {
      const b = selected, def = BUILDINGS[b.type];
      ctx.strokeStyle = '#f2c14e'; ctx.lineWidth = 2;
      ctx.strokeRect(Math.round(sx + b.tx * TILE * z) + 1, Math.round(sy + b.ty * TILE * z) + 1, def.w * TILE * z - 2, def.h * TILE * z - 2);
    }

    // day/night tint
    drawDayNight();
  }

  function drawBuilding(b, sx, sy, z) {
    const def = BUILDINGS[b.type];
    const spr = def._sprite || makeBuildingSprite(b.type);
    const rise = def._rise || 6;
    // soft ground shadow for depth
    ctx.fillStyle = 'rgba(0,0,0,0.14)';
    ctx.beginPath();
    ctx.ellipse(sx + (b.tx * TILE + def.w * TILE / 2) * z, sy + (b.ty + def.h) * TILE * z - 2 * z, def.w * TILE * 0.5 * z, 3 * z, 0, 0, 7);
    ctx.fill();
    ctx.drawImage(spr, Math.round(sx + b.tx * TILE * z), Math.round(sy + (b.ty * TILE - rise) * z), def.w * TILE * z, (def.h * TILE + rise) * z);
    // warm window glow at night — the town looks alive after dark
    if (isNight()) {
      const gx = sx + (b.tx * TILE + def.w * TILE / 2) * z;
      const gy = sy + (b.ty * TILE + def.h * TILE * 0.42) * z;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.5;
      const rg = ctx.createRadialGradient(gx, gy, 1, gx, gy, def.w * TILE * 0.55 * z);
      rg.addColorStop(0, 'rgba(255,210,120,0.9)'); rg.addColorStop(1, 'rgba(255,210,120,0)');
      ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(gx, gy, def.w * TILE * 0.55 * z, 0, 7); ctx.fill();
      ctx.restore();
    }
    // level pips (gold dots) for upgraded buildings
    const lvl = b.level || 1;
    if (lvl > 1) {
      const px0 = sx + (b.tx * TILE + 2) * z, py0 = sy + (b.ty * TILE - rise + 1) * z;
      for (let i = 0; i < lvl - 1; i++) {
        ctx.fillStyle = '#f2c14e'; ctx.strokeStyle = C.outline; ctx.lineWidth = Math.max(1, z * 0.5);
        ctx.beginPath(); ctx.arc(px0 + i * 3.2 * z, py0, 1.4 * z, 0, 7); ctx.fill(); ctx.stroke();
      }
    }
    // unstaffed worker building: a STATIC amber "!" badge (no animation)
    if (def.worker && !b.staffed) {
      const bx = sx + (b.tx * TILE + def.w * TILE / 2) * z;
      const by = sy + (b.ty * TILE - rise - 1) * z;
      ctx.fillStyle = '#e0a44a'; ctx.strokeStyle = C.outline; ctx.lineWidth = Math.max(1, z * 0.6);
      ctx.beginPath(); ctx.arc(bx, by, 4 * z, 0, 7); ctx.fill(); ctx.stroke();
      ctx.fillStyle = C.outline;
      ctx.fillRect(bx - 0.5 * z, by - 2 * z, z, 2.4 * z); ctx.fillRect(bx - 0.5 * z, by + 1.4 * z, z, z);
    }
  }

  // Villager sprites: cached per (color, frame, role), outlined. Frame is
  // chosen from position while walking, so nothing animates on a timer.
  const VSPR = {};
  const SKINS = ['#f1bf95', '#e6b088', '#d69a6e', '#c8875a'];
  function shade(hex, f) { const [r, g, b] = hexToRgb(hex); const c = v => Math.max(0, Math.min(255, Math.round(v * f))); return 'rgb(' + c(r) + ',' + c(g) + ',' + c(b) + ')'; }
  function villagerSprite(color, frame, role) {
    const key = color + '|' + frame + '|' + (role || '');
    if (VSPR[key]) return VSPR[key];
    const W = 12, H = 17, { c, x } = makeCanvas(W, H);
    const P = (px, py, pw, ph, col) => { x.fillStyle = col; x.fillRect(px, py, pw, ph); };
    const h = (color.charCodeAt(1) + color.charCodeAt(3));
    const skin = SKINS[h % SKINS.length], skinDk = shade(skin, 0.82);
    const legF = frame === 1 ? -1 : 0, legB = frame === 2 ? -1 : 0;
    P(4, 13, 2, 4 + legF, '#3a2f22'); P(6, 13, 2, 4 + legB, '#3a2f22');   // legs
    P(3, 8, 6, 6, color); P(3, 8, 6, 1, shade(color, 1.2)); P(3, 13, 6, 1, shade(color, 0.7)); // tunic
    P(2, 9, 1, 4, shade(color, 0.72)); P(9, 9, 1, 4, shade(color, 0.72)); // arms
    // tool by trade (held in the right hand)
    if (role === 'lumber') { P(10, 6, 1, 7, '#6b4a30'); P(9, 5, 3, 2, C.slate); P(9, 5, 1, 1, C.slateHi); }
    else if (role === 'farm') { P(10, 5, 1, 9, '#8a5a2b'); P(9, 5, 3, 1, C.slate); }
    else if (role === 'quarry') { P(10, 6, 1, 7, '#6b4a30'); P(9, 5, 3, 1, C.stoneWDk); P(9, 6, 1, 1, C.stoneWDk); P(11, 6, 1, 1, C.stoneWDk); }
    else if (role === 'carpenter') { P(9, 8, 3, 2, '#8a5a2b'); P(9, 8, 3, 1, '#a8794a'); }
    else if (role === 'bakery') { P(9, 9, 3, 3, '#e6cc82'); P(9, 9, 3, 1, '#fff4d6'); }
    P(4, 3, 4, 5, skin); P(4, 7, 4, 1, skinDk);            // head
    const hair = C.hair[h % C.hair.length];
    P(4, 3, 4, 2, hair); P(3, 4, 1, 2, hair); P(8, 4, 1, 2, hair); // hair
    P(5, 5, 1, 1, C.outline); P(7, 5, 1, 1, C.outline);    // eyes
    addOutline(x, W, H);
    VSPR[key] = c; return c;
  }

  function drawVillager(v, sx, sy, z) {
    if (v.sleeping) return;   // tucked in at home for the night
    const moving = v.path && v.path.length > 0;
    const frame = moving ? (Math.floor((v.x + v.y) / 3) % 2 === 0 ? 1 : 2) : 0;
    let role = null; if (v.jobId) { const jb = buildingById(v.jobId); if (jb) role = jb.type; }
    const spr = villagerSprite(v.color, frame, role);
    const W = spr.width, H = spr.height;
    const px = sx + v.x * z, py = sy + v.y * z;
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(px, py + 2 * z, 3.2 * z, 1.6 * z, 0, 0, 7); ctx.fill();
    ctx.drawImage(spr, Math.round(px - (W / 2) * z), Math.round(py - (H - 2) * z), W * z, H * z);
  }

  function drawDayNight() {
    // 0..24 → tint. Warm dawn/dusk, deep-blue night, clear day.
    const h = state.time;
    let a = 0, col = '24,32,64';
    if (h < 5) a = 0.4;
    else if (h < 7) { a = 0.4 * (1 - (h - 5) / 2); col = '70,52,80'; }
    else if (h < 17) a = 0;
    else if (h < 20) { a = 0.28 * ((h - 17) / 3); col = '96,58,34'; }
    else if (h < 22) { a = 0.28 + 0.12 * ((h - 20) / 2); col = '40,36,66'; }
    else a = 0.4;
    if (a > 0.001) {
      ctx.fillStyle = 'rgba(' + col + ',' + a.toFixed(3) + ')';
      ctx.fillRect(0, 0, view.w, view.h);
    }
    // window glow at night
    if (a > 0.25) {
      // handled implicitly by tint; keep simple
    }
  }

  // ============================================================
  //  HUD / UI
  // ============================================================
  function updateHUD() {
    document.getElementById('r-wood').textContent = Math.floor(state.res.wood);
    document.getElementById('r-stone').textContent = Math.floor(state.res.stone);
    document.getElementById('r-food').textContent = Math.floor(state.res.food);
    document.getElementById('r-gold').textContent = Math.floor(state.res.gold);
    document.getElementById('r-pop').textContent = state.villagers.length;
    document.getElementById('r-popcap').textContent = '/' + popCap();
    document.getElementById('r-day').textContent = state.day;
    const hp = Math.round(state.happy);
    document.getElementById('r-happy').textContent = hp;
    document.getElementById('r-happyface').textContent = hp >= 70 ? '😀' : hp >= 40 ? '🙂' : '😟';
    const h = state.time;
    document.getElementById('r-tod').innerHTML = (h >= 6 && h < 19) ? '☀️' : '🌙';
    // (No per-cycle HUD flash — numbers just update, nothing blinks.)
  }

  function buildBar() {
    const bar = document.getElementById('buildbar');
    bar.innerHTML = '';
    BUILD_ORDER.forEach(type => {
      const def = BUILDINGS[type];
      const btn = document.createElement('button');
      btn.className = 'btn';
      const costStr = Object.keys(def.cost).map(k => Math.floor(def.cost[k]) + shortRes(k)).join(' ');
      btn.innerHTML = '<span class="emoji">' + def.emoji + '</span><span class="lbl">' + def.name + '</span><span class="cost">' + costStr + '</span>';
      btn.dataset.type = type;
      btn.addEventListener('click', () => selectBuild(type));
      bar.appendChild(btn);
    });
    // road tool — paves a tile so villagers walk it faster
    const road = document.createElement('button');
    road.className = 'btn tool';
    road.innerHTML = '<span class="emoji">🛤️</span><span class="lbl">Road</span><span class="cost">1🪵</span>';
    road.dataset.type = 'road';
    road.addEventListener('click', () => selectBuild('road'));
    bar.appendChild(road);
    // demolish tool
    const dem = document.createElement('button');
    dem.className = 'btn tool';
    dem.innerHTML = '<span class="emoji">⛏️</span><span class="lbl">Remove</span>';
    dem.dataset.type = 'demolish';
    dem.addEventListener('click', () => selectBuild('demolish'));
    bar.appendChild(dem);
    refreshBarState();
  }
  function shortRes(k) { return { wood: '🪵', stone: '🪨', food: '🍎', gold: '💰' }[k] || k; }
  function refreshBarState() {
    document.querySelectorAll('#buildbar .btn').forEach(btn => {
      const type = btn.dataset.type;
      btn.classList.toggle('sel', buildMode === type);
      if (type !== 'demolish' && type !== 'road') {
        const def = BUILDINGS[type];
        btn.classList.toggle('cantafford', !canAfford(type));
        const taken = def.unique && state.buildings.some(b => b.type === type);
        btn.classList.toggle('locked', taken);
      } else if (type === 'road') {
        btn.classList.toggle('cantafford', state.res.wood < 1);
      }
    });
  }

  function selectBuild(type) {
    if (type !== 'demolish' && type !== 'road' && BUILDINGS[type].unique && state.buildings.some(b => b.type === type)) { toast('You already have a ' + BUILDINGS[type].name + '.'); return; }
    buildMode = (buildMode === type) ? null : type;
    selected = null; hidePanel();
    canvas.classList.toggle('building', !!buildMode);
    refreshBarState();
    hideHint();
  }

  let selected = null;
  function showPanel(b) {
    selected = b; buildMode = null; canvas.classList.remove('building'); refreshBarState();
    const def = BUILDINGS[b.type], lvl = b.level || 1;
    document.getElementById('p-emoji').textContent = def.emoji;
    document.getElementById('p-name').textContent = def.name + (lvl > 1 ? ' · Lv' + lvl : '');
    document.getElementById('p-sub').textContent = def.desc;
    const stats = document.getElementById('p-stats');
    let html = '';
    if (def.housing) html += statRow('Houses', state.villagers.filter(v => v.homeId === b.id).length + ' / ' + effHousing(b) + ' villagers');
    if (def.worker) html += statRow('Worker', b.staffed ? 'Assigned ✅' : 'Needs a villager 💤');
    if (def.prod) { const k = Object.keys(def.prod)[0]; const base = def.prod[k] * lvl; html += statRow('Produces', (b.bonus ? Math.ceil(base * 1.5) : base) + ' ' + shortRes(k) + (b.bonus ? ' (rich site!)' : '') + ' / cycle'); }
    if (def.cons) { const k = Object.keys(def.cons)[0]; html += statRow('Consumes', def.cons[k] + ' ' + shortRes(k) + ' / cycle'); }
    if (def.happy) html += statRow('Happiness', '+' + (Math.ceil(def.happy / 6) * lvl) + ' / cycle');
    if (def.unique && b.type === 'market') html += statRow('Merchant', 'visits every few days');
    html += statRow('Level', lvl + ' / ' + MAX_LEVEL);
    stats.innerHTML = html;
    const actions = document.getElementById('p-actions');
    let btns = '';
    if (canUpgrade(b)) {
      const cost = upgradeCost(b);
      const costStr = Object.keys(cost).map(k => cost[k] + shortRes(k)).join(' ');
      btns += '<button id="p-upgrade">⬆️ Upgrade <span style="opacity:.7;font-size:11px">' + costStr + '</span></button>';
    }
    btns += '<button class="danger" id="p-demolish">Remove</button>';
    actions.innerHTML = btns;
    const upBtn = document.getElementById('p-upgrade');
    if (upBtn) upBtn.onclick = () => { upgradeBuilding(b); if (selected === b) showPanel(b); };
    document.getElementById('p-demolish').onclick = () => { demolish(b); hidePanel(); };
    document.getElementById('panel').classList.add('show');
  }
  function statRow(a, b) { return '<div class="stat"><span>' + a + '</span><b>' + b + '</b></div>'; }
  function hidePanel() { selected = null; document.getElementById('panel').classList.remove('show'); }

  let toastId = 0;
  function toast(msg) {
    const wrap = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = 'toast'; el.textContent = msg;
    wrap.appendChild(el);
    const id = ++toastId;
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 4900);
    // cap visible toasts
    while (wrap.children.length > 4) wrap.removeChild(wrap.firstChild);
  }
  function hideHint() { const h = document.getElementById('hint'); if (h) { h.style.opacity = '0'; state.seenIntro = true; } }

  // ============================================================
  //  Input
  // ============================================================
  let dragging = false, dragMoved = false, lastPX = 0, lastPY = 0, downX = 0, downY = 0;

  function screenToTile(px, py) {
    const wx = cam.x + px / cam.z, wy = cam.y + py / cam.z;
    return { tx: Math.floor(wx / TILE), ty: Math.floor(wy / TILE) };
  }

  canvas.addEventListener('pointerdown', e => {
    dragging = true; dragMoved = false;
    lastPX = downX = e.clientX; lastPY = downY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    hoverTile = screenToTile(e.clientX, e.clientY);
    if (dragging) {
      const dx = e.clientX - lastPX, dy = e.clientY - lastPY;
      if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 5) { dragMoved = true; canvas.classList.add('panning'); }
      cam.x -= dx / cam.z; cam.y -= dy / cam.z;
      clampCam();
      lastPX = e.clientX; lastPY = e.clientY;
    }
  });
  canvas.addEventListener('pointerup', e => {
    canvas.classList.remove('panning');
    if (dragging && !dragMoved) handleClick(e.clientX, e.clientY);
    dragging = false;
  });
  canvas.addEventListener('pointercancel', () => { dragging = false; canvas.classList.remove('panning'); });

  function handleClick(px, py) {
    const t = screenToTile(px, py);
    if (!inMap(t.tx, t.ty)) return;
    if (buildMode === 'demolish') {
      const o = occ[idx(t.tx, t.ty)];
      if (o >= 0) demolish(buildingById(o)); else SFX('error');
      return;
    }
    if (buildMode === 'road') {
      const i = idx(t.tx, t.ty), tile = tiles[i];
      const o = tileObj[i];
      if (state.res.wood < 1) { toast("Need 1 🪵 for a road."); SFX('error'); return; }
      if (occ[i] >= 0 || tile === T_WATER || tile === T_DIRT || tile === T_BRIDGE || o === O_TREE || o === O_ROCK || o === O_MTN || o === O_BUSH) { SFX('error'); return; }
      state.res.wood -= 1; tiles[i] = T_DIRT; tileObj[i] = O_NONE;
      (state.roads || (state.roads = [])).push({ tx: t.tx, ty: t.ty });
      SFX('place'); refreshBarState(); save();
      return;
    }
    if (buildMode) {
      if (!canAfford(buildMode)) { toast("Can't afford that yet."); SFX('error'); return; }
      if (!canPlaceAt(buildMode, t.tx, t.ty)) { toast("Can't build there."); SFX('error'); return; }
      const b = placeBuilding(buildMode, t.tx, t.ty);
      refreshBarState();
      if (!canAfford(buildMode)) { buildMode = null; canvas.classList.remove('building'); refreshBarState(); }
      return;
    }
    // else: select a building
    const o = occ[idx(t.tx, t.ty)];
    if (o >= 0) showPanel(buildingById(o));
    else hidePanel();
  }

  // wheel zoom
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const before = screenToTile(e.clientX, e.clientY);
    const oldZ = cam.z;
    cam.z = Math.max(minZoom(), Math.min(6, cam.z * (e.deltaY < 0 ? 1.15 : 0.87)));
    // keep cursor world point stable
    const wx = cam.x + e.clientX / oldZ, wy = cam.y + e.clientY / oldZ;
    cam.x = wx - e.clientX / cam.z; cam.y = wy - e.clientY / cam.z;
    clampCam();
  }, { passive: false });
  function minZoom() { return Math.max(view.w / WORLD_PX_W, view.h / WORLD_PX_H, 1.5); }

  // keyboard pan + hotkeys
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'Escape') { buildMode = null; canvas.classList.remove('building'); hidePanel(); refreshBarState(); }
    if (e.key === 'm' || e.key === 'M') { state.muted = !state.muted; toast(state.muted ? '🔇 Sound off' : '🔊 Sound on'); if (!state.muted) SFX('coin'); save(); }
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= BUILD_ORDER.length) selectBuild(BUILD_ORDER[n - 1]);
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
  function keyboardPan(dt) {
    const sp = 260 * dt / cam.z;
    if (keys['w'] || keys['arrowup']) cam.y -= sp;
    if (keys['s'] || keys['arrowdown']) cam.y += sp;
    if (keys['a'] || keys['arrowleft']) cam.x -= sp;
    if (keys['d'] || keys['arrowright']) cam.x += sp;
    if (keys['w'] || keys['a'] || keys['s'] || keys['d'] || keys['arrowup'] || keys['arrowdown'] || keys['arrowleft'] || keys['arrowright']) clampCam();
  }

  // ============================================================
  //  Save / load
  // ============================================================
  function save() {
    try {
      const s = {
        res: state.res, buildings: state.buildings.map(b => ({ id: b.id, type: b.type, tx: b.tx, ty: b.ty, bonus: b.bonus, level: b.level || 1 })),
        villagers: state.villagers.map(v => ({ id: v.id, homeId: v.homeId, jobId: v.jobId, tx: v.tx, ty: v.ty, color: v.color, ph: v.ph })),
        day: state.day, time: state.time, nextTraderDay: state.nextTraderDay,
        _nextId: state._nextId, _lastProdHour: state._lastProdHour, _prodAbs: _prodAbs,
        happy: state.happy, seenIntro: state.seenIntro, seed: state.seed,
        goalIndex: state.goalIndex, sadDays: state.sadDays,
        roads: state.roads || [], muted: !!state.muted,
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(s));
    } catch (e) { /* private mode / quota — ignore */ }
  }
  function load() {
    let raw = null;
    try { raw = localStorage.getItem(SAVE_KEY); } catch (e) { }
    if (!raw) return false;
    try {
      const s = JSON.parse(raw);
      state = defaultState();
      state.seed = s.seed || 12345;
      const start = generateWorld(state.seed);
      Object.assign(state.res, s.res || {});
      state.day = s.day || 1; state.time = s.time || 8;
      state.nextTraderDay = s.nextTraderDay || 3;
      state._nextId = s._nextId || 1;
      state._lastProdHour = s._lastProdHour || 8;
      _prodAbs = (typeof s._prodAbs === 'number') ? s._prodAbs : (state.day * HOURS_PER_DAY + state.time);
      state.happy = s.happy != null ? s.happy : 50;
      state.goalIndex = s.goalIndex || 0;
      state.sadDays = s.sadDays || 0;
      state.seenIntro = !!s.seenIntro;
      state.muted = !!s.muted;
      // reapply player-painted roads over the regenerated terrain
      state.roads = s.roads || [];
      state.roads.forEach(r => { if (inMap(r.tx, r.ty) && tiles[idx(r.tx, r.ty)] !== T_WATER) { tiles[idx(r.tx, r.ty)] = T_DIRT; tileObj[idx(r.tx, r.ty)] = O_NONE; } });
      // rebuild occupancy + buildings
      (s.buildings || []).forEach(sb => {
        if (!BUILDINGS[sb.type]) return;
        const def = BUILDINGS[sb.type];
        const b = { id: sb.id, type: sb.type, tx: sb.tx, ty: sb.ty, bonus: sb.bonus, level: sb.level || 1, staffed: false, worker: null };
        for (let dy = 0; dy < def.h; dy++) for (let dx = 0; dx < def.w; dx++) { const i = idx(sb.tx + dx, sb.ty + dy); if (inMap(sb.tx + dx, sb.ty + dy)) occ[i] = b.id; }
        state.buildings.push(b);
      });
      (s.villagers || []).forEach(sv => {
        const v = {
          id: sv.id, homeId: sv.homeId, jobId: sv.jobId,
          x: sv.tx * TILE + TILE / 2, y: sv.ty * TILE + TILE / 2, tx: sv.tx, ty: sv.ty,
          state: 'idle', color: sv.color || V_COLORS[0], ph: sv.ph || 0, wait: 0,
        };
        state.villagers.push(v);
      });
      state.buildings.forEach(b => { b.staffed = state.villagers.some(v => v.jobId === b.id); });
      return true;
    } catch (e) { return false; }
  }

  window.__hvReset = function () {
    try { localStorage.removeItem(SAVE_KEY); } catch (e) { }
    location.reload();
  };

  // ============================================================
  //  Boot + main loop
  // ============================================================
  let perfNow = 0, lastT = 0, acc = 0;

  function newGame() {
    state = defaultState();
    state.seed = 1000 + Math.floor((Date.now ? 0 : 0)); // deterministic-ish; Date.now blocked in some envs
    try { state.seed = (Date.now() % 100000) | 0; } catch (e) { state.seed = 42424; }
    const start = generateWorld(state.seed);
    _prodAbs = state.day * HOURS_PER_DAY + state.time;
    // center camera on the starter clearing
    cam = { x: start.startX * TILE - 200, y: start.startY * TILE - 150, z: 3 };
  }

  function init() {
    buildTileSprites();
    Object.keys(BUILDINGS).forEach(makeBuildingSprite);
    view = { w: window.innerWidth, h: window.innerHeight };
    cam = { x: 0, y: 0, z: 3 };

    const loaded = load();
    if (!loaded) newGame();
    else if (cam == null) cam = { x: MAP_W * TILE / 2, y: MAP_H * TILE / 2, z: 3 };
    if (!cam) cam = { x: 0, y: 0, z: 3 };

    resize();
    clampCam();
    buildBar();
    updateHUD();
    renderGoal();
    if (state.seenIntro) hideHint();

    window.addEventListener('resize', () => { dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1)); resize(); });
    document.getElementById('game').addEventListener('contextmenu', e => e.preventDefault());

    requestAnimationFrame(loop);
  }

  // fixed-ish timestep for sim, render every frame
  function loop(ts) {
    perfNow = ts;
    if (!lastT) lastT = ts;
    let dt = (ts - lastT) / 1000; lastT = ts;
    if (dt > 0.1) dt = 0.1; // clamp big gaps (tab switches)

    // sim
    stepSim(dt);
    // render
    draw();
    // hud light refresh
    hudTick += dt;
    if (hudTick > 0.25) { updateHUD(); refreshBarState(); checkGoals(); renderGoal(); hudTick = 0; }

    requestAnimationFrame(loop);
  }
  let hudTick = 0, saveTick = 0;

  function stepSim(dt) {
    keyboardPan(dt);
    advanceTimeSafe(dt);
    // villagers
    for (const v of state.villagers) villagerTick(v, dt);
    // autosave
    saveTick += dt; if (saveTick > 5) { save(); saveTick = 0; }
  }

  // Robust time advance using an absolute hour counter for production.
  function advanceTimeSafe(dt) {
    const hoursPerSec = HOURS_PER_DAY / DAY_SECONDS;
    const dh = dt * hoursPerSec;
    state.time += dh;
    while (state.time >= HOURS_PER_DAY) {
      state.time -= HOURS_PER_DAY; state.day++; onNewDay();
    }
    // production: fire every PROD_INTERVAL absolute hours
    let guard = 0;
    while ((state.day * HOURS_PER_DAY + state.time) - _prodAbs >= PROD_INTERVAL && guard++ < 50) {
      _prodAbs += PROD_INTERVAL;
      runProduction();
    }
  }

  // kick off
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
