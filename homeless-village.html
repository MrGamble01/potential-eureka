<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homeless Village — Survive Under the Bridge</title>
<meta name="description" content="Survive under the bridge, scavenge and craft, and build a village from nothing. A 3D survival sim from Eureka Games.">
<meta name="theme-color" content="#1a1410">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231a1410'/><text x='50%25' y='58%25' font-size='38' text-anchor='middle' dominant-baseline='middle'>🏠</text></svg>">
<meta property="og:type" content="website">
<meta property="og:title" content="Homeless Village — Eureka Games">
<meta property="og:description" content="Survive under the bridge, scavenge and craft, and build a village from nothing.">
<meta property="og:image" content="/assets/thumbs/homeless.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="homeless-village/css/game.css">
<link rel="stylesheet" href="/css/arcade-chrome.css">
</head>
<body>

<div id="canvas-container">
  <canvas id="three-canvas"></canvas>
</div>

<div id="hud">
  <div id="night-overlay"></div>
  <div id="sweep-warning">POLICE SWEEP INCOMING</div>

  <div id="top-bar">
    <div class="left">
      <a class="ea-back" href="/"><span class="ea-chevron">&#8249;</span><span class="ea-word">GAMES</span></a>
      <div id="season-badge">AUTUMN</div>
      <span id="days-counter">Days Survived: 0</span>
    </div>
    <div class="right">
      <div class="stat-pill"><span class="icon">🍞</span><span class="val" id="stat-food">0</span><span> food</span></div>
      <div class="stat-pill"><span class="icon">🧱</span><span class="val" id="stat-scraps">0</span><span> scraps</span></div>
      <div class="stat-pill"><span class="icon">🫙</span><span class="val" id="stat-cans">0</span><span> cans</span></div>
      <div class="stat-pill"><span class="icon">🩶</span><span class="val" id="stat-goodwill">0</span><span> goodwill</span></div>
      <div class="stat-pill"><span class="icon">❤️</span><span class="val" id="stat-health">100</span><span>%</span></div>
      <div class="stat-pill"><span class="icon">🌡️</span><span class="val" id="stat-warmth">100</span><span>%</span></div>
    </div>
  </div>

  <div id="craft-panel">
    <h3>&#9881; Craft</h3>
    <div id="craft-list"></div>
  </div>

  <div id="workers-panel">
    <h3>&#128101; Community</h3>
    <div id="workers-list"></div>
  </div>

  <div id="action-panel">
    <h3>&#9875; Actions</h3>
    <div id="action-list"></div>
  </div>

  <div id="event-banner">
    <div class="ev-close" onclick="closeEvent()">&#10005;</div>
    <div class="ev-title" id="ev-title"></div>
    <div id="ev-body"></div>
  </div>

  <div id="log-feed"></div>
  <div id="tooltip"></div>

  <button id="craft-toggle" aria-controls="craft-panel" aria-expanded="false">&#9881; Craft</button>

  <div id="bottom-bar">
    <div class="stat-pill">
      <span class="icon">☀️</span>
      <div id="day-bar" style="width:120px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin:0 6px">
        <div id="day-progress" style="height:100%;background:linear-gradient(90deg,#e8a030,#e0d060);width:0%;transition:width .5s"></div>
      </div>
      <span id="time-label" style="font-size:11px;color:#7a6040">Dawn</span>
    </div>
    <div class="stat-pill" id="morale-pill">
      <span class="icon">😔</span><span id="morale-val" class="val">50</span><span> morale</span>
    </div>
    <div class="stat-pill">
      <span class="icon">👥</span><span id="pop-val" class="val">1</span><span> residents</span>
    </div>
  </div>
</div>

<script>
// Shown when the 3D engine fails to load or the game loop crashes —
// without this the page was a silent black canvas (and, pre-fix, an
// endless per-frame exception storm). Vendoring three.js itself is
// tracked separately (SITE-1); this only makes failure visible.
function hvFatal(msg){
  if(document.getElementById('hv-fatal')) return;
  var d=document.createElement('div');
  d.id='hv-fatal';
  d.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(6,6,8,.94);color:#d8cbb0;font-family:monospace;text-align:center;padding:24px;';
  d.innerHTML='<div style="font-size:34px">🌉</div><div style="max-width:420px;line-height:1.6">'+msg+'</div><button onclick="location.reload()" style="background:#2a2018;color:#d8cbb0;border:1px solid #6a5030;padding:8px 22px;font-family:inherit;cursor:pointer;border-radius:4px">RELOAD</button>';
  document.body.appendChild(d);
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
        onerror="hvFatal('Couldn\'t load the 3D engine (three.js). Check your connection and reload.')"></script>
<script src="homeless-village/js/config.js"></script>
<script src="homeless-village/js/save.js"></script>
<script src="homeless-village/js/scene.js"></script>
<script src="homeless-village/js/ui.js"></script>
<script src="homeless-village/js/player.js"></script>
<script src="homeless-village/js/gameloop.js"></script>
<script src="homeless-village/js/main.js"></script>
<script>
// Mobile: fold the community panel into the craft sheet and wire its toggle.
(function () {
  var craftPanel = document.getElementById('craft-panel');
  var toggle = document.getElementById('craft-toggle');
  if (window.matchMedia('(max-width:700px)').matches) {
    craftPanel.appendChild(document.getElementById('workers-panel'));
  }
  toggle.addEventListener('click', function () {
    craftPanel.classList.toggle('mobile-open');
    var open = craftPanel.classList.contains('mobile-open');
    toggle.innerHTML = open ? '&#10005; Close' : '&#9881; Craft';
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
})();
</script>

</body>
</html>
