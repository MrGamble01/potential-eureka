<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homeless Village — Survive Under the Bridge</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#1a1410;font-family:'Courier New',monospace}

  #canvas-container{position:absolute;inset:0}
  #three-canvas{display:block;width:100%;height:100%}

  /* ── HUD ── */
  #hud{position:absolute;inset:0;pointer-events:none}

  #top-bar{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;
    background:linear-gradient(180deg,rgba(0,0,0,.85) 0%,transparent 100%);
    pointer-events:auto;
  }
  #top-bar .left{display:flex;gap:16px;align-items:center}
  #top-bar .right{display:flex;gap:16px;align-items:center}

  .stat-pill{
    display:flex;align-items:center;gap:5px;
    background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12);
    border-radius:20px;padding:4px 10px;font-size:13px;color:#e8d5a0;
  }
  .stat-pill .icon{font-size:14px}
  .stat-pill .val{font-weight:bold}

  #days-counter{
    font-size:15px;font-weight:bold;color:#a0b8a0;
    text-shadow:0 0 8px rgba(100,160,100,.4);
    letter-spacing:1px;
  }

  #back-btn{
    pointer-events:auto;cursor:pointer;
    background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);
    color:#aaa;font-size:12px;padding:5px 12px;border-radius:4px;
    font-family:'Courier New',monospace;transition:all .2s;
  }
  #back-btn:hover{background:rgba(255,255,255,.1);color:#fff}

  /* ── BOTTOM INFO STRIP ── */
  #bottom-bar{
    position:absolute;bottom:0;left:0;right:0;
    padding:12px 16px;
    background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,transparent 100%);
    display:flex;gap:12px;align-items:flex-end;
    pointer-events:auto;
  }

  /* ── ACTION PANEL ── */
  #action-panel{
    position:absolute;right:0;top:50%;transform:translateY(-50%);
    width:190px;padding:12px;
    background:rgba(10,8,6,.82);border-left:2px solid rgba(180,120,40,.4);
    pointer-events:auto;
  }
  #action-panel h3{
    font-size:11px;letter-spacing:2px;color:#7a6040;
    text-transform:uppercase;margin-bottom:10px;
  }
  .action-btn{
    display:block;width:100%;margin-bottom:7px;padding:7px 10px;
    background:rgba(180,120,40,.12);border:1px solid rgba(180,120,40,.3);
    color:#c8a060;font-family:'Courier New',monospace;font-size:12px;
    text-align:left;cursor:pointer;border-radius:3px;transition:all .18s;
    position:relative;overflow:hidden;
  }
  .action-btn:hover{background:rgba(180,120,40,.25);border-color:rgba(180,120,40,.6)}
  .action-btn:disabled{opacity:.35;cursor:not-allowed}
  .action-btn .cost{font-size:10px;color:#7a6040;float:right;margin-top:1px}
  .action-btn.active-job{border-color:#c84020;color:#e86040;animation:pulse-red 1.5s infinite}
  @keyframes pulse-red{0%,100%{box-shadow:0 0 0 rgba(200,64,32,0)}50%{box-shadow:0 0 6px rgba(200,64,32,.5)}}

  /* ── CRAFTING PANEL ── */
  #craft-panel{
    position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:195px;padding:12px;
    background:rgba(10,8,6,.82);border-right:2px solid rgba(120,80,40,.4);
    pointer-events:auto;
  }
  #craft-panel h3{
    font-size:11px;letter-spacing:2px;color:#6a5030;
    text-transform:uppercase;margin-bottom:10px;
  }
  .craft-item{
    display:flex;align-items:center;gap:8px;margin-bottom:7px;
    background:rgba(80,50,20,.15);border:1px solid rgba(100,70,30,.25);
    border-radius:3px;padding:5px 8px;cursor:pointer;transition:all .18s;
  }
  .craft-item:hover{background:rgba(80,50,20,.3)}
  .craft-item.cant-afford{opacity:.3;cursor:not-allowed}
  .craft-item .ci-icon{font-size:18px}
  .craft-item .ci-info{flex:1}
  .craft-item .ci-name{font-size:11px;color:#c0a060;display:block}
  .craft-item .ci-cost{font-size:10px;color:#7a5030;display:block}

  /* ── EVENT BANNER ── */
  #event-banner{
    position:absolute;top:70px;left:50%;transform:translateX(-50%);
    max-width:500px;width:90%;
    background:rgba(0,0,0,.88);border-radius:4px;padding:12px 18px;
    text-align:center;font-size:13px;color:#e0c880;
    border:1px solid rgba(200,160,60,.3);
    display:none;pointer-events:auto;
    animation:slide-down .3s ease;
  }
  #event-banner.bad{border-color:rgba(200,60,40,.5);color:#e08060}
  #event-banner.good{border-color:rgba(80,180,80,.4);color:#a0e080}
  #event-banner .ev-title{font-size:15px;font-weight:bold;margin-bottom:4px}
  #event-banner .ev-close{
    position:absolute;top:6px;right:10px;cursor:pointer;
    color:#666;font-size:14px;
  }
  @keyframes slide-down{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* ── LOG FEED ── */
  #log-feed{
    position:absolute;bottom:80px;left:16px;
    width:260px;max-height:140px;overflow:hidden;
    pointer-events:none;
  }
  .log-line{
    font-size:11px;color:#7a6848;line-height:1.6;
    animation:fade-in .3s ease;
    transition:opacity 2s;
  }
  .log-line.fading{opacity:0}
  @keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  /* ── TOOLTIP ── */
  #tooltip{
    position:absolute;display:none;pointer-events:none;
    background:rgba(0,0,0,.9);border:1px solid rgba(180,120,40,.4);
    border-radius:3px;padding:6px 10px;font-size:11px;color:#c0a060;
    max-width:180px;line-height:1.5;z-index:100;
  }

  /* ── NIGHT OVERLAY ── */
  #night-overlay{
    position:absolute;inset:0;pointer-events:none;
    background:rgba(10,15,30,0);transition:background 3s ease;
  }

  /* ── PROGRESS BAR (sweep warning) ── */
  #sweep-warning{
    position:absolute;top:65px;left:50%;transform:translateX(-50%);
    display:none;background:rgba(200,40,20,.15);
    border:1px solid rgba(200,40,20,.4);border-radius:4px;
    padding:6px 16px;font-size:11px;color:#e06040;letter-spacing:1px;
    pointer-events:none;animation:blink-warn 1s infinite;
  }
  @keyframes blink-warn{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── WORKERS PANEL ── */
  #workers-panel{
    position:absolute;left:0;bottom:80px;
    width:195px;padding:10px 12px;
    background:rgba(10,8,6,.75);border-right:2px solid rgba(80,60,30,.35);
    pointer-events:auto;
  }
  #workers-panel h3{
    font-size:11px;letter-spacing:2px;color:#5a4020;
    text-transform:uppercase;margin-bottom:8px;
  }
  .worker-row{
    display:flex;align-items:center;gap:6px;margin-bottom:6px;
    font-size:11px;color:#907050;
  }
  .worker-row .w-icon{font-size:14px}
  .worker-row .w-name{flex:1}
  .worker-row .w-hire{
    font-size:10px;padding:2px 6px;cursor:pointer;
    background:rgba(80,50,20,.3);border:1px solid rgba(100,70,30,.4);
    color:#a08050;border-radius:2px;
  }
  .worker-row .w-hire:hover{background:rgba(80,50,20,.6)}
  .worker-row.hired .w-name{color:#b09050}
  .worker-row.hired .w-status{font-size:10px;color:#607040}

  /* ── SEASON BADGE ── */
  #season-badge{
    font-size:11px;color:#6a5838;letter-spacing:1px;
    border:1px solid rgba(100,80,40,.2);border-radius:10px;
    padding:2px 8px;
  }

  /* progress on action buttons */
  .btn-progress{
    position:absolute;left:0;top:0;bottom:0;
    background:rgba(180,120,40,.15);pointer-events:none;transition:width .1s linear;
  }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="three-canvas"></canvas>
</div>

<div id="hud">
  <div id="night-overlay"></div>
  <div id="sweep-warning">POLICE SWEEP INCOMING</div>

  <!-- Top bar -->
  <div id="top-bar">
    <div class="left">
      <button id="back-btn" onclick="window.location.href='index.html'">&#8592; Back</button>
      <div id="season-badge">AUTUMN</div>
      <span id="days-counter">Days Survived: 0</span>
    </div>
    <div class="right">
      <div class="stat-pill"><span class="icon">🍞</span><span class="val" id="stat-food">0</span><span> food</span></div>
      <div class="stat-pill"><span class="icon">🧱</span><span class="val" id="stat-scraps">0</span><span> scraps</span></div>
      <div class="stat-pill"><span class="icon">🫙</span><span class="val" id="stat-cans">0</span><span> cans</span></div>
      <div class="stat-pill"><span class="icon">🩶</span><span class="val" id="stat-goodwill">0</span><span> goodwill</span></div>
      <div class="stat-pill"><span class="icon">❤️</span><span class="val" id="stat-health">100</span><span>%</span></div>
      <div class="stat-pill"><span class="icon">🌡️</span><span class="val" id="stat-warmth">100</span><span>%</span></div>
    </div>
  </div>

  <!-- Left: crafting -->
  <div id="craft-panel">
    <h3>&#9881; Craft</h3>
    <div id="craft-list"></div>
  </div>

  <!-- Left bottom: workers -->
  <div id="workers-panel">
    <h3>&#128101; Community</h3>
    <div id="workers-list"></div>
  </div>

  <!-- Right: actions -->
  <div id="action-panel">
    <h3>&#9875; Actions</h3>
    <div id="action-list"></div>
  </div>

  <!-- Event banner -->
  <div id="event-banner">
    <div class="ev-close" onclick="closeEvent()">&#10005;</div>
    <div class="ev-title" id="ev-title"></div>
    <div id="ev-body"></div>
  </div>

  <!-- Log feed -->
  <div id="log-feed"></div>

  <!-- Tooltip -->
  <div id="tooltip"></div>

  <!-- Bottom bar (day/time indicator) -->
  <div id="bottom-bar">
    <div class="stat-pill">
      <span class="icon">☀️</span>
      <div id="day-bar" style="width:120px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin:0 6px">
        <div id="day-progress" style="height:100%;background:linear-gradient(90deg,#e8a030,#e0d060);width:0%;transition:width .5s"></div>
      </div>
      <span id="time-label" style="font-size:11px;color:#7a6040">Dawn</span>
    </div>
    <div class="stat-pill" id="morale-pill">
      <span class="icon">😔</span><span id="morale-val" class="val">50</span><span> morale</span>
    </div>
    <div class="stat-pill">
      <span class="icon">👥</span><span id="pop-val" class="val">1</span><span> residents</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════════════════════
const SAVE_KEY = 'homeless_village_v1';

function saveGame(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(G)); }catch(e){}
}
function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      Object.assign(G, d);
    }
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
const G = {
  days: 0,
  timeOfDay: 0,       // 0..1 = full day
  daySpeed: 0.00025,  // ticks per ms → ~4 real minutes per game day
  season: 0,          // 0=spring 1=summer 2=autumn 3=winter (cycles every 7 days)

  // resources
  food: 0,
  scraps: 0,
  cans: 0,
  cardboard: 0,
  wood: 0,
  goodwill: 0,

  // vitals
  health: 100,
  warmth: 80,
  morale: 50,
  population: 1,

  // workers (bought with goodwill)
  workers: {
    scrapper: false,
    builder: false,
    cook: false,
    lookout: false,
  },

  // structures (can be destroyed by sweeps)
  structures: {
    barrel_fire: true,   // starts with one
    workbench: false,
    tent: false,
    soup_kitchen: false,
    garden: false,
  },

  // cooldowns (ms timestamps)
  cooldowns: {},

  // flags
  sweepWarned: false,
  sweepCountdown: 0,
  injuredUntil: 0,
  lastEventDay: -2,

  // stats
  totalScavenged: 0,
  totalCrafted: 0,
  peakPopulation: 1,
  timesSwept: 0,
};

// ═══════════════════════════════════════════════════════════
//  THREE.JS SCENE
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x1a1410);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a1410, 30, 80);

// Isometric orthographic camera
const aspect = window.innerWidth / window.innerHeight;
const camSize = 14;
const camera = new THREE.OrthographicCamera(
  -camSize * aspect, camSize * aspect,
  camSize, -camSize,
  0.1, 200
);
camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);

// ── Lighting ──
const ambient = new THREE.AmbientLight(0x3a3020, 0.8);
scene.add(ambient);

const sunLight = new THREE.DirectionalLight(0xffe0a0, 1.2);
sunLight.position.set(15, 25, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 80;
sunLight.shadow.camera.left = -25;
sunLight.shadow.camera.right = 25;
sunLight.shadow.camera.top = 25;
sunLight.shadow.camera.bottom = -25;
scene.add(sunLight);

// Barrel fire point lights (warm orange glow)
const fireLights = [];
function addFireLight(x, z){
  const fl = new THREE.PointLight(0xff7020, 2.5, 8);
  fl.position.set(x, 1.2, z);
  fl.castShadow = false;
  scene.add(fl);
  fireLights.push(fl);
  return fl;
}

// ── Materials ──
const MAT = {
  concrete:  new THREE.MeshLambertMaterial({color:0x5a5850}),
  concreteD: new THREE.MeshLambertMaterial({color:0x3a3830}),
  asphalt:   new THREE.MeshLambertMaterial({color:0x2e2c28}),
  rust:      new THREE.MeshLambertMaterial({color:0x7a3820}),
  cardboard: new THREE.MeshLambertMaterial({color:0x9a7a50}),
  wood:      new THREE.MeshLambertMaterial({color:0x6a4820}),
  barrel:    new THREE.MeshLambertMaterial({color:0x3a2a18}),
  fire:      new THREE.MeshLambertMaterial({color:0xff7020, emissive:0xff4000, emissiveIntensity:1.5}),
  tarp:      new THREE.MeshLambertMaterial({color:0x2a4a2a, side:THREE.DoubleSide}),
  metal:     new THREE.MeshLambertMaterial({color:0x5a5858}),
  dirt:      new THREE.MeshLambertMaterial({color:0x4a3820}),
  sky:       new THREE.MeshLambertMaterial({color:0x8a9090,side:THREE.BackSide}),
};

// ── Ground ──
function buildGround(){
  const g = new THREE.PlaneGeometry(50, 50);
  const m = new THREE.Mesh(g, MAT.asphalt);
  m.rotation.x = -Math.PI / 2;
  m.receiveShadow = true;
  scene.add(m);

  // Cracked lines (decals via thin boxes)
  for(let i=0;i<12;i++){
    const w = .04 + Math.random()*.06;
    const l = 2 + Math.random()*6;
    const crack = new THREE.Mesh(new THREE.BoxGeometry(w,0.02,l), MAT.concreteD);
    crack.position.set((Math.random()-0.5)*30, 0.01, (Math.random()-0.5)*30);
    crack.rotation.y = Math.random()*Math.PI;
    scene.add(crack);
  }
  // Scattered debris on ground
  for(let i=0;i<30;i++){
    const s = 0.08 + Math.random()*.15;
    const d = new THREE.Mesh(new THREE.BoxGeometry(s,0.04,s*(.5+Math.random())), MAT.cardboard);
    d.position.set((Math.random()-0.5)*28, 0.02, (Math.random()-0.5)*28);
    d.rotation.y = Math.random()*Math.PI;
    scene.add(d);
  }
}

// ── Bridge / Overpass ──
function buildBridge(){
  // Bridge deck (thick slab overhead)
  const deck = new THREE.Mesh(new THREE.BoxGeometry(36, 1.4, 12), MAT.concrete);
  deck.position.set(0, 9.5, 0);
  deck.castShadow = true;
  deck.receiveShadow = true;
  scene.add(deck);

  // Underside of deck (darker)
  const under = new THREE.Mesh(new THREE.BoxGeometry(36, 0.1, 12), MAT.concreteD);
  under.position.set(0, 8.8, 0);
  scene.add(under);

  // Pillars (pairs left and right)
  const pillarPos = [-14, -6, 2, 10];
  pillarPos.forEach(px => {
    [-5, 5].forEach(pz => {
      const p = new THREE.Mesh(new THREE.BoxGeometry(1.2, 10, 1.2), MAT.concrete);
      p.position.set(px, 5, pz);
      p.castShadow = true;
      p.receiveShadow = true;
      scene.add(p);

      // Grime band at base
      const grime = new THREE.Mesh(new THREE.BoxGeometry(1.25, 0.8, 1.25), MAT.concreteD);
      grime.position.set(px, 0.4, pz);
      scene.add(grime);
    });
  });

  // Highway guardrail silhouette on top
  const rail = new THREE.Mesh(new THREE.BoxGeometry(36, 0.6, 0.2), MAT.metal);
  rail.position.set(0, 10.5, -5.9);
  scene.add(rail);
  const rail2 = rail.clone();
  rail2.position.z = 5.9;
  scene.add(rail2);

  // Graffiti-ish tinted patches on pillars (colored planes)
  const grafColors = [0x882244, 0x224488, 0x228844, 0x886622];
  pillarPos.forEach((px, i) => {
    const gc = grafColors[i % grafColors.length];
    const gm = new THREE.MeshLambertMaterial({color:gc, transparent:true, opacity:.4});
    const gp = new THREE.Mesh(new THREE.PlaneGeometry(.6 + Math.random()*.6, .4 + Math.random()*.6), gm);
    gp.position.set(px + .62, 2 + Math.random()*2, -4.9);
    gp.rotation.y = Math.PI/2;
    scene.add(gp);
  });
}

// ── Barrel Fires ──
const fireParticles = [];
function buildBarrelFire(x, z){
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(.35,.4,.7,8), MAT.barrel);
  barrel.position.set(x, .35, z);
  barrel.castShadow = true;
  scene.add(barrel);

  // Glowing embers inside
  const embers = new THREE.Mesh(new THREE.CylinderGeometry(.28,.28,.1,8), MAT.fire);
  embers.position.set(x, .72, z);
  scene.add(embers);

  addFireLight(x, z);
  fireParticles.push({x, z, particles:[]});
}

// ── Dumpsters ──
const dumpsters = [];
function buildDumpster(x, z, rot){
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.0, 0.9), MAT.rust);
  body.position.set(x, .5, z);
  body.rotation.y = rot || 0;
  body.castShadow = true;
  body.userData = {type:'dumpster', x, z, depleted:false, cooldown:0};
  scene.add(body);
  dumpsters.push(body);

  const lid = new THREE.Mesh(new THREE.BoxGeometry(1.62, 0.08, 0.93), MAT.metal);
  lid.position.set(x, 1.04, z);
  lid.rotation.y = rot || 0;
  scene.add(lid);
}

// ── Workbench ──
let workbenchMesh = null;
function buildWorkbench(x, z){
  if(workbenchMesh){ scene.remove(workbenchMesh); }
  const grp = new THREE.Group();
  const top = new THREE.Mesh(new THREE.BoxGeometry(1.8,.12,0.9), MAT.wood);
  top.position.y = .82;
  grp.add(top);
  for(let lx of [-.75,.75]) for(let lz of [-.35,.35]){
    const leg = new THREE.Mesh(new THREE.BoxGeometry(.1,.8,.1), MAT.wood);
    leg.position.set(lx,.4,lz);
    grp.add(leg);
  }
  grp.position.set(x, 0, z);
  grp.castShadow = true;
  scene.add(grp);
  workbenchMesh = grp;
}

// ── Tent ──
let tentMesh = null;
function buildTent(x, z){
  if(tentMesh){ scene.remove(tentMesh); }
  const grp = new THREE.Group();
  // Tent body (triangular prism via custom geo)
  const shape = new THREE.Shape();
  shape.moveTo(-1.2, 0); shape.lineTo(0, 1.6); shape.lineTo(1.2, 0); shape.closePath();
  const extSettings = {depth:2.2, bevelEnabled:false};
  const tentGeo = new THREE.ExtrudeGeometry(shape, extSettings);
  const tentMat = new THREE.MeshLambertMaterial({color:0x2a4030, side:THREE.DoubleSide, transparent:true, opacity:.9});
  const tentBody = new THREE.Mesh(tentGeo, tentMat);
  tentBody.rotation.y = Math.PI/2;
  tentBody.position.set(1.1, 0, -1.2);
  grp.add(tentBody);
  grp.position.set(x, 0, z);
  scene.add(grp);
  tentMesh = grp;
}

// ── Trash Piles ──
function buildTrashPile(x, z){
  const count = 4 + Math.floor(Math.random()*5);
  for(let i=0;i<count;i++){
    const s = 0.15 + Math.random()*.25;
    const colors = [0x9a7a50, 0x5a3818, 0x6a6040, 0x3a4a28];
    const mat = new THREE.MeshLambertMaterial({color:colors[Math.floor(Math.random()*colors.length)]});

function buildSoupKitchen(x, z){

  const base = new THREE.Mesh(new THREE.BoxGeometry(3, .1, 2), MAT.wood);

const figures = [];

  const grp = new THREE.Group();

  const bodyMat = new THREE.MeshLambertMaterial({color: type==='player'? 0x5a4030 : 0x3a4040});
  const body = new THREE.Mesh(new THREE.BoxGeometry(.35,.6,.25), bodyMat);
  body.position.y = .7;
  grp.add(body);

  const headMat = new THREE.MeshLambertMaterial({color:0x8a6a50});

  head.position.y = 1.2;
  grp.add(head);
  // Beanie
  const beanieMat = new THREE.MeshLambertMaterial({color: type==='player'? 0x3a2840 : 0x2a3a30});
  const beanie = new THREE.Mesh(new THREE.CylinderGeometry(.16,.18,.18,8), beanieMat);
  beanie.position.y = 1.4;
  grp.add(beanie);
  // Arms
  [-1,1].forEach(side=>{
    const arm = new THREE.Mesh(new THREE.BoxGeometry(.12,.45,.12), bodyMat);
    arm.position.set(side*.25, .72, 0);
    grp.add(arm);
  });
  grp.position.set(x, 0, z);
  grp.userData = {
    type, speed:.02 + Math.random()*.015,
    target: new THREE.Vector3(x, 0, z),
    wanderTimer: 0, bobPhase: Math.random()*Math.PI*2,
    job: 'idle',
  };
  scene.add(grp);
  figures.push(grp);
  return grp;
}

function buildActionUI(){
  const el = document.getElementById('action-list');
  el.innerHTML = '';
  ACTIONS.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.id = 'action-' + a.id;
    btn.setAttribute('data-tip', a.tooltip);
    btn.innerHTML = `<span class="btn-progress" id="progress-${a.id}" style="width:0%"></span>${a.icon} ${a.label}`;
    btn.onclick = () => doAction(a);

  });

function buildCraftUI(){
  const el = document.getElementById('craft-list');
  el.innerHTML = '';
  RECIPES.forEach(r => {

    div.className = 'craft-item' + (canMake ? '' : ' cant-afford');

const activeJobs = {}; // id -> {startTime, duration}

function doAction(a){
  const now = Date.now();
  if(activeJobs[a.id]) return;
  if(G.cooldowns[a.id] && now < G.cooldowns[a.id]) return;
  const injured = now < G.injuredUntil;
  const duration = injured ? a.time * 1.8 : a.time;

  activeJobs[a.id] = {startTime: now, duration};
  const btn = document.getElementById('action-' + a.id);
  if(btn){ btn.classList.add('active-job'); btn.disabled = true; }

  setTimeout(()=> finishAction(a, now), duration);
}

function finishAction(a, startedAt){
  const now = Date.now();
  delete activeJobs[a.id];
  G.cooldowns[a.id] = now + a.cooldown;
  const btn = document.getElementById('action-' + a.id);
  if(btn){ btn.classList.remove('active-job'); btn.disabled = false; }

  if(a.id === 'scavenge'){
    // Random haul, scarcer in winter / after sweep
    const winMod = G.season === 3 ? 0.5 : 1;
    if(Math.random() < 0.2 * winMod){
      log('The dumpster is empty. Nothing today.');
    } else {
      const cans   = rand(0,3) * winMod;
      const scraps = rand(1,4) * winMod;
      const food   = Math.random() < .45 ? rand(1,3) * winMod : 0;
      G.cans   += Math.floor(cans);
      G.scraps += Math.floor(scraps);
      G.food   += Math.floor(food);
      G.totalScavenged++;
      log(`Scavenged: ${Math.floor(cans)} cans, ${Math.floor(scraps)} scraps${food>0?', '+Math.floor(food)+' food':''}.`);
    }
  } else if(a.id === 'forage'){
    const wood = rand(1,4);
    const cardboard = rand(2,6);
    G.wood += wood; G.cardboard += cardboard;
    log(`Found ${wood} wood and ${cardboard} cardboard.`);
  } else if(a.id === 'panhandle'){
    if(Math.random() < 0.55){
      const g = rand(1,4);
      G.goodwill += g;
      log(`Someone gave you a few coins. +${g} goodwill.`);
    } else {
      G.morale = Math.max(0, G.morale - 3);
      log(`Ignored again. Morale fades a little.`);
    }
  } else if(a.id === 'rest'){
    const heal = rand(5,15);
    G.health = Math.min(100, G.health + heal);
    G.morale = Math.min(100, G.morale + rand(3,8));
    log(`You rest. Health +${heal}.`);
  } else if(a.id === 'trade'){
    if(G.cans >= 3){
      G.cans -= 3; G.food += 2;
      log('Traded 3 cans → 2 food.');
    } else {
      log('Not enough cans to trade.');
    }
  }
  updateHUD();
}

function doCraft(r){
  if(!canCraft(r)) return;
  const now = Date.now();
  const mult = G.workers.builder ? 0.5 : 1;
  const dur = r.time * mult;

  Object.entries(r.cost).forEach(([k,v]) => G[k] -= v);
  updateHUD();

  const el = document.getElementById('craft-' + r.id);
  if(el){ el.style.opacity='.5'; el.style.pointerEvents='none'; }

  setTimeout(()=>{
    if(el){ el.style.opacity=''; el.style.pointerEvents=''; }

    if(r.gives.structure){
      G.structures[r.gives.structure] = true;
      refreshStructures();
      log(`Built: ${r.name}.`);
    }
    if(r.gives.warmth){ G.warmth = Math.min(100, G.warmth + r.gives.warmth); }
    if(r.gives.goodwill){ G.goodwill += r.gives.goodwill; }
    G.totalCrafted++;
    log(`Crafted ${r.name}.`);
    updateHUD();
    buildCraftUI();
  }, dur);
}

function hireWorker(id){
  const def = WORKER_DEFS.find(w=>w.id===id);
  if(!def) return;
  if(G.goodwill < def.cost){ log(`Not enough goodwill to recruit ${def.name}.`); return; }
  G.goodwill -= def.cost;
  G.workers[id] = true;
  G.population = Math.min(20, G.population + 1);
  spawnFigure((Math.random()-.5)*10, (Math.random()-.5)*10, 'community');
  log(`${def.name} joined the community.`);
  buildWorkersUI();
  updateHUD();
}

function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

//  GAME LOOP — continued in Part 2
// ═══════════════════════════════════════════════════════════
let lastTime = 0;
let autosaveTimer = 0;

function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;

  // Animate fire lights
  fireLights.forEach((fl, i) => {
    fl.intensity = 2.0 + Math.sin(ts * 0.003 + i * 1.7) * 0.6
                       + Math.sin(ts * 0.007 + i * 0.9) * 0.3;
  });

  // Animate figures
  figures.forEach(f => {
    f.userData.bobPhase += dt * 0.003;
    const hop = Math.abs(Math.sin(f.userData.bobPhase)) * 0.06;
    f.position.y = hop;

    // Wander
    f.userData.wanderTimer -= dt;
    if(f.userData.wanderTimer <= 0){
      f.userData.wanderTimer = 3000 + Math.random()*4000;
      const px = (Math.random()-.5)*16;
      const pz = (Math.random()-.5)*10;
      f.userData.target.set(px, 0, pz);
    }
    const dx = f.userData.target.x - f.position.x;
    const dz = f.userData.target.z - f.position.z;
    const dist = Math.sqrt(dx*dx+dz*dz);
    if(dist > .1){
      const sp = f.userData.speed;
      f.position.x += (dx/dist)*sp*dt*.016*60;
      f.position.z += (dz/dist)*sp*dt*.016*60;
      f.rotation.y = Math.atan2(dx, dz);
    }
  });

  // Progress bars for active actions
  ACTIONS.forEach(a => {
    const job = activeJobs[a.id];
    const pb = document.getElementById('progress-' + a.id);
    if(pb){
      if(job){
        const pct = Math.min(100, ((Date.now()-job.startTime)/job.duration)*100);
        pb.style.width = pct + '%';
      } else {
        pb.style.width = '0%';
      }
    }
    // Cooldown dim
    const btn = document.getElementById('action-' + a.id);
    if(btn && !job){
      const cd = G.cooldowns[a.id];
      btn.disabled = cd && Date.now() < cd;
    }
  });

  // Advance time (PART 2 fills in day cycle logic)
  tickDay(dt);

  // Autosave every 30s
  autosaveTimer += dt;
  if(autosaveTimer > 30000){ autosaveTimer=0; saveGame(); }

  renderer.render(scene, camera);
}

function tickDay(dt){
  G.timeOfDay += G.daySpeed * dt;
  if(G.timeOfDay >= 1){
    G.timeOfDay -= 1;
    onNewDay();
  }
  updateHUD();
}

function onNewDay(){
  G.days++;
  saveGame();
  // Season changes every 7 days
  G.season = Math.floor((G.days / 7)) % 4;

  // Daily decay
  G.food    = Math.max(0, G.food - G.population * 1.5);
  G.warmth  = Math.max(0, G.warmth - (G.season===3 ? 18 : 8));
  G.morale  = Math.max(0, G.morale - 3);
  if(G.warmth < 20) G.health = Math.max(0, G.health - rand(5,12));
  if(G.food <= 0)   G.health = Math.max(0, G.health - rand(4,10));

  // Structures decay
  if(G.structures.tent && Math.random() < (G.season===3 ? .15 : .05)){
    G.structures.tent = false;
    refreshStructures();
    log('Your tent tore in the wind.');
  }
  if(G.structures.workbench && Math.random() < .04){
    G.structures.workbench = false;
    refreshStructures();
    log('The workbench fell apart.');
  }

  // Worker auto-actions
  if(G.workers.scrapper){
    G.scraps += rand(1,3); G.cans += rand(0,2);
    log('The Scrapper found some supplies.');
  }
  if(G.workers.cook && G.food >= 3){
    G.food -= 3; G.goodwill += 2;
    log('The Cook prepared meals. +2 goodwill.');
  }

  log(`Day ${G.days}. ${['Spring','Summer','Autumn','Winter'][G.season]}.`);
  buildCraftUI();
  buildWorkersUI();
  updateHUD();

  // Trigger random event (see Part 2)
  if(G.days - G.lastEventDay >= 2) maybeEvent();
}

function maybeEvent(){
  if(G.days < 2) return;
  if(Math.random() > 0.55) return;

  // Lookout warns before sweep
  if(Math.random() < 0.18 && !G.sweepWarned){
    if(G.workers.lookout){
      G.sweepWarned=true;
      showSweepWarning(true);
      log('LOOKOUT: Police activity nearby. Sweep in ~30 seconds!');
      setTimeout(()=>{ if(G.sweepWarned) triggerEvent(EVENTS_BAD.find(e=>e.id==='sweep')); }, 30000);
    } else {
      triggerEvent(EVENTS_BAD.find(e=>e.id==='sweep'));
    }
    return;
  }

  const badMod = G.season===3 ? 1.6 : 1.0;
  const pool = [];
  EVENTS_BAD.forEach(e  => { for(let i=0;i<Math.floor(e.weight*badMod);i++) pool.push({ev:e,good:false}); });
  EVENTS_GOOD.forEach(e => { for(let i=0;i<e.weight;i++) pool.push({ev:e,good:true}); });
  const pick = pool[Math.floor(Math.random()*pool.length)];
  triggerEvent(pick.ev, pick.good);
}

function triggerEvent(ev, isGood){
  showEvent(ev, !!isGood);
  ev.effect();
  G.sweepWarned=false;
  showSweepWarning(false);
  refreshStructures();
  updateHUD();
}

function showSweepWarning(show){
  document.getElementById('sweep-warning').style.display = show ? 'block' : 'none';
}

function showEvent(ev, isGood){
  const banner=document.getElementById('event-banner');
  document.getElementById('ev-title').textContent=ev.title;
  document.getElementById('ev-body').textContent=ev.desc;
  banner.className=isGood?'good':'bad';
  banner.style.display='block';
  setTimeout(()=>{ banner.style.display='none'; }, 7000);
}

function closeEvent(){
  document.getElementById('event-banner').style.display='none';
}

//  GARDEN STRUCTURE

let gardenMesh = null;
function buildGarden(x, z){
  if(gardenMesh){ scene.remove(gardenMesh); gardenMesh=null; }
  const grp = new THREE.Group();
  const bed = new THREE.Mesh(new THREE.BoxGeometry(3,0.2,2), new THREE.MeshLambertMaterial({color:0x4a3820}));
  bed.position.y=.1; grp.add(bed);
  for(let i=0;i<6;i++){
    const h=0.3+Math.random()*.5;
    const stem=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,h,4), new THREE.MeshLambertMaterial({color:0x3a6020}));
    stem.position.set((Math.random()-.5)*2.4,.2+h/2,(Math.random()-.5)*1.6);
    grp.add(stem);
  }
  grp.position.set(x,0,z);
  scene.add(grp);
  gardenMesh=grp;
}

// Override refreshStructures to include garden
function refreshStructures(){
  if(G.structures.workbench && !workbenchMesh) buildWorkbench(3,2);
  if(!G.structures.workbench && workbenchMesh){ scene.remove(workbenchMesh); workbenchMesh=null; }
  if(G.structures.tent && !tentMesh) buildTent(-4,-2);
  if(!G.structures.tent && tentMesh){ scene.remove(tentMesh); tentMesh=null; }
  if(G.structures.soup_kitchen && !soupKitchenMesh) buildSoupKitchen(0,-6);
  if(!G.structures.soup_kitchen && soupKitchenMesh){ scene.remove(soupKitchenMesh); soupKitchenMesh=null; }
  if(G.structures.garden && !gardenMesh) buildGarden(-7,4);
  if(!G.structures.garden && gardenMesh){ scene.remove(gardenMesh); gardenMesh=null; }
}

// Override tickDay to include garden yield and full sun-arc logic
function tickDay(dt){
  G.timeOfDay += G.daySpeed * dt;
  if(G.timeOfDay >= 1){
    G.timeOfDay -= 1;
    onNewDay();
    if(G.structures.garden){ const y=rand(1,3); G.food+=y; log(`Garden yielded ${y} food.`); }
    buildCraftUI();
  }
  // Sun colour arc
  const tod=G.timeOfDay;
  if(tod<0.5){
    const t=tod*2;
    sunLight.intensity=t*1.3; ambient.intensity=0.2+t*0.7;
    sunLight.color.setRGB(1, 0.6+t*0.4, (0.6+t*0.4)*0.8);
  } else {
    const t=(tod-0.5)*2;
    sunLight.intensity=Math.max(0,1.3-t*1.2); ambient.intensity=Math.max(0.15,0.9-t*0.75);
    sunLight.color.setRGB(1, Math.max(0.1,0.8-t*0.5), Math.max(0.0,0.5-t*0.45));
  }
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  WEB AUDIO — ambient bridge sounds
// ═══════════════════════════════════════════════════════════
let audioCtx = null;
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  startRumble(); startCrackle(); startTraffic();
}
function startRumble(){
  function tick(){
    if(!audioCtx) return;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*3,audioCtx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.012;
    const src=audioCtx.createBufferSource(); src.buffer=buf;
    const filt=audioCtx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=80;
    const g=audioCtx.createGain(); g.gain.value=0.18;
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(); src.onended=tick;
  }
  tick();
}
function startCrackle(){
  function tick(){
    if(!audioCtx) return;
    const t=audioCtx.currentTime+Math.random()*0.4;
    const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.08),audioCtx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.4;
    const src=audioCtx.createBufferSource(); src.buffer=buf;
    const filt=audioCtx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=1200+Math.random()*800;
    const g=audioCtx.createGain(); g.gain.setValueAtTime(0.04+Math.random()*0.05,t); g.gain.linearRampToValueAtTime(0,t+0.1);
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(t);
    setTimeout(tick, 120+Math.random()*600);
  }
  tick();
}
function startTraffic(){
  function tick(){
    if(!audioCtx) return;
    const dur=0.6+Math.random()*0.8;
    const t=audioCtx.currentTime;
    const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*dur),audioCtx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.3;
    const src=audioCtx.createBufferSource(); src.buffer=buf;
    const filt=audioCtx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=400+Math.random()*400;
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.065,t+dur*.3); g.gain.linearRampToValueAtTime(0,t+dur);
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start(t);
    setTimeout(tick, 4000+Math.random()*12000);
  }
  tick();
}
document.addEventListener('click', initAudio, {once:true});

//  FULL RENDER LOOP (replaces stub gameLoop)
// ═══════════════════════════════════════════════════════════
let camSwayT = 0;

function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;

  // Camera gentle sway
  camSwayT += dt * 0.0003;
  camera.position.x = 20 + Math.sin(camSwayT) * 0.15;
  camera.position.z = 20 + Math.cos(camSwayT * 0.7) * 0.12;
  camera.lookAt(0, 0, 0);

  // Fire light flicker
  fireLights.forEach((fl, i) => {
    fl.intensity = 2.0 + Math.sin(ts*.003+i*1.7)*.6 + Math.sin(ts*.007+i*.9)*.3;
    fl.color.setRGB(1, (80+Math.sin(ts*.005+i)*30)/255, 0.04);
  });

  // Figure wander + bob
  figures.forEach(f => {
    f.userData.bobPhase += dt * 0.003;
    f.position.y = Math.abs(Math.sin(f.userData.bobPhase)) * 0.06;
    f.userData.wanderTimer -= dt;
    if(f.userData.wanderTimer <= 0){
      f.userData.wanderTimer = 3000 + Math.random()*5000;
      let cx=0,cz=0;
      const r=Math.random();
      if(r<.35){ cx=-3+(Math.random()-.5)*3; cz=(Math.random()-.5)*3; }        // near fire
      else if(r<.55 && G.structures.workbench){ cx=3+(Math.random()-.5)*2; cz=2+(Math.random()-.5)*2; }
      else { cx=(Math.random()-.5)*16; cz=(Math.random()-.5)*10; }
      f.userData.target.set(cx,0,cz);
    }
    const dx=f.userData.target.x-f.position.x, dz=f.userData.target.z-f.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist>.1){
      const sp=f.userData.speed*dt*.016*60;
      f.position.x+=dx/dist*sp; f.position.z+=dz/dist*sp;
      f.rotation.y=Math.atan2(dx,dz);
    }
  });

  // Action progress bars + cooldown disable
  ACTIONS.forEach(a => {
    const job=activeJobs[a.id];
    const pb=document.getElementById('progress-'+a.id);
    if(pb) pb.style.width=job?Math.min(100,((Date.now()-job.startTime)/job.duration)*100)+'%':'0%';
    const btn=document.getElementById('action-'+a.id);
    if(btn&&!job){ const cd=G.cooldowns[a.id]; btn.disabled=!!(cd&&Date.now()<cd); }
  });

  tickDay(dt);

  autosaveTimer+=dt;
  if(autosaveTimer>30000){ autosaveTimer=0; saveGame(); }

  renderer.render(scene,camera);
}

requestAnimationFrame(gameLoop);
