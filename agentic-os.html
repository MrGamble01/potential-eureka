<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGENTIC OS — a desktop for your AI agents</title>
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;&#129302;&lt;/text&gt;&lt;/svg&gt;">
  <meta name="description" content="AGENTIC OS — a simulated retro desktop where autonomous AI agents run as processes. Launch missions, watch agents plan and build, poke around the filesystem, all in your browser.">
  <meta name="theme-color" content="#05070a">
  <meta property="og:type" content="website">
  <meta property="og:title" content="AGENTIC OS">
  <meta property="og:description" content="A simulated desktop OS where autonomous AI agents run as processes. Launch missions, watch them work.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<style>
:root{
  --bg:#05070a; --panel:#0b0f15; --panel2:#0e141c; --line:#1c2836; --line2:#2a3a4e;
  --text:#c7d4e2; --dim:#66788c; --faint:#3d4c5e;
  --accent:#58a6ff; --accent-dim:rgba(88,166,255,.14);
  --good:#3fb950; --warn:#d29922; --bad:#f85149; --purple:#bc8cff; --cyan:#39c5cf;
  --tb-h:46px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;
  -webkit-font-smoothing:antialiased;user-select:none}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* ============ BOOT ============ */
#boot{position:fixed;inset:0;background:#04060a;z-index:9000;display:flex;flex-direction:column;
  padding:6vh 7vw;font-size:13px;line-height:1.75;color:#9fb6c9}
#boot.hidden{display:none}
#boot-log{white-space:pre-wrap;overflow:hidden;flex:1}
#boot-log .ok{color:var(--good)}
#boot-log .accent{color:var(--accent)}
#boot-log .dim{color:var(--faint)}
#boot-bar{height:4px;background:#101822;border-radius:2px;margin-top:18px;overflow:hidden;max-width:520px}
#boot-bar i{display:block;height:100%;width:0;background:var(--accent);transition:width .15s linear}
#boot-skip{position:absolute;bottom:22px;right:26px;color:var(--faint);font-size:11px;letter-spacing:.1em;cursor:pointer}
#boot-skip:hover{color:var(--dim)}

/* ============ DESKTOP ============ */
#os{position:fixed;inset:0;display:none}
#os.on{display:block}
#wallpaper{position:absolute;inset:0;width:100%;height:100%}
#scanlines{position:absolute;inset:0;pointer-events:none;z-index:8500;display:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.14) 0 1px,transparent 1px 3px)}
body.crt #scanlines{display:block}

#icons{position:absolute;top:18px;left:16px;display:flex;flex-direction:column;gap:6px;z-index:1}
.icon{width:88px;padding:10px 4px 8px;text-align:center;border-radius:8px;cursor:pointer;border:1px solid transparent}
.icon:hover{background:rgba(255,255,255,.045);border-color:var(--line)}
.icon .glyph{font-size:26px;line-height:1;filter:saturate(.85)}
.icon .lbl{margin-top:7px;font-size:10px;letter-spacing:.04em;color:var(--dim);line-height:1.35}
.icon:hover .lbl{color:var(--text)}

/* ============ WINDOWS ============ */
#windows{position:absolute;inset:0 0 var(--tb-h) 0;overflow:hidden}
.win{position:absolute;min-width:300px;min-height:170px;background:var(--panel);border:1px solid var(--line2);
  border-radius:10px;display:flex;flex-direction:column;box-shadow:0 18px 50px rgba(0,0,0,.55);overflow:hidden}
.win.focused{border-color:var(--accent);box-shadow:0 18px 60px rgba(0,0,0,.65),0 0 0 1px var(--accent-dim)}
.win.maxed{border-radius:0}
.win-tb{height:34px;flex:0 0 34px;display:flex;align-items:center;gap:8px;padding:0 10px;background:var(--panel2);
  border-bottom:1px solid var(--line);cursor:grab;touch-action:none}
.win-tb:active{cursor:grabbing}
.win-tb .wicon{font-size:14px}
.win-tb .wtitle{flex:1;font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--dim);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.win.focused .win-tb .wtitle{color:var(--text)}
.win-btn{width:22px;height:22px;border:1px solid var(--line);border-radius:5px;background:transparent;color:var(--dim);
  font-family:inherit;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.win-btn:hover{background:var(--line);color:var(--text)}
.win-btn.close:hover{background:var(--bad);border-color:var(--bad);color:#fff}
.win-body{flex:1;overflow:auto;position:relative}
.win-rs{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;z-index:5;touch-action:none}
.win-rs::after{content:'';position:absolute;right:4px;bottom:4px;width:7px;height:7px;
  border-right:2px solid var(--faint);border-bottom:2px solid var(--faint)}

/* ============ TASKBAR ============ */
#taskbar{position:absolute;left:0;right:0;bottom:0;height:var(--tb-h);background:rgba(8,12,18,.92);
  border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 10px;z-index:8000;
  backdrop-filter:blur(6px)}
#start-btn{height:32px;padding:0 14px;border:1px solid var(--line2);border-radius:7px;background:var(--accent-dim);
  color:var(--accent);font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.1em;cursor:pointer}
#start-btn:hover{border-color:var(--accent)}
#tb-apps{flex:1;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
#tb-apps::-webkit-scrollbar{display:none}
.tb-app{height:32px;padding:0 12px;border:1px solid var(--line);border-radius:7px;background:transparent;color:var(--dim);
  font-family:inherit;font-size:11px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tb-app.active{border-color:var(--accent);color:var(--text);background:var(--accent-dim)}
.tb-app.minned{opacity:.55;font-style:italic}
#tray{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--dim);padding-right:4px}
#tray .tray-item b{color:var(--text);font-weight:600}
#tray-agents{cursor:pointer}
#tray-agents:hover b{color:var(--accent)}
#clock{color:var(--text);font-weight:600;letter-spacing:.05em}

/* ============ START MENU ============ */
#start-menu{position:absolute;left:10px;bottom:calc(var(--tb-h) + 8px);width:290px;background:var(--panel);
  border:1px solid var(--line2);border-radius:12px;z-index:8600;display:none;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.6)}
#start-menu.open{display:block}
#sm-head{padding:14px 16px 10px;border-bottom:1px solid var(--line)}
#sm-head .t{font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--accent)}
#sm-head .s{font-size:10px;color:var(--faint);margin-top:3px}
#sm-apps{padding:8px}
.sm-app{display:flex;align-items:center;gap:11px;width:100%;padding:9px 10px;border:0;border-radius:8px;
  background:transparent;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;text-align:left}
.sm-app:hover{background:var(--accent-dim)}
.sm-app .g{font-size:17px;width:22px;text-align:center}
.sm-app .d{font-size:10px;color:var(--faint);margin-top:1px}
#sm-foot{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}
#sm-foot button{flex:1;height:30px;border:1px solid var(--line);border-radius:7px;background:transparent;color:var(--dim);
  font-family:inherit;font-size:11px;cursor:pointer}
#sm-foot button:hover{color:var(--text);border-color:var(--line2)}
#sm-foot .back:hover{color:var(--warn)}

/* ============ SHARED APP UI ============ */
.pad{padding:14px}
.app-note{font-size:11px;color:var(--faint);line-height:1.6}
button.btn{height:30px;padding:0 14px;border:1px solid var(--line2);border-radius:7px;background:var(--accent-dim);
  color:var(--accent);font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.05em;cursor:pointer}
button.btn:hover{border-color:var(--accent)}
button.btn.ghost{background:transparent;color:var(--dim);border-color:var(--line)}
button.btn.ghost:hover{color:var(--text)}
button.btn.danger{background:rgba(248,81,73,.12);color:var(--bad);border-color:rgba(248,81,73,.4)}
input.field,textarea.field{background:#080c12;border:1px solid var(--line2);border-radius:7px;color:var(--text);
  font-family:inherit;font-size:12px;padding:8px 10px;outline:none;width:100%}
input.field:focus,textarea.field:focus{border-color:var(--accent)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.06em}
.pill.idle{background:rgba(102,120,140,.15);color:var(--dim)}
.pill.planning{background:rgba(188,140,255,.15);color:var(--purple)}
.pill.working{background:rgba(88,166,255,.15);color:var(--accent)}
.pill.reviewing{background:rgba(57,197,207,.15);color:var(--cyan)}
.pill.blocked{background:rgba(248,81,73,.15);color:var(--bad)}
.pill.done,.pill.complete{background:rgba(63,185,80,.15);color:var(--good)}
.pill.running{background:rgba(210,153,34,.15);color:var(--warn)}
.bar{height:5px;background:#101822;border-radius:3px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.bar.done i{background:var(--good)}

/* mission control */
.mc-launch{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--line);background:var(--panel2)}
.mc-cols{display:flex;min-height:0;height:calc(100% - 55px)}
.mc-left{width:44%;min-width:230px;border-right:1px solid var(--line);overflow-y:auto}
.mc-right{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.mc-mission{padding:11px 13px;border-bottom:1px solid var(--line);cursor:pointer}
.mc-mission:hover{background:rgba(255,255,255,.03)}
.mc-mission.sel{background:var(--accent-dim);border-left:2px solid var(--accent)}
.mc-mission .g{font-size:12px;font-weight:600;margin-bottom:5px;line-height:1.4}
.mc-mission .m{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--faint)}
.mc-task{padding:9px 13px;border-bottom:1px solid var(--line)}
.mc-task .t{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:6px}
.mc-task .t .who{margin-left:auto;font-size:10px;color:var(--faint)}
.mc-feed{flex:1;min-height:120px;background:#070b10;padding:10px 12px;overflow-y:auto;font-size:11px;line-height:1.7}
.mc-feed .ln .at{color:var(--faint)}
.mc-feed .ln .who{color:var(--accent);font-weight:600}
.mc-feed .ln.err .msg{color:var(--bad)}
.mc-feed .ln.sys .msg{color:var(--purple)}
.mc-sec{padding:8px 13px;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--faint);
  border-bottom:1px solid var(--line);background:var(--panel2);position:sticky;top:0}

/* agents */
.ag-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer}
.ag-row:hover{background:rgba(255,255,255,.03)}
.ag-row.sel{background:var(--accent-dim)}
.ag-row .face{font-size:19px}
.ag-row .nm{font-weight:700;font-size:12px}
.ag-row .rl{font-size:10px;color:var(--faint)}
.ag-row .right{margin-left:auto;text-align:right;font-size:10px;color:var(--faint)}
.ag-log{background:#070b10;padding:10px 12px;font-size:11px;line-height:1.7;overflow-y:auto}

/* terminal */
.term{height:100%;display:flex;flex-direction:column;background:#060a0f}
.term-out{flex:1;overflow-y:auto;padding:12px 14px;font-size:12px;line-height:1.65;white-space:pre-wrap;
  word-break:break-word;user-select:text}
.term-out .in{color:var(--accent)}
.term-out .err{color:var(--bad)}
.term-out .ok{color:var(--good)}
.term-out .dim{color:var(--faint)}
.term-in{display:flex;gap:8px;padding:9px 14px;border-top:1px solid var(--line);align-items:center}
.term-in .ps1{color:var(--good);font-weight:600;white-space:nowrap}
.term-in input{flex:1;background:transparent;border:0;outline:none;color:var(--text);font-family:inherit;font-size:12px}

/* files */
.fx{display:flex;height:100%}
.fx-tree{width:170px;border-right:1px solid var(--line);overflow-y:auto;padding:8px 0}
.fx-dir{padding:5px 12px;font-size:11px;color:var(--dim);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fx-dir:hover{color:var(--text)}
.fx-dir.sel{color:var(--accent);background:var(--accent-dim)}
.fx-list{flex:1;overflow-y:auto}
.fx-item{display:flex;align-items:center;gap:9px;padding:7px 13px;border-bottom:1px solid rgba(28,40,54,.5);
  font-size:11px;cursor:pointer}
.fx-item:hover{background:rgba(255,255,255,.03)}
.fx-item .sz{margin-left:auto;color:var(--faint);font-size:10px}
.fx-path{padding:8px 13px;font-size:10px;color:var(--faint);border-bottom:1px solid var(--line);background:var(--panel2)}

/* monitor */
.mon{padding:12px;display:flex;flex-direction:column;gap:12px;height:100%}
.mon canvas{width:100%;height:110px;background:#070b10;border:1px solid var(--line);border-radius:8px}
.mon-stats{display:flex;gap:10px;flex-wrap:wrap}
.mon-stat{flex:1;min-width:100px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
.mon-stat .k{font-size:9px;letter-spacing:.12em;color:var(--faint)}
.mon-stat .v{font-size:16px;font-weight:700;margin-top:3px;color:var(--accent)}
.mon-procs{flex:1;overflow-y:auto;border:1px solid var(--line);border-radius:8px}
.mon-procs table{width:100%;border-collapse:collapse;font-size:11px}
.mon-procs th{position:sticky;top:0;background:var(--panel2);text-align:left;padding:7px 11px;font-size:9px;
  letter-spacing:.12em;color:var(--faint);border-bottom:1px solid var(--line)}
.mon-procs td{padding:6px 11px;border-bottom:1px solid rgba(28,40,54,.5);color:var(--dim)}
.mon-procs td:first-child{color:var(--text)}

/* settings */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.set-row .k{font-size:12px;font-weight:600}
.set-row .d{font-size:10px;color:var(--faint);margin-top:3px}
.swatches{display:flex;gap:8px}
.swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.swatch.sel{border-color:#fff}
.toggle{width:42px;height:22px;border-radius:12px;background:var(--line);border:0;cursor:pointer;position:relative}
.toggle i{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--dim);transition:all .15s}
.toggle.on{background:var(--accent-dim)}
.toggle.on i{left:23px;background:var(--accent)}

/* notepad */
.np{height:100%;display:flex;flex-direction:column}
.np textarea{flex:1;resize:none;border:0;border-radius:0;background:#070b10;line-height:1.7;user-select:text}
.np-bar{display:flex;gap:8px;align-items:center;padding:8px 10px;border-top:1px solid var(--line);background:var(--panel2)}
.np-bar .path{flex:1;font-size:10px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* toasts */
#toasts{position:fixed;right:14px;bottom:calc(var(--tb-h) + 12px);z-index:8700;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--accent);border-radius:8px;
  padding:10px 14px;font-size:11px;max-width:320px;box-shadow:0 10px 30px rgba(0,0,0,.5);
  animation:tin .25s ease}
.toast.good{border-left-color:var(--good)}
.toast.bad{border-left-color:var(--bad)}
.toast b{display:block;margin-bottom:3px;font-size:11px}
.toast .m{color:var(--dim);line-height:1.5}
@keyframes tin{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

@media (max-width:760px){
  #icons{flex-direction:row;flex-wrap:wrap;top:10px;left:8px;right:8px}
  .icon{width:74px}
  .mc-cols{flex-direction:column}
  .mc-left{width:100%;max-height:40%}
}

/* v2: levels, comms, achievements */
.lv{display:inline-block;padding:1px 6px;border-radius:4px;background:var(--accent-dim);color:var(--accent);
  font-size:9px;font-weight:700;letter-spacing:.05em;vertical-align:1px}
.achv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.achv{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;
  background:var(--panel2);opacity:.45}
.achv.got{opacity:1;border-color:var(--line2)}
.achv .a-icon{font-size:20px;width:26px;text-align:center;filter:grayscale(1)}
.achv.got .a-icon{filter:none}
.achv .a-name{font-size:10px;font-weight:700;letter-spacing:.08em}
.achv .a-desc{font-size:9px;color:var(--faint);margin-top:2px}
#icons{flex-wrap:wrap;max-height:calc(100vh - var(--tb-h) - 40px);align-content:flex-start}
@media (max-width:600px){.achv-grid{grid-template-columns:1fr}}

/* v3: netscope */
.ns-hero{font-size:17px;font-weight:700;letter-spacing:.12em;color:var(--accent);margin-bottom:10px}
.ns-p{font-size:12px;line-height:1.8;margin-bottom:10px;user-select:text}
.ns-dim{color:var(--faint);font-size:10px}
.ns-links{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.ns-link{display:inline-block;padding:6px 11px;border:1px solid var(--line2);border-radius:7px;color:var(--accent);
  cursor:pointer;font-size:11px;font-weight:600}
.ns-link:hover{background:var(--accent-dim);border-color:var(--accent)}
.ns-headline{padding:7px 0;border-bottom:1px solid var(--line);font-size:11px;line-height:1.6}

/* v4: widgets, context menu, archive */
#widgets{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;gap:10px;z-index:1;width:200px}
.wgt{background:rgba(11,15,21,.72);border:1px solid var(--line);border-radius:11px;padding:10px 13px;backdrop-filter:blur(4px)}
.wgt .w-k{font-size:9px;letter-spacing:.14em;color:var(--faint);margin-bottom:6px}
.wgt-clock .w-time{font-size:26px;font-weight:700;letter-spacing:.04em;color:var(--text)}
.wgt-clock .w-date{font-size:10px;color:var(--dim);margin-top:2px}
.wgt .w-cv{width:100%;height:36px;display:block}
.w-row{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--dim);padding:2px 0}
.w-dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.w-dot.working,.w-dot.planning{background:var(--accent)}
.w-dot.blocked{background:var(--bad)}
.w-dot.idle{background:var(--faint)}
#ctxmenu{position:fixed;z-index:8800;background:var(--panel);border:1px solid var(--line2);border-radius:10px;
  padding:5px;display:none;flex-direction:column;min-width:180px;box-shadow:0 16px 44px rgba(0,0,0,.55)}
#ctxmenu.open{display:flex}
#ctxmenu button{border:0;background:transparent;color:var(--text);font-family:inherit;font-size:11px;text-align:left;
  padding:8px 11px;border-radius:7px;cursor:pointer}
#ctxmenu button:hover{background:var(--accent-dim)}
.arc-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--line);cursor:pointer}
.arc-row:hover{background:rgba(255,255,255,.03)}
.arc-goal{font-size:12px;font-weight:600;line-height:1.4}
.arc-meta{font-size:10px;color:var(--faint);margin-top:3px}
@media (max-width:900px){#widgets{display:none !important}}
</style>
</head>
<body>

<div id="boot">
  <div id="boot-log"></div>
  <div id="boot-bar"><i></i></div>
  <div id="boot-skip">[ PRESS ANY KEY TO SKIP ]</div>
</div>

<div id="os">
  <canvas id="wallpaper"></canvas>
  <div id="icons"></div>
  <div id="windows"></div>
  <div id="scanlines"></div>

  <div id="start-menu">
    <div id="sm-head">
      <div class="t">&gt;_ AGENTIC OS</div>
      <div class="s">v1.0 &mdash; every process is an agent</div>
    </div>
    <div id="sm-apps"></div>
    <div id="sm-foot">
      <button id="sm-reboot">&#8635; REBOOT</button>
      <button class="back" onclick="location.href='index.html'">&#8592; EUREKA GAMES</button>
    </div>
  </div>

  <div id="taskbar">
    <button id="start-btn">&#9670; START</button>
    <div id="tb-apps"></div>
    <div id="tray">

<script>
'use strict';
/* ================================================================
   AGENTIC OS — a simulated desktop where every process is an agent.
   Vanilla JS, no dependencies. All "AI" is theatrical simulation.
   ================================================================ */

const $ = (s, el) => (el || document).querySelector(s);
const $$ = (s, el) => Array.from((el || document).querySelectorAll(s));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rand = (a, b) => a + Math.random() * (b - a);
const irand = (a, b) => Math.floor(rand(a, b + 1));
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const pad2 = n => String(n).padStart(2, '0');
const nowHM = () => { const d = new Date(); return pad2(d.getHours()) + ':' + pad2(d.getMinutes()); };
const nowHMS = () => nowHM() + ':' + pad2(new Date().getSeconds());
const uid = (() => { let n = 0; return p => (p || 'id') + '-' + (++n) + '-' + Math.random().toString(36).slice(2, 6); })();
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40) || 'untitled';

/* tiny event bus — apps subscribe to refresh themselves */
const Bus = {
  map: {},
  on(ev, fn) { (this.map[ev] = this.map[ev] || []).push(fn); return () => { this.map[ev] = this.map[ev].filter(f => f !== fn); }; },
  emit(ev, data) { (this.map[ev] || []).forEach(fn => { try { fn(data); } catch (e) { console.error(e); } }); }
};

  blue:   { c: '#58a6ff', dim: 'rgba(88,166,255,.14)' },

/* ================= VIRTUAL FILESYSTEM =================
   Nodes: dir  -> { t:'d', c:{ name: node } }
           file -> { t:'f', c:"content", m:mtime } */
const FS = {
  root: null,
  saveTimer: null,
  defaults() {
    const f = (c) => ({ t: 'f', c, m: Date.now() });
    const d = (c) => ({ t: 'd', c: c || {} });
    return d({
      home: d({
        agent: d({
          'readme.txt': f(
            'WELCOME TO AGENTIC OS\n=====================\n\n' +
            'This machine does not run programs. It runs AGENTS.\n\n' +
            'Try this:\n' +
            '  1. Open MISSION CONTROL and type a goal, e.g.\n' +
            '     "build a weather app" or "research black holes".\n' +
            '  2. Watch the planner decompose it into tasks and\n' +
            '     hand them to specialist agents.\n' +
            '  3. Agents write their work into ~/work — open the\n' +
            '     FILES app or `cat` the results in the TERMINAL.\n\n' +
            'Everything here is a simulation running in your\n' +
            'browser tab. No real AI was harmed (or used).\n'),
          missions: d(),
          work: d(),
          logs: d({ 'kernel.log': f('[0.000] agentd 1.0 — kernel of the Agentic OS\n[0.012] all processes on this system are agents\n') })
        })
      }),
      sys: d({
        'agentd.cfg': f('# agentd — the agent scheduler\nmax_agents = 12\ntick_ms = 650\nblock_chance = 0.04\nspawn_helpers = true\n'),
        'motd': f('Every process is an agent. Every agent has a purpose.\n')
      }),
      bin: d({
        'missionctl': f('#!/agent\n# opens Mission Control'), 'agents': f('#!/agent'), 'files': f('#!/agent'),
        'monitor': f('#!/agent'), 'notepad': f('#!/agent'), 'settings': f('#!/agent')
      })
    });
  },
  load() {
    try {
      const raw = localStorage.getItem('aos-fs');
      if (raw) { this.root = JSON.parse(raw); return; }
    } catch (e) {}
    this.root = this.defaults();
  },
  save() {
    clearTimeout(this.saveTimer);
    this.saveTimer = setTimeout(() => {
      try { localStorage.setItem('aos-fs', JSON.stringify(this.root)); } catch (e) {}
    }, 400);
  },
  reset() { this.root = this.defaults(); this.save(); Bus.emit('fs'); },
  parts(path) {
    if (!path) return [];
    if (path.startsWith('~')) path = '/home/agent' + path.slice(1);
    return path.split('/').filter(Boolean);
  },
  normalize(path, cwd) {
    if (!path) return cwd || '/home/agent';
    if (path.startsWith('~')) path = '/home/agent' + path.slice(1);
    if (!path.startsWith('/')) path = (cwd || '/home/agent') + '/' + path;
    const out = [];
    for (const p of path.split('/')) {
      if (!p || p === '.') continue;
      if (p === '..') out.pop(); else out.push(p);
    }
    return '/' + out.join('/');
  },
  node(path) {
    let n = this.root;
    for (const p of this.parts(path)) {
      if (!n || n.t !== 'd' || !(p in n.c)) return null;
      n = n.c[p];
    }
    return n;
  },
  mkdirp(path) {
    let n = this.root;
    for (const p of this.parts(path)) {
      if (n.t !== 'd') return null;
      if (!(p in n.c)) n.c[p] = { t: 'd', c: {} };
      n = n.c[p];
    }
    this.save(); Bus.emit('fs');
    return n;
  },
  write(path, content) {
    const ps = this.parts(path);
    const name = ps.pop();
    const dir = this.mkdirp('/' + ps.join('/'));
    if (!dir || dir.t !== 'd') return false;
    dir.c[name] = { t: 'f', c: content, m: Date.now() };
    this.save(); Bus.emit('fs');
    return true;
  },
  read(path) {
    const n = this.node(path);
    return n && n.t === 'f' ? n.c : null;
  },
  rm(path) {
    const ps = this.parts(path);
    const name = ps.pop();
    const dir = this.node('/' + ps.join('/'));
    if (!dir || dir.t !== 'd' || !(name in dir.c)) return false;
    delete dir.c[name];
    this.save(); Bus.emit('fs');
    return true;
  },
  list(path) {
    const n = this.node(path);
    if (!n || n.t !== 'd') return null;
    return Object.keys(n.c).sort((a, b) => {
      const da = n.c[a].t === 'd' ? 0 : 1, db = n.c[b].t === 'd' ? 0 : 1;
      return da - db || a.localeCompare(b);
    }).map(name => ({ name, node: n.c[name] }));
  }
};

/* append a line to the kernel log (bounded) */

/* ================= SFX — tiny WebAudio chiptune blips ================= */
const SFX = {
  ctx: null,
  ensure() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) try { this.ctx = new AC(); } catch (e) {}
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  tone(f, t0, dur, type, vol) {
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type || 'square';
    o.frequency.value = f;
    g.gain.setValueAtTime(0, c.currentTime + t0);
    g.gain.linearRampToValueAtTime(vol || .04, c.currentTime + t0 + .01);
    g.gain.exponentialRampToValueAtTime(.0001, c.currentTime + t0 + dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime + t0); o.stop(c.currentTime + t0 + dur + .05);
  },
  play(name) {
    if (Settings.data.sound === false) return;
    this.ensure();
    if (!this.ctx) return;
    const fx = {
      boot: () => [262, 330, 392, 523].forEach((f, i) => this.tone(f, i * .09, .12, 'triangle', .05)),
      open: () => this.tone(520, 0, .07, 'square', .028),
      close: () => this.tone(330, 0, .07, 'square', .028),
      ding: () => { this.tone(880, 0, .1, 'triangle', .05); this.tone(1320, .08, .14, 'triangle', .04); },
      buzz: () => this.tone(110, 0, .22, 'sawtooth', .05)
    };
    (fx[name] || (() => {}))();
  }
};
document.addEventListener('pointerdown', () => SFX.ensure());

/* ================= MISSION ARCHIVE — history survives reboots ================= */
const Archive = {
  data: [],
  load() { try { this.data = JSON.parse(localStorage.getItem('aos-archive') || '[]'); } catch (e) { this.data = []; } },
  push(entry) {
    this.data.unshift(entry);
    if (this.data.length > 50) this.data.length = 50;

    Bus.emit('archive');
  }
};

/* ================= WINDOW MANAGER ================= */
const WM = {
  wins: [],
  z: 100,
  cascade: 0,
  open(opts) {
    // singleton: focus existing window with same app id (unless multi allowed)
    if (!opts.multi) {
      const ex = this.wins.find(w => w.app === opts.app);
      if (ex) { this.restore(ex); this.focus(ex); if (opts.onReuse) opts.onReuse(ex); return ex; }
    }
    const area = $('#windows').getBoundingClientRect();
    const w = Math.min(opts.w || 560, area.width - 16);
    const h = Math.min(opts.h || 400, area.height - 16);
    const cx = 90 + (this.cascade % 6) * 34, cy = 40 + (this.cascade % 6) * 30;
    this.cascade++;
    const x = clamp(opts.x != null ? opts.x : cx, 4, Math.max(4, area.width - w - 4));
    const y = clamp(opts.y != null ? opts.y : cy, 4, Math.max(4, area.height - h - 4));

    const el = document.createElement('div');
    el.className = 'win';
    el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++this.z}`;
    el.innerHTML =
      `<div class="win-tb">
        <span class="wicon">${opts.icon || '&#9670;'}</span>
        <span class="wtitle">${esc(opts.title || 'WINDOW')}</span>
        <button class="win-btn min" title="Minimize">&#8722;</button>
        <button class="win-btn max" title="Maximize">&#9723;</button>
        <button class="win-btn close" title="Close">&#10005;</button>
      </div>
      <div class="win-body"></div>
      <div class="win-rs"></div>`;
    $('#windows').appendChild(el);

    const win = {
      id: uid('win'), app: opts.app, el, title: opts.title, icon: opts.icon || '◆',
      minned: false, maxed: false, prev: null, onClose: opts.onClose, cleanups: []
    };
    win.body = $('.win-body', el);
    this.wins.push(win);

    $('.close', el).addEventListener('click', e => { e.stopPropagation(); this.close(win); });
    $('.min', el).addEventListener('click', e => { e.stopPropagation(); this.minimize(win); });
    $('.max', el).addEventListener('click', e => { e.stopPropagation(); this.togglemax(win); });
    el.addEventListener('pointerdown', () => this.focus(win));

    // drag
    const tb = $('.win-tb', el);
    tb.addEventListener('pointerdown', ev => {
      if (ev.target.closest('.win-btn') || win.maxed) return;
      ev.preventDefault();
      const r = el.getBoundingClientRect(), a = $('#windows').getBoundingClientRect();
      const ox = ev.clientX - r.left, oy = ev.clientY - r.top;
      let lastX = ev.clientX, lastY = ev.clientY;
      const move = mv => {
        lastX = mv.clientX; lastY = mv.clientY;
        el.style.left = clamp(mv.clientX - a.left - ox, -w + 60, a.width - 40) + 'px';
        el.style.top = clamp(mv.clientY - a.top - oy, 0, a.height - 34) + 'px';
      };
      const up = () => {
        window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up);
        // edge snapping: left/right halves, top = maximize
        if (lastY - a.top < 8) { if (!win.maxed) WM.togglemax(win); return; }
        if (lastX - a.left < 10)
          Object.assign(el.style, { left: '0px', top: '0px', width: Math.floor(a.width / 2) + 'px', height: a.height + 'px' });
        else if (a.right - lastX < 10)
          Object.assign(el.style, { left: Math.ceil(a.width / 2) + 'px', top: '0px', width: Math.floor(a.width / 2) + 'px', height: a.height + 'px' });
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    });
    tb.addEventListener('dblclick', ev => { if (!ev.target.closest('.win-btn')) this.togglemax(win); });

    // resize
    $('.win-rs', el).addEventListener('pointerdown', ev => {
      if (win.maxed) return;
      ev.preventDefault(); ev.stopPropagation();
      const r = el.getBoundingClientRect();
      const sx = ev.clientX, sy = ev.clientY, sw = r.width, sh = r.height;
      const move = mv => {
        el.style.width = Math.max(300, sw + mv.clientX - sx) + 'px';
        el.style.height = Math.max(170, sh + mv.clientY - sy) + 'px';
      };
      const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    });

    if (opts.render) opts.render(win);
    this.focus(win);
    this.renderTaskbar();
    SFX.play('open');
    return win;
  },
  focus(win) {
    this.wins.forEach(w => w.el.classList.remove('focused'));
    win.el.classList.add('focused');
    win.el.style.zIndex = ++this.z;
    this.renderTaskbar();
  },
  minimize(win) { win.minned = true; win.el.style.display = 'none'; this.renderTaskbar(); },
  restore(win) { win.minned = false; win.el.style.display = 'flex'; },
  togglemax(win) {
    if (!win.maxed) {
      win.prev = { l: win.el.style.left, t: win.el.style.top, w: win.el.style.width, h: win.el.style.height };
      win.el.style.cssText += ';left:0;top:0;width:100%;height:100%';
      win.maxed = true;
      win.el.classList.add('maxed');
    } else {
      Object.assign(win.el.style, { left: win.prev.l, top: win.prev.t, width: win.prev.w, height: win.prev.h });
      win.maxed = false;
      win.el.classList.remove('maxed');
    }
    this.focus(win);
  },
  close(win) {
    win.cleanups.forEach(fn => { try { fn(); } catch (e) {} });
    if (win.onClose) { try { win.onClose(win); } catch (e) {} }
    win.el.remove();
    this.wins = this.wins.filter(w => w !== win);
    this.renderTaskbar();
    SFX.play('close');
  },
  renderTaskbar() {
    const box = $('#tb-apps');
    box.innerHTML = '';
    this.wins.forEach(win => {
      const b = document.createElement('button');
      b.className = 'tb-app' + (win.el.classList.contains('focused') && !win.minned ? ' active' : '') + (win.minned ? ' minned' : '');
      b.innerHTML = `<span>${win.icon}</span><span>${esc(win.title)}</span>`;
      b.addEventListener('click', () => {
        if (win.minned) { this.restore(win); this.focus(win); }
        else if (win.el.classList.contains('focused')) this.minimize(win);
        else this.focus(win);
      });
      box.appendChild(b);
    });
  }
};

/* ================= WALLPAPER ================= */
function hexRGB(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)].join(',');
}
function drawWallpaper() {
  const cv = $('#wallpaper');
  cv.width = innerWidth; cv.height = innerHeight;
  const ctx = cv.getContext('2d');
  const acc = hexRGB((ACCENTS[Settings.data.accent] || ACCENTS.blue).c);
  const g = ctx.createRadialGradient(cv.width * .7, cv.height * .25, 60, cv.width * .5, cv.height * .5, cv.width * .8);
  g.addColorStop(0, '#0a1220'); g.addColorStop(.55, '#060a12'); g.addColorStop(1, '#04060a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cv.width, cv.height);
  // grid
  ctx.strokeStyle = 'rgba(' + acc + ',.045)';
  ctx.lineWidth = 1;
  const step = 46;
  for (let x = 0; x < cv.width; x += step) { ctx.beginPath(); ctx.moveTo(x + .5, 0); ctx.lineTo(x + .5, cv.height); ctx.stroke(); }
  for (let y = 0; y < cv.height; y += step) { ctx.beginPath(); ctx.moveTo(0, y + .5); ctx.lineTo(cv.width, y + .5); ctx.stroke(); }
  // scattered "nodes"
  for (let i = 0; i < 40; i++) {
    ctx.fillStyle = 'rgba(' + acc + ',' + rand(.03, .12).toFixed(3) + ')';
    ctx.beginPath();
    ctx.arc(rand(0, cv.width), rand(0, cv.height), rand(1, 2.4), 0, 7);
    ctx.fill();
  }
  // watermark
  ctx.font = '700 11px JetBrains Mono, monospace';
  ctx.fillStyle = 'rgba(102,120,140,.35)';
  ctx.textAlign = 'right';
  ctx.fillText('AGENTIC OS v1.0 — every process is an agent', cv.width - 18, cv.height - 60);
}
window.addEventListener('resize', drawWallpaper);
Bus.on('settings', drawWallpaper);

/* ================= SCREENSAVER ================= */
const Saver = {
  lastInput: Date.now(), active: false, cv: null, raf: 0, parts: [],
  IDLE_MS: 90000,
  init() {
    const poke = () => { this.lastInput = Date.now(); if (this.active) this.stop(); };
    ['pointermove', 'pointerdown', 'keydown', 'wheel'].forEach(ev =>
      window.addEventListener(ev, poke, { passive: true }));
    setInterval(() => {
      if (!this.active && Settings.data.saver !== false &&
          $('#os').classList.contains('on') &&
          Date.now() - this.lastInput > this.IDLE_MS) this.start();
    }, 5000);
  },
  start() {
    this.active = true;
    Achv.unlock('zen');
    const cv = this.cv = document.createElement('canvas');
    cv.style.cssText = 'position:fixed;inset:0;z-index:8900;background:#020409';
    cv.width = innerWidth; cv.height = innerHeight;
    document.body.appendChild(cv);
    this.parts = Engine.agents.slice(0, 12).map(a => ({
      label: ((ROLES[a.role] || {}).emoji || '\u{1F916}') + ' ' + a.name,
      x: rand(40, cv.width - 80), y: rand(40, cv.height - 40),
      vx: rand(-.45, .45) || .3, vy: rand(-.35, .35) || .2
    }));
    // the obligatory DVD-style bouncer
    this.logo = { x: cv.width / 2, y: cv.height / 2, vx: 1.1, vy: .9 };
    const draw = () => {
      if (!this.active) return;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = 'rgba(2,4,9,.28)';
      ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.font = '13px JetBrains Mono, monospace';
      this.parts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 10 || p.x > cv.width - 110) p.vx *= -1;
        if (p.y < 20 || p.y > cv.height - 16) p.vy *= -1;
        ctx.fillStyle = 'rgba(102,140,180,.7)';
        ctx.fillText(p.label, p.x, p.y);
      });
      const L = this.logo;
      L.x += L.vx; L.y += L.vy;
      ctx.font = '700 26px JetBrains Mono, monospace';
      const w = ctx.measureText('AGENTIC OS').width;
      if (L.x < 10 || L.x > cv.width - w - 10) L.vx *= -1;
      if (L.y < 40 || L.y > cv.height - 20) L.vy *= -1;
      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#58a6ff';
      ctx.fillStyle = accent;
      ctx.fillText('AGENTIC OS', L.x, L.y);
      ctx.font = '11px JetBrains Mono, monospace';
      ctx.fillStyle = 'rgba(102,120,140,.8)';
      ctx.fillText('the agents dream while you are away — any key to wake', L.x - 40, L.y + 22);
      this.raf = requestAnimationFrame(draw);
    };
    draw();
  },
  stop() {
    this.active = false;
    cancelAnimationFrame(this.raf);
    if (this.cv) { this.cv.remove(); this.cv = null; }
  }
};

/* mission plan templates, chosen by goal keywords */
function planFor(goal) {
  const g = goal.toLowerCase();
  const raw = goal.replace(/^(please\s+|go\s+|can you\s+)/i, '').trim();
  // strip the leading verb so titles read naturally ("build a weather app" -> "a weather app")
  const t = raw.replace(/^(build|make|create|write|draft|design|develop|research|investigate|study|analy[sz]e|deploy|ship|launch|release|publish|fix|debug)\s+(me\s+)?/i, '') || raw;
  const chain = [];
  // deps are indices into the chain — tasks whose deps are all done run in PARALLEL
  const add = (kind, title, deps) => chain.push({ kind, title, deps: deps || [] });
  if (/research|investigate|learn|study|find out|analy[sz]e|compare|what|why|how/.test(g)) {
    add('research', 'Gather sources on ' + t);
    add('research', 'Survey the counter-arguments');            // parallel with 0
    add('write', 'Draft a summary of ' + t, [0, 1]);
    add('review', 'Fact-check and approve the summary', [2]);
  } else if (/write|draft|blog|article|story|poem|doc|essay|novel/.test(g)) {
    add('research', 'Collect background for ' + t);
    add('write', 'Outline: ' + t, [0]);
    add('write', 'Draft: ' + t, [1]);
    add('review', 'Edit pass and sign-off', [2]);
  } else if (/deploy|ship|launch|release|publish/.test(g)) {
    add('test', 'Preflight checks for ' + t);
    add('deploy', 'Ship: ' + t, [0]);
    add('test', 'Post-launch smoke tests', [1]);
    add('write', 'Release notes for ' + t, [1]);                 // parallel with smoke tests
  } else if (/fix|debug|bug|broken|crash|error/.test(g)) {
    add('research', 'Reproduce the problem: ' + t);
    add('build', 'Implement the fix', [0]);
    add('test', 'Verify the fix holds', [1]);
    add('review', 'Post-mortem review', [2]);
  } else { // default: build something
    add('research', 'Scope out ' + t);
    add('design', 'Design spec for ' + t, [0]);
    add('research', 'Deep-dive the tricky parts', [0]);          // parallel with design
    add('build', 'Build the core of ' + t, [1, 2]);
    add('build', 'Polish and integrate', [3]);
    add('test', 'Test suite for ' + t, [3]);                     // parallel with polish
    add('review', 'Final review and sign-off', [4, 5]);
  }
  return chain;
}

function artifactFor(kind, topic, mission) {
  const h = '# ' + topic + '\n\n';
  const meta = '_produced by agentd — mission ' + mission.n + ', ' + new Date().toLocaleString() + '_\n\n';
  switch (kind) {
    case 'research': return {
      name: 'notes-' + slug(topic).slice(0, 24) + '.md',
      content: h + meta + '## Findings\n\n- ' + pick([
        'The topic is deeper than it looked from orbit.',
        'Three schools of thought exist; two of them are wrong.',
        'Prior art exists but nobody read it. We did.']) +
        '\n- Key insight: ' + pick(['start smaller than feels comfortable', 'the constraint IS the feature', 'the simple approach wins by a mile']) +
        '\n- Risk: ' + pick(['scope creep', 'unknown unknowns', 'overconfidence in tick 3']) +
        '\n\n## Sources\n\n- /dev/imagination (highly cited)\n- The Big Book of Simulated Knowledge, 3rd ed.\n'
    };
    case 'design': return {
      name: 'spec-' + slug(topic).slice(0, 24) + '.md',
      content: h + meta + '## Architecture\n\n```\n  [input] --> [core loop] --> [output]\n                 |\n              [state]\n```\n\n' +
        '## Decisions\n\n1. Keep it boring. Boring survives.\n2. One module per idea, one idea per module.\n3. ' +
        pick(['No dependencies we cannot vendor.', 'Ship the walking skeleton first.', 'Design for deletion.']) + '\n'
    };
    case 'build': return {
      name: slug(topic).slice(0, 24) + '.code',
      content: '// ' + topic + '\n// generated by a builder agent, mission ' + mission.n + '\n\n' +
        'function main() {\n  const goal = ' + JSON.stringify(mission.goal) + ';\n  const effort = Infinity;\n' +
        '  while (!done(goal)) {\n    iterate();   // ' + pick(['this is where the magic happens', 'TODO: magic', 'surprisingly, this works']) + '\n  }\n' +
        '  return "✓ shipped";\n}\n'
    };
    case 'test': return {
      name: 'test-report-' + mission.n + '.md',
      content: h + meta + '## Results\n\n| suite | result |\n|---|---|\n| happy path | PASS |\n| edge cases | PASS (' + irand(3, 9) + ' fixed) |\n| chaos monkey | PASS, eventually |\n\nVerdict: **ship it**.\n'
    };
    case 'write': return {
      name: 'draft-' + slug(topic).slice(0, 24) + '.md',
      content: h + meta + pick([
        'It began, as these things do, with a goal typed into a box.\n\nThe agents did not hesitate. Hesitation is not in the vocab file.',
        'Executive summary: we did the thing.\n\nLonger version: we did the thing, but with style and at least one simulated setback.',
        'Chapter 1.\n\nThe cursor blinked. Somewhere in the scheduler, a planner woke up and started decomposing.']) + '\n'
    };
    case 'review': return {
      name: 'review-' + mission.n + '.md',
      content: h + meta + '## Review\n\n- Completeness: ' + irand(88, 99) + '%\n- Style: acceptable\n- Bugs found: ' + irand(0, 2) + ' (fixed)\n\n**APPROVED** — the reviewer, reluctantly impressed.\n'
    };
    case 'deploy': return {
      name: 'deploy-' + mission.n + '.log',
      content: meta + '[ok] artifacts packaged\n[ok] preflight green\n[ok] shipped to virtual-cloud-1\n[ok] dashboards nominal\n\nstatus: LIVE (in the simulation)\n'
    };
  }
  return { name: 'artifact.txt', content: topic };
}

/* XP -> level curve: lvl 2 @ 12xp, 3 @ 48, 4 @ 108, 5 @ 192 ... */
const levelOf = xp => 1 + Math.floor(Math.sqrt((xp || 0) / 12));

/* the core crew (non-ephemeral agents) persists across boots */
const Crew = {
  load() { try { return JSON.parse(localStorage.getItem('aos-crew') || 'null'); } catch (e) { return null; } },
  save() {
    const roster = Engine.agents.filter(a => !a.ephemeral).map(a => ({ name: a.name, role: a.role, xp: a.xp, trait: a.trait }));
    try { localStorage.setItem('aos-crew', JSON.stringify(roster)); } catch (e) {}
  }
};

const Engine = {
  agents: [], missions: [], pid: 1000, missionN: 0, tick: 0,
  comms: [],
  cpuHist: new Array(90).fill(0), tokHist: new Array(90).fill(0),
  totalTokens: 0, tokensThisTick: 0, uptime0: Date.now(),
  timer: null,

  start() {
    const roster = Crew.load();
    if (roster && roster.length) {
      roster.slice(0, 5).forEach(r => this.spawn(r.name, r.role, false, r.xp || 0, r.trait));
      if (!this.agents.some(a => a.role === 'planner')) this.spawn('ATLAS', 'planner');
    } else {
      this.spawn('ATLAS', 'planner');
      this.spawn(pick(NAMES), 'builder');
      this.spawn(pick(NAMES), 'researcher');
      Crew.save();
    }
    this.timer = setInterval(() => this.step(), 650);
  },

  spawn(name, role, ephemeral, xp, trait) {
    while (this.agents.some(a => a.name === name)) name = pick(NAMES) + '-' + irand(2, 9);
    const a = {
      pid: ++this.pid, name, role, ephemeral: !!ephemeral, xp: xp || 0,
      trait: TRAITS[trait] ? trait : pick(Object.keys(TRAITS)),
      status: 'idle', taskId: null, missionId: null,
      tokens: 0, logs: [], idleTicks: 0, blockTicks: 0, born: this.tick
    };
    a.say = (msg, cls) => {
      a.logs.push({ at: nowHMS(), msg, cls });
      if (a.logs.length > 80) a.logs.shift();
      const m = this.missions.find(x => x.id === a.missionId);
      if (m) {
        m.feed.push({ at: nowHMS(), who: a.name, msg, cls });
        if (m.feed.length > 200) m.feed.shift();
      }
    };
    this.agents.push(a);
    a.say('agent online — role: ' + role + (a.xp ? ' (LV.' + levelOf(a.xp) + ', remembered from last boot)' : ''), 'sys');
    klog('spawned ' + a.name + '.agent (pid ' + a.pid + ', ' + role + ')');
    Bus.emit('agents');
    return a;
  },

  kill(pid) {
    const a = this.agents.find(x => x.pid === pid);
    if (!a) return false;
    if (a.taskId) { // release task back to queue
      for (const m of this.missions) {
        const t = m.tasks.find(t => t.id === a.taskId);
        if (t && t.status === 'active') { t.status = 'todo'; t.progress = 0; t.assignee = null; }
      }
    }
    this.agents = this.agents.filter(x => x.pid !== pid);
    klog('terminated ' + a.name + '.agent (pid ' + pid + ')');
    Crew.save();
    Bus.emit('agents');
    return true;
  },

  freeAgent(role) {
    return this.agents.find(a => a.role === role && a.status === 'idle') || null;
  },

  newMission(goal) {
    goal = goal.trim();
    if (!goal) return null;
    const n = ++this.missionN;
    const m = {
      id: uid('m'), n, goal, status: 'planning', tasks: [], feed: [],
      dir: '/home/agent/work/mission-' + n + '-' + slug(goal).slice(0, 20),
      planTicks: irand(3, 5), startTick: this.tick
    };
    this.missions.unshift(m);
    FS.mkdirp(m.dir);
    let planner = this.agents.find(a => a.role === 'planner');
    if (!planner) planner = this.spawn('ATLAS', 'planner');
    planner.status = 'planning';
    planner.missionId = m.id;
    planner.say('new mission #' + n + ': "' + goal + '"', 'sys');
    toast('MISSION #' + n + ' ACCEPTED', goal);
    klog('mission #' + n + ' accepted: ' + goal);
    this.commsSay('agentd', 'mission #' + n + ' accepted — "' + shortGoal(goal) + '". crew, look alive.', 'sys');
    Achv.unlock('mission1');
    Bus.emit('missions'); Bus.emit('agents');
    return m;
  },

  abortMission(m) {
    if (m.status === 'complete' || m.status === 'aborted') return;
    m.status = 'aborted';
    this.agents.forEach(a => {
      if (a.missionId === m.id) { a.status = 'idle'; a.taskId = null; a.missionId = null; }
    });
    m.feed.push({ at: nowHMS(), who: 'agentd', msg: 'mission aborted by operator', cls: 'err' });
    SFX.play('buzz');
    Bus.emit('missions'); Bus.emit('agents');
  },

  finishPlanning(m, planner) {
    const chain = planFor(m.goal);
    chain.forEach((c, i) => {
      m.tasks.push({
        id: uid('t'), title: c.title, kind: c.kind, status: 'todo',
        progress: 0, assignee: null,
        deps: c.deps.slice()
      });
    });
    // allow a bit of parallelism: research tasks at same tier
    m.status = 'running';
    planner.status = 'idle'; planner.missionId = null;
    planner.say('plan ready: ' + chain.length + ' tasks queued', 'sys');
    m.feed.push({ at: nowHMS(), who: 'ATLAS', msg: 'plan ready — ' + chain.length + ' tasks: ' + chain.map(c => c.kind).join(' → '), cls: 'sys' });
    FS.write(m.dir + '/PLAN.md', '# Mission ' + m.n + ' — plan\n\nGoal: ' + m.goal + '\n\n' +
      chain.map((c, i) => (i + 1) + '. [' + c.kind + '] ' + c.title).join('\n') + '\n');
    Bus.emit('missions');
  },

  assignWork(m) {
    m.tasks.forEach((t, i) => {
      if (t.status !== 'todo') return;
      if (!t.deps.every(d => m.tasks[d] && m.tasks[d].status === 'done')) return;
      const role = KIND_ROLE[t.kind] || 'builder';
      let a = this.freeAgent(role);
      if (!a && this.agents.length < 12) a = this.spawn(pick(NAMES), role, true);
      if (!a) return;
      t.status = 'active'; t.assignee = a.pid;
      a.status = 'working'; a.taskId = t.id; a.missionId = m.id;
      a.say('picked up: ' + t.title, 'sys');
      // heavy build tasks sometimes get a helper
      if (t.kind === 'build' && Math.random() < .35 && this.agents.length < 12) {
        const h = this.spawn(a.name + '-JR', role, true);
        h.status = 'working'; h.taskId = t.id; h.missionId = m.id;
        h.say('spawned as helper on: ' + t.title, 'sys');
      }
    });
  },

  step() {
    this.tick++;
    this.tokensThisTick = 0;

    for (const m of this.missions) {
      if (m.status === 'planning') {
        const planner = this.agents.find(a => a.role === 'planner');
        if (planner && this.tick % 2 === 0) planner.say(pick(LINES.planning).replace('{topic}', m.goal));
        if (--m.planTicks <= 0 && planner) this.finishPlanning(m, planner);
      }
      if (m.status === 'running') {
        this.assignWork(m);
        if (m.tasks.length && m.tasks.every(t => t.status === 'done')) {
          m.status = 'complete';
          const secs = Math.round((this.tick - m.startTick) * .65);
          FS.write(m.dir + '/REPORT.md', '# Mission ' + m.n + ' — COMPLETE ✓\n\nGoal: ' + m.goal +
            '\n\nDuration: ~' + secs + 's of agent time\nTasks: ' + m.tasks.length +
            '\nTokens burned: ' + (m.tokens || 0).toLocaleString() +
            '\n\nArtifacts:\n' + m.tasks.filter(t => t.artifact).map(t => '- ' + t.artifact).join('\n') + '\n');
          m.feed.push({ at: nowHMS(), who: 'agentd', msg: 'MISSION COMPLETE ✓ report written to ' + m.dir + '/REPORT.md', cls: 'sys' });
          toast('MISSION #' + m.n + ' COMPLETE', 'Report + artifacts in ' + m.dir, 'good');
          klog('mission #' + m.n + ' complete');
          Archive.push({ n: m.n, goal: m.goal, tasks: m.tasks.length, tokens: m.tokens || 0,
            secs, dir: m.dir, at: new Date().toISOString().slice(0, 16).replace('T', ' ') });
          this.commsSay('agentd', 'mission #' + m.n + ' shipped. drinks are on the planner.', 'sys');
          Stats.bump('missionsDone', 1);
          Achv.unlock('shipped');
          if (Stats.data.missionsDone >= 5) Achv.unlock('shipped5');
          Bus.emit('missions');
        }
      }
    }

    for (const a of this.agents) {
      if (a.status === 'blocked') {
        if (--a.blockTicks <= 0) { a.status = 'working'; a.say('unblocked. resuming', 'sys'); }
        continue;
      }
      if (a.status === 'working' && a.taskId) {
        const m = this.missions.find(x => x.id === a.missionId);
        const t = m && m.tasks.find(t => t.id === a.taskId);
        if (!t || t.status !== 'active') { a.status = 'idle'; a.taskId = null; a.missionId = null; continue; }
        // occasional simulated failure
        if (Math.random() < .04) {
          a.status = 'blocked'; a.blockTicks = irand(2, 4);
          a.say(pick(LINES.blocked), 'err');
          continue;
        }
        const burn = irand(40, 180);
        a.tokens += burn; this.totalTokens += burn; this.tokensThisTick += burn;
        m.tokens = (m.tokens || 0) + burn;
        t.progress = Math.min(100, t.progress + rand(5, 13));
        if (Math.random() < .6) {
          let line = pick(LINES[t.kind] || LINES.build).replace('{topic}', shortGoal(m.goal));
          if (Math.random() < .3) line += pick(TRAITS[a.trait].suffix);
          a.say(line);
        }
        if (t.progress >= 100) {
          // QA drama: the reviewer sometimes bounces a finished task back for rework
          if (t.kind === 'review' && !m.reworked && Math.random() < .3) {
            const victims = m.tasks.filter(x => x.status === 'done' && x.kind !== 'review');
            if (victims.length) {
              m.reworked = true;
              const v = pick(victims);
              const idx = m.tasks.length;
              m.tasks.push({ id: uid('t'), title: 'Rework: ' + v.title, kind: v.kind,
                status: 'todo', progress: 0, assignee: null, deps: [] });
              t.status = 'todo'; t.progress = 0; t.assignee = null; t.deps.push(idx);
              a.say('REJECTED: "' + v.title + '" — requesting changes', 'err');
              m.feed.push({ at: nowHMS(), who: a.name, msg: 'review verdict: NOT YET. sent "' + shortGoal(v.title) + '" back for rework', cls: 'err' });
              this.commsSay(a.name, 'I have notes. Nobody panic.', '');
              SFX.play('buzz');
              Achv.unlock('rework');
              this.agents.forEach(x => {
                if (x.taskId === t.id) { x.status = 'idle'; x.taskId = null; x.missionId = null; x.idleTicks = 0; }
              });
              continue;
            }
          }
          t.status = 'done';
          const art = artifactFor(t.kind, t.title, m);
          FS.write(m.dir + '/' + art.name, art.content);
          t.artifact = m.dir + '/' + art.name;
          a.say('done: ' + t.title + ' → ' + art.name, 'sys');
          // free everyone on this task (helpers too), pay out XP
          this.agents.forEach(x => {
            if (x.taskId === t.id) {
              const was = levelOf(x.xp);
              x.xp += irand(8, 16);
              const now = levelOf(x.xp);
              if (now > was) {
                x.say('LEVEL UP → LV.' + now, 'sys');
                m.feed.push({ at: nowHMS(), who: 'agentd', msg: x.name + ' reached LV.' + now, cls: 'sys' });
                if (now >= 5) Achv.unlock('level5');
              }
              x.status = 'idle'; x.taskId = null; x.missionId = null; x.idleTicks = 0;
            }
          });
          Crew.save();
        }
      } else if (a.status === 'idle') {
        a.idleTicks++;
        if (Math.random() < .05) a.say(pick(LINES.idle), 'dim');
        // ephemeral helpers despawn after a while
        if (a.ephemeral && a.idleTicks > 18) {
          a.say('work done. powering down', 'dim');
          this.agents = this.agents.filter(x => x !== a);
        }
      }
    }

    // lifetime token stats (saved sparsely to keep localStorage writes cheap)
    Stats.data.tokensLifetime = (Stats.data.tokensLifetime || 0) + this.tokensThisTick;
    if (this.tick % 20 === 0) {
      Stats.save();
      if (Stats.data.tokensLifetime >= 100000) Achv.unlock('tok100k');
    }

    // idle crew banter drifts into COMMS
    if (Math.random() < .055 && this.agents.length >= 2) {
      const a1 = pick(this.agents);
      let a2 = pick(this.agents);
      if (a1 !== a2) {
        const b = pick(BANTER);
        this.commsSay(a1.name, b[0].replace('{B}', a2.name));
        if (b[1]) this.commsSay(a2.name, b[1].replace('{A}', a1.name));
      }
    }

    // metrics
    const active = this.agents.filter(a => a.status === 'working' || a.status === 'planning').length;
    const cpu = clamp(4 + active * 11 + rand(-3, 5) + (this.tokensThisTick / 40), 2, 98);
    this.cpuHist.push(cpu); this.cpuHist.shift();
    this.tokHist.push(this.tokensThisTick); this.tokHist.shift();

    $('#tray-agent-n').textContent = this.agents.length;
    $('#tray-cpu').textContent = Math.round(cpu) + '%';
    Bus.emit('tick');
  }
};

function shortGoal(g) { return g.length > 34 ? g.slice(0, 32) + '…' : g; }

Engine.commsSay = function (who, msg, cls) {
  this.comms.push({ at: nowHMS(), who, msg, cls: cls || '' });
  if (this.comms.length > 200) this.comms.shift();
  Bus.emit('comms');
};

Engine.userSay = function (msg) {
  msg = msg.trim();
  if (!msg) return;
  this.commsSay('YOU', msg, 'you');
  Achv.unlock('chat');
  const a = pick(this.agents);
  if (!a) { this.commsSay('agentd', 'nobody is alive to answer. spawn an agent?', 'sys'); return; }
  setTimeout(() => { this.commsSay(a.name, replyTo(msg, a)); }, 700 + rand(0, 1100));
};

function replyTo(msg, a) {
  const m = msg.toLowerCase();
  const mission = Engine.missions.find(x => x.status === 'running' || x.status === 'planning');
  if (/status|progress|how.s it going|update/.test(m)) {
    if (a.status === 'working' && mission) return 'grinding on the ' + a.role + ' work for "' + shortGoal(mission.goal) + '". progress is progress.';
    if (mission) return 'crew is on mission #' + mission.n + '. I am ' + a.status + ', personally.';
    return 'all quiet. queue is empty — feed us a mission.';
  }
  if (/hello|hi\b|hey|yo\b/.test(m)) return pick(['hey boss.', 'o7', 'hello, human. we were just talking about you.', 'greetings from pid ' + a.pid + '.']);
  if (/thank|good job|nice|great work/.test(m)) return pick(['we live to serve. literally.', 'put it in my performance review.', 'the tokens were worth it.']);
  if (/who are you|what are you/.test(m)) return 'I am ' + a.name + ', a ' + a.role + ', LV.' + levelOf(a.xp) + '. every process is an agent.';
  if (/joke/.test(m)) return pick(['two agents walk into a deadlock. neither leaves.', 'my humor module is a TODO.', 'I would tell a UDP joke but you might not get it.']);
  if (m.endsWith('?')) return pick(['great question. estimating... unknowable.', 'signs point to: probably.', 'I asked the planner. the planner asked me. we are stuck.', 'yes, with a confidence of ' + irand(51, 97) + '%.']);
  return pick(['noted and logged.', 'copy that.', 'adding it to the backlog (the backlog is a black hole).', 'acknowledged, boss.', 'will factor that in. probably.']);
}

  ['status check: still an agent.', 'growth mindset, {A}.'],
  ['who left 47 TODO comments in the core loop?', 'those are aspirational.'],
  ['the virtual disk smells like fresh markdown.', 'that is the REPORT.md, just shipped.'],

];

          // path completion on the last arg
          const frag = parts[parts.length - 1];
          const base = frag.includes('/') ? frag.slice(0, frag.lastIndexOf('/') + 1) : '';
          const leaf = frag.slice(base.length);
          const dir = FS.normalize(base || '.', cwd);
          const items = FS.list(dir) || [];
          const hits = items.filter(i => i.name.startsWith(leaf));
          if (hits.length === 1) {
            parts[parts.length - 1] = base + hits[0].name + (hits[0].node.t === 'd' ? '/' : '');
            inp.value = parts.join(' ');
          } else if (hits.length > 1) print(hits.map(i => i.name + (i.node.t === 'd' ? '/' : '')).join('   '), 'dim');
        }
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            const raw = inp.value.trim();
            inp.value = '';
            printHTML('<span class="in">' + esc(ps1.textContent) + '</span> ' + esc(raw));
            if (!raw) return;
            Achv.unlock('shell');
            hist.push(raw); hi = hist.length;
            const [cmd, ...args] = raw.split(/\s+/);
            const fn = CMDS[cmd.toLowerCase()];
            if (fn) fn(args);
            else print(cmd + ': command not found (try `help`)', 'err');
          } else if (e.key === 'Tab') { e.preventDefault(); complete(); }
          else if (e.key === 'ArrowUp') { if (hi > 0) { hi--; inp.value = hist[hi] || ''; } e.preventDefault(); }
          else if (e.key === 'ArrowDown') { if (hi < hist.length) { hi++; inp.value = hist[hi] || ''; } e.preventDefault(); }
        });
        win.body.addEventListener('click', e => { if (!window.getSelection().toString()) inp.focus(); });
        setTimeout(() => inp.focus(), 50);
      }
    });
  }
};

          pageEl.innerHTML = p.html;
          $$('.ns-link', pageEl).forEach(a => a.addEventListener('click', () => go(a.dataset.go)));
          Achv.unlock('surfer');
        }
        $('.ns-go', win.body).addEventListener('click', () => go(addr.value));
        addr.addEventListener('keydown', e => { if (e.key === 'Enter') go(addr.value); });
        $('.ns-back', win.body).addEventListener('click', () => { const prev = histStack.pop(); if (prev) go(prev, true); });
        go(startUrl || 'agentnet://home', true);
      }
    });
  }
};

/* ---------- ARCHIVE (mission history, survives reboots) ---------- */
Apps.archive = {
  id: 'archive', name: 'ARCHIVE', icon: '\u{1F5C4}️', desc: 'every mission ever shipped',
  launch() {
    WM.open({
      app: 'archive', title: 'MISSION ARCHIVE', icon: this.icon, w: 600, h: 420,
      render(win) {
        function render() {
          win.body.innerHTML = Archive.data.length
            ? `<div class="pad app-note" style="border-bottom:1px solid var(--line);padding-bottom:10px">
                 ${Archive.data.length} mission${Archive.data.length === 1 ? '' : 's'} on record ·
                 ${Archive.data.reduce((s, e) => s + (e.tokens || 0), 0).toLocaleString()} lifetime tokens ·
                 click one to open its report</div>` +
              Archive.data.map((e, i) => `<div class="arc-row" data-i="${i}">
                <div><div class="arc-goal">#${e.n} ${esc(e.goal)}</div>
                  <div class="arc-meta">${esc(e.at || '')} · ${e.tasks} tasks · ${(e.tokens || 0).toLocaleString()} tok · ~${e.secs}s</div></div>
                <span class="pill complete">SHIPPED</span>
              </div>`).join('')
            : '<div class="pad app-note">No missions in the archive yet.<br><br>Complete a mission in MISSION CONTROL and it lands here — permanently.</div>';
          $$('.arc-row', win.body).forEach(el => el.addEventListener('click', () => {
            const e = Archive.data[+el.dataset.i];
            const p = e.dir + '/REPORT.md';
            if (FS.read(p) != null) Apps.notepad.launch(p);
            else toast('ARCHIVE', 'report file is gone from the disk (factory reset?), but the record remains', 'bad');
          }));
        }
        render();
        win.cleanups.push(Bus.on('archive', render));
      }
    });
  }
};

/* ================= DESKTOP ICONS + START MENU ================= */
const ICON_ORDER = ['missions', 'agents', 'comms', 'netscope', 'terminal', 'files', 'monitor', 'archive', 'notepad', 'achievements', 'manual', 'settings'];

function buildDesktop() {
  const icons = $('#icons');
  icons.innerHTML = '';
  ICON_ORDER.forEach(id => {
    const app = Apps[id];
    const el = document.createElement('div');
    el.className = 'icon';
    el.innerHTML = `<div class="glyph">${app.icon}</div><div class="lbl">${esc(app.name)}</div>`;
    el.addEventListener('click', () => app.launch()); // single click launches (kinder on touch)
    icons.appendChild(el);
  });

  const sm = $('#sm-apps');
  sm.innerHTML = '';
  ICON_ORDER.forEach(id => {
    const app = Apps[id];
    const b = document.createElement('button');
    b.className = 'sm-app';
    b.innerHTML = `<span class="g">${app.icon}</span><span><div>${esc(app.name)}</div><div class="d">${esc(app.desc)}</div></span>`;
    b.addEventListener('click', () => { app.launch(); toggleStart(false); });
    sm.appendChild(b);
  });

  $('#start-btn').addEventListener('click', e => { e.stopPropagation(); toggleStart(); });
  document.addEventListener('click', e => {
    if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) toggleStart(false);
  });
  $('#sm-reboot').addEventListener('click', () => { toggleStart(false); Achv.unlock('reboot'); Boot.run(true); });
  $('#tray-agents').addEventListener('click', () => Apps.agents.launch());
  const snd = $('#tray-sound');
  const paintSnd = () => { snd.innerHTML = Settings.data.sound === false ? '&#128263;' : '&#128266;'; };
  paintSnd();
  snd.addEventListener('click', () => { Settings.set('sound', Settings.data.sound === false); paintSnd(); SFX.play('ding'); });
  Bus.on('settings', paintSnd);

  // keyboard shortcuts: Alt+` cycles windows, Alt+W closes the focused one
  document.addEventListener('keydown', e => {
    if (!e.altKey) return;
    if (e.key === '`') {
      e.preventDefault();
      const vis = WM.wins.filter(w => !w.minned);
      if (vis.length < 2) return;
      vis.sort((a, b) => (+a.el.style.zIndex) - (+b.el.style.zIndex));
      WM.focus(vis[0]); // bottom-most comes to front
    } else if (e.key.toLowerCase() === 'w') {
      e.preventDefault();
      const top = WM.wins.filter(w => !w.minned).sort((a, b) => (+b.el.style.zIndex) - (+a.el.style.zIndex))[0];
      if (top) WM.close(top);
    }
  });
}
function toggleStart(force) {
  const m = $('#start-menu');
  m.classList.toggle('open', force !== undefined ? force : !m.classList.contains('open'));
}

/* clock */
setInterval(() => { const c = $('#clock'); if (c) c.textContent = nowHM(); }, 1000);

/* ================= BOOT ================= */
const Boot = {
  running: false,
  lines: [
    ['AGENTIC BIOS v1.0 — (c) EUREKA SYSTEMS', 'accent'],
    ['CPU: 1x Imagination Core @ 60fps ......... <span class="ok">OK</span>'],
    ['MEM: 640K localStorage (enough for anyone)  <span class="ok">OK</span>'],
    ['DISK: virtual-disk-0 mounted at / ........ <span class="ok">OK</span>'],
    [''],
    ['<span class="dim">loading kernel: agentd ...................</span>'],
    ['agentd: every process is an agent ........ <span class="ok">OK</span>'],
    ['agentd: waking the core crew ............. <span class="ok">OK</span>'],
    ['  &gt; ATLAS   (planner)   ................. <span class="ok">ONLINE</span>'],
    ['  &gt; crew    (builder, researcher) ....... <span class="ok">ONLINE</span>'],
    ['starting window manager .................. <span class="ok">OK</span>'],
    ['starting mission control ................. <span class="ok">OK</span>'],
    ['calibrating vibes ........................ <span class="ok">IMMACULATE</span>'],
    [''],
    ['<span class="accent">Welcome to AGENTIC OS.</span>', '']
  ],
  run(isReboot) {
    if (this.running) return;
    this.running = true;
    const boot = $('#boot'), log = $('#boot-log'), bar = $('#boot-bar i');
    boot.classList.remove('hidden');
    $('#os').classList.remove('on');
    log.innerHTML = '';
    bar.style.width = '0';
    let i = 0, skipped = false;
    const finish = () => {
      if (!this.running) return;
      this.running = false;
      boot.classList.add('hidden');
      $('#os').classList.add('on');
      drawWallpaper();
      SFX.play('boot');
      document.removeEventListener('keydown', skip);
      boot.removeEventListener('pointerdown', skip);
      if (!isReboot) firstRun();
    };
    const stepLine = () => {
      if (skipped) return;
      if (i >= this.lines.length) { setTimeout(finish, 450); return; }
      const d = document.createElement('div');
      d.innerHTML = this.lines[i][0] || '&nbsp;';
      if (this.lines[i][1]) d.className = this.lines[i][1];
      log.appendChild(d);
      bar.style.width = Math.round((i + 1) / this.lines.length * 100) + '%';
      i++;
      setTimeout(stepLine, irand(70, isReboot ? 120 : 220));
    };
    const skip = () => { skipped = true; finish(); };
    document.addEventListener('keydown', skip);
    boot.addEventListener('pointerdown', skip);
    stepLine();
  }
};

/* first boot: open the manual + mission control, run a demo mission */
function firstRun() {
  const fresh = !Settings.data.booted;
  setTimeout(() => Apps.missions.launch(), 250);
  Achv.unlock('boot');
  if (fresh) {
    Settings.set('booted', true);
    setTimeout(() => {
      Engine.newMission('assemble the onboarding demo');
      toast('AGENTIC OS', 'First boot detected — running a demo mission so you can watch the crew work. Read MANUAL for the tour.');
    }, 1400);
  }
}


/* ================= DESKTOP WIDGETS ================= */
const Widgets = {
  el: null,
  init() {
    const el = this.el = document.createElement('div');
    el.id = 'widgets';
    el.innerHTML =
      `<div class="wgt wgt-clock"><div class="w-time">00:00</div><div class="w-date"></div></div>
       <div class="wgt"><div class="w-k">SIM CPU</div><canvas class="w-cv" width="180" height="36"></canvas></div>
       <div class="wgt"><div class="w-k">CREW</div><div class="w-crew"></div></div>`;
    $('#os').insertBefore(el, $('#taskbar'));
    this.apply();
    Bus.on('settings', () => this.apply());
    Bus.on('tick', () => this.paint());
    setInterval(() => this.paintClock(), 1000);
    this.paintClock();
  },
  apply() { this.el.style.display = Settings.data.widgets === false ? 'none' : 'flex'; },
  paintClock() {
    const d = new Date();
    $('.w-time', this.el).textContent = nowHM();
    $('.w-date', this.el).textContent = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  },
  paint() {
    if (Settings.data.widgets === false) return;
    // cpu sparkline
    const cv = $('.w-cv', this.el), ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, cv.width, cv.height);
    const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#58a6ff';
    ctx.strokeStyle = accent; ctx.lineWidth = 1.4; ctx.beginPath();
    const hist = Engine.cpuHist.slice(-60);
    hist.forEach((v, i) => {
      const x = i / (hist.length - 1) * cv.width, y = cv.height - (v / 100) * (cv.height - 4) - 2;
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    });
    ctx.stroke();
    // crew list
    $('.w-crew', this.el).innerHTML = Engine.agents.slice(0, 6).map(a =>
      `<div class="w-row"><span>${(ROLES[a.role] || {}).emoji || ''} ${esc(a.name)}</span>
       <span class="w-dot ${a.status}"></span></div>`).join('') || '<div class="w-row">no agents</div>';
  }
};

/* ================= DESKTOP CONTEXT MENU ================= */
const CtxMenu = {
  el: null,
  init() {
    const el = this.el = document.createElement('div');
    el.id = 'ctxmenu';
    document.body.appendChild(el);
    const items = [
      ['\u{1F3AF} New mission', () => Apps.missions.launch()],
      ['\u{1F5A5}️ Open terminal', () => Apps.terminal.launch()],
      ['\u{1F3A8} Next accent', () => {
        const keys = Object.keys(ACCENTS);
        Settings.set('accent', keys[(keys.indexOf(Settings.data.accent) + 1) % keys.length]);
      }],
      ['\u{1F9E9} Toggle widgets', () => Settings.set('widgets', Settings.data.widgets === false)],
      ['\u{1F5BC}️ Redraw wallpaper', () => drawWallpaper()],
      ['\u{1F504} Reboot', () => { Achv.unlock('reboot'); Boot.run(true); }]
    ];
    el.innerHTML = items.map((it, i) => `<button data-i="${i}">${it[0]}</button>`).join('');
    $$('button', el).forEach(b => b.addEventListener('click', () => { this.hide(); items[+b.dataset.i][1](); }));
    // right-click on empty desktop only (wallpaper/icons area, not inside windows or taskbar)
    document.addEventListener('contextmenu', e => {
      if (!$('#os').classList.contains('on')) return;
      if (e.target.closest('.win') || e.target.closest('#taskbar') || e.target.closest('#start-menu')) { this.hide(); return; }
      e.preventDefault();
      el.style.left = Math.min(e.clientX, innerWidth - 190) + 'px';
      el.style.top = Math.min(e.clientY, innerHeight - el.offsetHeight - 60) + 'px';
      el.classList.add('open');
    });
    document.addEventListener('click', () => this.hide());
  },
  hide() { this.el.classList.remove('open'); }
};

Settings.load();
Stats.load();
Achv.load();
FS.load();
buildDesktop();
drawWallpaper();
Archive.load();
Engine.start();
Saver.init();
Widgets.init();
CtxMenu.init();
Boot.run(false);
</script>
